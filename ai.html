              ur: { t: "مشین لرننگ (ML)", c: "مشین لرننگ AI کا ایک حصہ ہے۔ یہ وہ تکنیک ہے جہاں ہم کمپیوٹر کو اصول نہیں سکھاتے، بلکہ ہم اسے سیکھنا سکھاتے ہیں۔ یہ کتے کو سکھانے جیسا ہے: آپ اس کی ٹانگیں نہیں ہلاتے؛ جب وہ بیٹھتا ہے تو آپ اسے انعام دیتے ہیں، اور وہ خود سیکھ جاتا ہے۔" },
              ps: { t: "د ماشین زده کړه (ML)", c: "د ماشین زده کړه د AI یوه برخه ده. دا هغه تخنیک دی چیرې چې موږ کمپیوټر ته اصول نه ورکوو، بلکې موږ ورته د زده کړې پروګرام ورکوو. دا د سپي روزلو په څیر دی: کله چې هغه کښیني نو تاسو ورته انعام ورکوئ، او هغه پخپله زده کوي." }

            { id: 12, cat: 1, icon: "fa-tags",

            { id: 13, cat: 1, icon: "fa-question",
              en: { t: "Unsupervised Learning", c: "Here, there is no teacher. We throw a messy pile of data at the AI and say, 'Organize this.' The AI looks for similarities. For example, if you gave it a list of grocery items, it might figure out that 'Apples' and 'Bananas' belong in one group (Fruits) and 'Milk' and 'Cheese' in another (Dairy) without knowing the names of the groups." },

            { id: 14, cat: 1, icon: "fa-bone",
              en: { t: "Reinforcement Learning", c: "This is learning by trial and error. Imagine a robot mouse in a maze. If it hits a wall, it gets negative points (pain). If it finds cheese, it gets positive points (reward). Over thousands of tries, the robot learns the perfect path to the cheese to maximize its score. This is how AIs learn to play video games." },

            { id: 17, cat: 1, icon: "fa-border-all",

              ps: { t: "روزنه او ازموینه", c: "د AI جوړولو پرمهال، موږ خپل ډیټا ویشو. موږ 80٪ د 'روزنې' لپاره کاروو. پاتې 20٪ موږ د 'ازموینې' لپاره پټوو. ترڅو وګورو چې ایا AI واقعیا زده کړي دي که یوازې ځوابونه یې یاد کړي دي." }

            { id: 18, cat: 1, icon: "fa-exclamation-triangle",

              ps: { t: "اوور فټینګ", c: "یو زده کونکی تصور کړئ چې کتاب لفظ په لفظ یادوي مګر په مفهوم نه پوهیږي. که تاسو لږه مختلف پوښتنه وکړئ، هغه ناکامیږي. دا په AI کې اوور فټینګ دی. ماډل د روزنې ډیټا ډیر یادوي او په نوي معلوماتو کې ناکامیږي." }

            { id: 19, cat: 1, icon: "fa-th-large",

              ur: { t: "خصوصیات (Features)", c: "یہ وہ مخصوص معلومات ہیں جنہیں AI دیکھتا ہے۔ اگر آپ کار کی قیمت کا اندازہ لگانا چاہتے ہیں، تو خصوصیات یہ ہو سکتی ہیں: سال، مائلیج، برانڈ، اور رنگ۔ صحیح خصوصیات کا انتخاب بہت اہم ہے۔" },

            },
            { id: 20, cat: 1, icon: "fa-project-diagram",
              en: { t: "Decision Trees", c: "A Decision Tree is a simple AI model that looks like a flowchart. It asks a sequence of questions to reach an answer. 'Is this fruit red?' > YES > 'Is it round?' > YES > 'It is an Apple'. It breaks down complex decisions into small, simple yes/no choices." },
              ur: { t: "فیصلہ سازی کے درخت", c: "یہ ایک سادہ AI ماڈل ہے جو فلو چارٹ کی طرح لگتا ہے۔ یہ جواب تک پہنچنے کے لیے سوالات پوچھتا ہے۔ 'کیا یہ پھل لال ہے؟' > ہاں > 'کیا یہ گول ہے؟' > ہاں > 'یہ ایک سیب ہے'۔ یہ پیچیدہ فیصلوں کو چھوٹے حصوں میں تقسیم کرتا ہے۔" },

            { id: 21, cat: 2, icon: "fa-network-wired",
              en: { t: "Neural Networks", c: "This is the 'secret sauce' behind modern AI. Scientists looked at the human brain and saw billions of neurons connected by webs. They tried to recreate this digitally. A Neural Network is layers of math equations that pass data to each other, mimicking how our brain processes information." },

              ps: { t: "نیورل شبکې", c: "دا د عصري AI ترشا راز دی. ساینس پوهانو د انسان دماغ ته وکتل او هڅه یې وکړه چې دا په ډیجیټل ډول جوړ کړي. نیورل شبکه د ریاضیاتو پرتونه دي چې یو بل ته ډیټا لیږدوي، لکه څنګه چې زموږ دماغ معلومات پروسیس کوي." }
            },
            { id: 22, cat: 2, icon: "fa-layer-group",
              en: { t: "Neurons & Layers", c: "Think of a Neural Network like a factory line. The input (raw material) comes in the first layer. It passes through hidden layers (workers) where different features are analyzed. Finally, it reaches the output layer (finished product). The more layers you have (Deep Learning), the more complex things the AI can understand." },
              ur: { t: "نیوران اور تہیں", c: "نیورل نیٹ ورک کو فیکٹری لائن کی طرح سمجھیں۔ ان پٹ پہلی پرت میں آتا ہے۔ یہ چھپی ہوئی تہوں سے گزرتا ہے جہاں مختلف خصوصیات کا تجزیہ کیا جاتا ہے۔ آخر میں، یہ آؤٹ پٹ پرت تک پہنچتا ہے۔ جتنی زیادہ تہیں ہوں گی، AI اتنا ہی زیادہ پیچیدہ چیزیں سمجھ سکے گا۔" },
              ps: { t: "نیورون او پرتونه", c: "نیورل شبکه د فابریکې لاین په څیر فکر وکړئ. معلومات په لومړي پرت کې راځي. دا د پټو پرتونو څخه تیریږي چیرې چې مختلف ځانګړتیاوې تحلیل کیږي. په پای کې، دا وروستي پرت ته رسیږي. څومره چې پرتونه ډیر وي، AI ډیر پیچلي شیان پوهیدلی شي." }

            { id: 23, cat: 2, icon: "fa-sliders",
              en: { t: "Weights & Biases", c: "Inside the AI's brain, there are billions of tiny adjustments called Weights and Biases. Think of them like the volume knobs on a soundboard. When the AI makes a mistake, it tweaks these knobs slightly. Over time, after seeing millions of examples, the knobs are tuned perfectly to give the right answer." },
              ur: { t: "Weights اور Biases", c: "AI کے دماغ کے اندر اربوں چھوٹی تبدیلیاں ہوتی ہیں جنہیں Weights اور Biases کہتے ہیں۔ انہیں والیوم نوبس کی طرح سمجھیں۔ جب AI غلطی کرتا ہے، تو وہ ان نوبس کو تھوڑا سا گھماتا ہے۔ لاکھوں مثالوں کے بعد، یہ نوبس بالکل صحیح جواب دینے کے لیے سیٹ ہو جاتے ہیں۔" },
              ps: { t: "وزن او تعصب", c: "د AI دماغ دننه ملیاردونه کوچني تنظیمات شتون لري چې ورته Weights او Biases ویل کیږي. دوی د غږ کنټرولونو په څیر فکر وکړئ. کله چې AI غلطي کوي، نو دا کنټرولونه یو څه بدلوي. د وخت په تیریدو سره، دوی د سم ځواب ورکولو لپاره په بشپړ ډول تنظیم کیږي." }
            },
             { id: 24, cat: 2, icon: "fa-image",
              en: { t: "CNN (For Images)", c: "Convolutional Neural Networks (CNNs) are special networks designed to see. They look at an image in small chunks. First, they find lines and edges. Then, they combine lines to find shapes (circles, squares). Finally, they combine shapes to find objects (eyes, ears, faces). This hierarchy makes them amazing at recognizing things." },
              ur: { t: "CNN (تصاویر کے لیے)", c: "یہ نیٹ ورکس دیکھنے کے لیے بنائے گئے ہیں۔ یہ تصویر کو چھوٹے ٹکڑوں میں دیکھتے ہیں۔ پہلے، یہ لکیریں اور کنارے تلاش کرتے ہیں۔ پھر، یہ شکلیں تلاش کرتے ہیں۔ آخر میں، یہ چیزیں (آنکھیں، چہرے) پہچانتے ہیں۔" },
              ps: { t: "CNN (د انځورونو لپاره)", c: "دا شبکې د لیدلو لپاره ډیزاین شوي. دوی یو انځور په کوچنیو ټوټو کې ګوري. لومړی، دوی کرښې لټوي. بیا، دوی شکلونه لټوي. په پای کې، دوی شیان (سترګې، مخونه) پیژني." }
            },
            { id: 25, cat: 2, icon: "fa-align-left",
              en: { t: "RNN (Text)", c: "Recurrent Neural Networks (RNNs) are designed for things that happen in a sequence, like sentences or music. They have a short-term memory that remembers the previous word to help understand the current one. This is crucial for language because the meaning of a word often depends on what came before it." },
              ur: { t: "RNN (متن)", c: "یہ نیٹ ورکس ترتیب والی چیزوں کے لیے بنائے گئے ہیں، جیسے جملے یا موسیقی۔ ان کے پاس مختصر مدت کی یادداشت ہوتی ہے جو پچھلے لفظ کو یاد رکھتی ہے تاکہ موجودہ لفظ کو سمجھ سکے۔ یہ زبان کے لیے اہم ہے کیونکہ لفظ کا مطلب اکثر پچھلے الفاظ پر منحصر ہوتا ہے۔" },
              ps: { t: "RNN (متن)", c: "دا شبکې د ترتیب لرونکو شیانو لپاره ډیزاین شوي، لکه جملې یا موسیقی. دوی لنډمهاله حافظه لري چې پخوانۍ کلمه یاد ساتي ترڅو اوسنۍ کلمه پوه شي. دا د ژبې لپاره خورا مهم دی." }
            },
            { id: 26, cat: 2, icon: "fa-box",

              ur: { t: "بلیک باکس کا مسئلہ", c: "جدید AI اتنا پیچیدہ ہے کہ اس کے بنانے والے بھی نہیں جانتے کہ یہ جواب تک کیسے پہنچا۔ یہ ایک جادوئی باکس کی طرح ہے: آپ سوال ڈالتے ہیں، جواب نکل آتا ہے، لیکن اندر کا عمل نظر نہیں آتا۔ اسے 'بلیک باکس' مسئلہ کہتے ہیں۔" },
              ps: { t: "د تور بکس ستونزه", c: "عصري AI دومره پیچلی دی چې جوړونکي یې هم نه پوهیږي چې ځواب څنګه ترلاسه شو. دا د جادو بکس په څیر دی: تاسو پوښتنه کوئ، ځواب راځي، مګر د فکر کولو پروسه نه لیدل کیږي. دې ته د 'تور بکس' ستونزه ویل کیږي." }
            },
            { id: 27, cat: 2, icon: "fa-server",
              en: { t: "Big Data", c: "AI is hungry! It needs massive amounts of information to learn. This is called Big Data. Imagine trying to learn a language by reading just one page of a book—it's impossible. But if you read the entire library, you learn patterns. The internet provides the 'library' for AI to learn about our world." },

              ps: { t: "لوی ډیټا", c: "AI وږی دی! دا د زده کړې لپاره ډیرو معلوماتو ته اړتیا لري. دې ته لوی ډیټا ویل کیږي. یوازې د یوې پاڼې په لوستلو سره د ژبې زده کول ناممکن دي. مګر که تاسو ټول کتابتون ولولئ، تاسو زده کوئ. انټرنیټ د AI لپاره هغه کتابتون دی." }

            { id: 28, cat: 2, icon: "fa-microchip",
              en: { t: "GPU Power", c: "Why did AI suddenly get so good? Video Games! It turns out the computer chips used to render 3D graphics (GPUs) are also perfect for doing the math needed for AI. They can do thousands of calculations at the same time. Without these powerful gaming chips, modern AI would not exist." },
              ur: { t: "GPU کی طاقت", c: "AI اچانک اتنا اچھا کیوں ہو گیا؟ ویڈیو گیمز کی وجہ سے! جو چپس 3D گرافکس کے لیے استعمال ہوتی ہیں (GPUs)، وہ AI کے ریاضی کے لیے بہترین ہیں۔ وہ ایک ساتھ ہزاروں حساب کر سکتی ہیں۔ ان گیمنگ چپس کے بغیر جدید AI ممکن نہیں تھا۔" },
              ps: { t: "د GPU ځواک", c: "AI ولې ناڅاپه دومره ښه شو؟ ویډیو لوبې! هغه چپس چې د 3D ګرافیک لپاره کارول کیږي (GPUs)، د AI ریاضی لپاره مناسب دي. دوی کولی شي په ورته وخت کې زرګونه محاسبې وکړي. د دې لوبو چپس پرته، عصري AI به شتون ونلري." }
            },
            { id: 29, cat: 2, icon: "fa-undo",
              en: { t: "Backpropagation", c: "This is a fancy word for 'Learning from Mistakes'. When an AI guesses wrong during training, it calculates how far off it was. Then, it sends a signal *backwards* through its brain to adjust its connections. It's like a coach watching a player miss a goal and immediately correcting their posture." },
              ur: { t: "بیک پروپیگیشن", c: "یہ 'غلطیوں سے سیکھنے' کا نام ہے۔ جب AI غلط اندازہ لگاتا ہے، تو یہ حساب لگاتا ہے کہ غلطی کتنی بڑی تھی۔ پھر یہ اپنے دماغ میں پیچھے کی طرف سگنل بھیجتا ہے تاکہ کنکشنز کو درست کر سکے۔ یہ کوچ کی طرح ہے جو کھلاڑی کی غلطی فوراً سدھارتا ہے۔" },
              ps: { t: "بیک پروپیګیشن", c: "دا د 'غلطیو څخه زده کړې' نوم دی. کله چې AI غلط اټکل کوي، نو دا حساب کوي چې غلطی څومره لویه وه. بیا دا بیرته خپل دماغ ته سیګنال لیږي ترڅو اړیکې سمې کړي. دا د کوچ په څیر دی چې د لوبغاړي غلطي سمدستي اصلاح کوي." }
            },
            { id: 30, cat: 2, icon: "fa-toggle-on",
              en: { t: "Activation Function", c: "In our brains, neurons either fire or they don't. In AI, the Activation Function is the decision maker. It looks at the data coming into a neuron and decides, 'Is this important?' If yes, it passes the signal to the next layer. If no, it stops it. It filters out noise so the AI focuses on what matters." },
              ur: { t: "ایکٹیویشن فنکشن", c: "ہمارے دماغ میں نیوران یا تو چلتے ہیں یا نہیں۔ AI میں، ایکٹیویشن فنکشن فیصلہ ساز ہے۔ یہ ڈیٹا کو دیکھتا ہے اور فیصلہ کرتا ہے کہ 'کیا یہ اہم ہے؟' اگر ہاں، تو یہ سگنل آگے بھیجتا ہے۔ یہ شور کو فلٹر کرتا ہے تاکہ AI اہم چیزوں پر توجہ دے سکے۔" },
              ps: { t: "د فعالیت فعالیت", c: "زموږ په دماغ کې، نیورون یا کار کوي یا نه. په AI کې، د فعالیت فعالیت پریکړه کونکی دی. دا ډیټا ګوري او پریکړه کوي چې 'ایا دا مهم دی؟' که هو، نو دا سیګنال مخکې لیږي. دا شور فلټر کوي ترڅو AI په مهمو شیانو تمرکز وکړي." }
            },

            { id: 31, cat: 3, icon: "fa-wand-magic-sparkles",
              en: { t: "Generative AI", c: "Traditional AI analyzes things (classifies emails, finds faces). Generative AI *creates* things. It learns the patterns of existing art, music, or text, and then uses those rules to build something brand new that has never existed before. It's the difference between a critic (Traditional) and an artist (Generative)." },
              ur: { t: "جنریٹو AI", c: "روایتی AI چیزوں کا تجزیہ کرتا ہے۔ جنریٹو AI چیزیں *بناتا* ہے۔ یہ موجودہ آرٹ یا موسیقی کے پیٹرن سیکھتا ہے، اور پھر ان اصولوں کو استعمال کرتے ہوئے کچھ نیا بناتا ہے جو پہلے کبھی نہیں تھا۔ یہ نقاد اور فنکار کے درمیان فرق جیسا ہے۔" },
              ps: { t: "تولیدي AI", c: "دودیز AI شیان تحلیلوي. تولیدي AI شیان *جوړوي*. دا د موجوده هنر یا موسیقی نمونې زده کوي، او بیا د نوي څه جوړولو لپاره دا قواعد کاروي. دا د نیوکه کونکي او هنرمند ترمنځ توپیر دی." }
            },
            { id: 32, cat: 3, icon: "fa-comments",
              en: { t: "LLMs (Large Language Models)", c: "LLMs like ChatGPT are trained on nearly all the text on the internet. They are basically 'next-word predictors.' If you type 'The cat sat on the...', the LLM calculates that 'mat' is the most likely next word based on everything it has ever read. It does this over and over to write essays and code." },
              ur: { t: "بڑے زبان کے ماڈلز (LLMs)", c: "LLMs جیسے ChatGPT کو انٹرنیٹ پر موجود تقریباً تمام متن پر تربیت دی گئی ہے۔ یہ بنیادی طور پر 'اگلے لفظ کی پیش گوئی کرنے والے' ہیں۔ اگر آپ لکھتے ہیں 'بلی بیٹھی ہے...'، تو LLM حساب لگاتا ہے کہ اگلا لفظ کیا ہوگا۔" },
              ps: { t: "د لوی ژبې ماډلونه (LLMs)", c: "LLMs لکه ChatGPT په انټرنیټ کې په ټولو متنونو روزل شوي. دوی د راتلونکې کلمې وړاندوینه کوي. که تاسو ولیکئ 'پیشو ناسته ده...'، نو LLM حساب کوي چې بله کلمه به څه وي." }
            },
            { id: 33, cat: 3, icon: "fa-cubes-stacked",
              en: { t: "Transformers", c: "Transformers are the engine behind ChatGPT. Unlike older models that read word-by-word, Transformers can look at an entire paragraph at once. They use 'Self-Attention' to understand how words relate to each other, even if they are far apart. This allows them to understand context and humor much better than older AI." },
              ur: { t: "ٹرانسفارمرز", c: "ٹرانسفارمرز ChatGPT کے پیچھے انجن ہیں۔ پرانے ماڈلز کے برعکس جو لفظ بہ لفظ پڑھتے تھے، ٹرانسفارمرز پورا پیراگراف ایک ساتھ دیکھ سکتے ہیں۔ یہ الفاظ کے تعلق کو سمجھنے کے لیے 'Self-Attention' استعمال کرتے ہیں، جس سے یہ سیاق و سباق کو بہتر سمجھتے ہیں۔" },
              ps: { t: "ټرانسفارمرز", c: "ټرانسفارمرز د ChatGPT ترشا انجن دي. د پخوانیو ماډلونو برعکس، ټرانسفارمر کولی شي بشپړ پاراګراف په یوځل وګوري. دوی د کلمو اړیکو پوهیدو لپاره 'Self-Attention' کاروي، چې دوی ته اجازه ورکوي شرایط ښه پوه شي." }
            },
            { id: 34, cat: 3, icon: "fa-terminal",

              ur: { t: "پرومپٹ انجینئرنگ", c: "چونکہ AI ماڈلز بہت ہوشیار ہیں، ان سے بات کرنا ایک ہنر ہے۔ پرومپٹ انجینئرنگ بہترین جواب حاصل کرنے کے لیے بہترین سوال بنانے کا فن ہے۔ اس میں AI کو کردار ('استاد کی طرح بنو') اور سیاق و سباق دینا شامل ہے۔" },
              ps: { t: "پرامپټ انجینري", c: "څرنګه چې AI ماډلونه ډیر هوښیار دي، له دوی سره خبرې کول یو مهارت دی. پرامپټ انجینري د غوره ځواب ترلاسه کولو لپاره د غوره پوښتنې کولو هنر دی. پدې کې AI ته رول ورکول ('د ښوونکي په څیر عمل وکړئ') شامل دي." }
            },
            { id: 35, cat: 3, icon: "fa-palette",

              ps: { t: "د انځور جوړول", c: "AI څنګه انځور جوړوي؟ دا د 'ډیفیوژن' پروسه کاروي. تصور وکړئ چې یو روښانه عکس ورو ورو تیاره کیږي. AI دا پروسه بیرته کول زده کوي. دا د شور څخه پیل کیږي او پاکوي یې ترڅو یو روښانه انځور رامینځته شي." }
            },
            { id: 36, cat: 3, icon: "fa-bug",

        function generateCertificate() {
            const fname = document.getElementById('cert-fname').value.trim();
            const lname = document.getElementById('cert-lname').value.trim();
            
            if (!fname || !lname) {
                alert("Please enter both First and Last Name.");
                return;
            }
            
            const fullName = fname + " " + lname;

            const canvas = document.getElementById('certCanvas');
            const ctx = canvas.getContext('2d');

            // 1. Background
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, 1000, 700);

            // 2. Fancy Border
            // Outer Indigo
            ctx.lineWidth = 20;
            ctx.strokeStyle = "#312e81"; 
            ctx.strokeRect(20, 20, 960, 660);
            
            // Inner Gold
            ctx.lineWidth = 5;
            ctx.strokeStyle = "#fbbf24"; 
            ctx.strokeRect(45, 45, 910, 610);
            
            // Corner Accents
            ctx.fillStyle = "#312e81";
            ctx.fillRect(20, 20, 60, 60);
            ctx.fillRect(920, 20, 60, 60);
            ctx.fillRect(20, 620, 60, 60);
            ctx.fillRect(920, 620, 60, 60);

            // 3. Header Text
            ctx.fillStyle = "#312e81";
            ctx.font = "bold 60px 'Times New Roman', serif";
            ctx.textAlign = "center";
            ctx.fillText("CERTIFICATE", 500, 150);
            
            ctx.font = "tracking-widest 25px Arial, sans-serif";
            ctx.fillStyle = "#fbbf24";
            ctx.fillText("OF EXCELLENCE", 500, 190);

            // 4. Body Text
            ctx.font = "italic 24px Arial, sans-serif";
            ctx.fillStyle = "#666";
            ctx.fillText("This is to certify that", 500, 260);

            // 5. Name (Dynamic)
            ctx.font = "bold italic 70px 'Times New Roman', serif";
            ctx.fillStyle = "#1e40af"; 
            ctx.fillText(fullName, 500, 340);
            
            // Underline
            ctx.beginPath();
            ctx.moveTo(200, 360);
            ctx.lineTo(800, 360);
            ctx.strokeStyle = "#cbd5e1";
            ctx.lineWidth = 2;
            ctx.stroke();

            // 6. Reason
            ctx.font = "24px Arial, sans-serif";
            ctx.fillStyle = "#444";
            ctx.fillText("Has successfully completed the fundamentals of Artificial Intelligence at", 500, 410);
            ctx.font = "bold 32px 'Orbitron', sans-serif";
            ctx.fillStyle = "#312e81";
            ctx.fillText("PASHTUNEINSTEIN AI ACADEMY", 500, 460);

            // 7. Signatures / Footer
            const date = new Date().toLocaleDateString();
            
            // Line 1
            ctx.beginPath();
            ctx.moveTo(150, 580);
            ctx.lineTo(400, 580);
            ctx.stroke();
            
            // Line 2
            ctx.beginPath();
            ctx.moveTo(600, 580);
            ctx.lineTo(850, 580);
            ctx.stroke();
            
            ctx.font = "18px Arial, sans-serif";
            ctx.fillStyle = "#333";
            ctx.fillText(date, 275, 570);
            ctx.fillText("PashtunEinstein", 725, 565); // "Signature" font simulation
            
            ctx.font = "bold 16px Arial, sans-serif";
            ctx.fillStyle = "#888";
            ctx.fillText("DATE", 275, 610);
            ctx.fillText("INSTRUCTOR", 725, 610);

            // 8. Seal
            ctx.beginPath();
            ctx.arc(500, 580, 50, 0, 2 * Math.PI);
            ctx.fillStyle = "#fbbf24";
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "30px Arial";
            ctx.fillText("★", 500, 590);

            // 9. Download
            const link = document.createElement('a');
            link.download = `Certificate_${fname}_${lname}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        // Initialize App
        init();

    </script>
</body>
</html>
