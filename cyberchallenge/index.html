                            <p className="text-slate-500 text-sm mb-2">Password:</p>
                            <p className="text-3xl md:text-4xl font-mono font-bold text-amber-400 tracking-wider break-all">
                                {challenge.scenario.en.password}
                            </p>
                        </div>

                        <p className={`text-slate-300 text-center ${currentFont}`}>{data.question}</p>

                        <div className="space-y-3">
                            {data.options.map((option, index) => {
                                const isCorrect = answered && index === correctAnswer;
                                const isWrong = answered && selectedOption === index && index !== correctAnswer;
                                return (
                                    <button key={index} onClick={() => handleAnswer(index)} disabled={answered}
                                        className={`w-full p-4 rounded-xl border-2 text-left transition-all ${currentFont} ${
                                            isCorrect ? 'border-green-500 bg-green-600/20 text-green-300' :
                                            isWrong ? 'border-red-500 bg-red-600/20 text-red-300' :
                                            answered ? 'border-slate-700 bg-slate-800/50 text-slate-500' :
                                            'border-slate-700 bg-slate-800/50 text-slate-300 hover:border-amber-500 hover:bg-amber-600/10'
                                        }`}>
                                        {option}
                                    </button>
                                );
                            })}
                        </div>

                        {answered && (
                            <div className="p-4 rounded-xl border border-blue-500/30 bg-blue-900/10 fade-in">
                                <p className="text-blue-400 font-bold text-sm">💡 {t('explanation')}</p>
                                <p className={`text-slate-300 mt-2 text-sm ${currentFont}`}>{data.explanation}</p>
                            </div>
                        )}
                    </div>
                );
            };

            const renderScamChallenge = (challenge) => {
                const data = challenge.scenario[language] || challenge.scenario.en;
                const correctAnswer = data.answer;

                return (
                    <div className="space-y-6 fade-in">
                        <h3 className={`text-xl font-bold text-white ${currentFont}`}>{t('scam')}</h3>

                        <div className="bg-slate-900/90 border border-slate-700 rounded-xl p-6">
                            <p className="text-red-400 text-sm font-bold mb-2">⚠️ {data.title}</p>
                            <div className={`text-slate-300 whitespace-pre-line text-sm leading-relaxed ${currentFont}`}>{data.description}</div>
                        </div>

                        <div className="space-y-3">
                            {data.options.map((option, index) => {
                                const isCorrect = answered && index === correctAnswer;
                                const isWrong = answered && selectedOption === index && index !== correctAnswer;
                                return (
                                    <button key={index} onClick={() => handleAnswer(index)} disabled={answered}
                                        className={`w-full p-4 rounded-xl border-2 text-left transition-all ${currentFont} ${
                                            isCorrect ? 'border-green-500 bg-green-600/20 text-green-300' :
                                            isWrong ? 'border-red-500 bg-red-600/20 text-red-300' :
                                            answered ? 'border-slate-700 bg-slate-800/50 text-slate-500' :
                                            'border-slate-700 bg-slate-800/50 text-slate-300 hover:border-cyan-500 hover:bg-cyan-600/10'
                                        }`}>
                                        {String.fromCharCode(65 + index)}) {option}
                                    </button>
                                );
                            })}
                        </div>

                        {answered && (
                            <div className="p-4 rounded-xl border border-blue-500/30 bg-blue-900/10 fade-in">
                                <p className="text-blue-400 font-bold text-sm">💡 {t('explanation')}</p>
                                <p className={`text-slate-300 mt-2 text-sm ${currentFont}`}>{data.explanation}</p>
                            </div>
                        )}
                    </div>
                );
            };

            const renderResult = () => {
                const percentage = Math.round((score / shuffledChallenges.length) * 100);
                let message, messageClass;
                if (percentage >= 80) { message = t('excellent'); messageClass = 'text-green-400'; }
                else if (percentage >= 50) { message = t('good'); messageClass = 'text-amber-400'; }
                else { message = t('keepLearning'); messageClass = 'text-red-400'; }

                return (
                    <div className="max-w-lg w-full text-center space-y-8 fade-in">
                        <div className={`w-28 h-28 rounded-full flex items-center justify-center mx-auto border-4 ${
                            percentage >= 80 ? 'border-green-500 bg-green-500/10' :
                            percentage >= 50 ? 'border-amber-500 bg-amber-500/10' :
                            'border-red-500 bg-red-500/10'
                        }`}>
                            <span className="text-5xl">
                                {percentage >= 80 ? '🛡️' : percentage >= 50 ? '⚔️' : '📖'}
                            </span>
                        </div>

                        <div>
                            <h2 className={`text-3xl font-bold text-white mb-2 ${currentFont}`}>{t('yourScore')}</h2>
                            <p className={`text-5xl font-bold ${messageClass}`}>{score} {t('outOf')} {shuffledChallenges.length}</p>
                            <p className={`text-lg mt-4 ${messageClass} ${currentFont}`}>{message}</p>
                        </div>

                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                            <button onClick={startChallenge}
                                className={`px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium transition-colors ${currentFont}`}>
                                {t('tryAgain')}
                            </button>
                            <a href="/academy/"
                                className={`px-6 py-3 bg-cyan-600 hover:bg-cyan-700 text-white rounded-lg font-medium transition-colors ${currentFont}`}>
                                {t('backToAcademy')}
                            </a>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex-grow flex flex-col" dir={dir}>
                    <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-3">
                            <div className="flex items-center gap-3">
                                <img src="/logo.png" alt="PashtunEinstein Logo" className="h-12 w-auto" />
                                <div>
                                    <h1 className={`text-xl font-bold text-white ${currentFont}`}>{t('title')}</h1>
                                    <p className={`text-xs text-slate-400 uppercase tracking-wider ${currentFont}`}>{t('subtitle')}</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3 flex-wrap justify-center">
                                <div className="flex items-center bg-slate-800 rounded-full p-1 border border-slate-700">
                                    {['en', 'ur', 'ps'].map(code => (
                                        <button key={code} onClick={() => setLanguage(code)}
                                            className={`px-3 py-1.5 rounded-full text-xs sm:text-sm font-medium transition-all ${
                                                language === code ? 'bg-cyan-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-700'
                                            } ${code === 'ur' ? 'font-urdu' : code === 'ps' ? 'font-pashto' : ''}`}>
                                            {code === 'en' ? 'English' : code === 'ur' ? 'اردو' : 'پښتو'}
                                        </button>
                                    ))}
                                </div>
                                <a href="/academy/" className="text-cyan-400 hover:text-cyan-300 text-sm font-medium">{t('backToAcademy')}</a>
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow flex items-center justify-center p-4 sm:p-8 relative overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black -z-10"></div>

                        {view === 'intro' && (
                            <div className="max-w-2xl w-full text-center space-y-8 fade-in">
                                <div className="bg-cyan-500/10 w-24 h-24 rounded-full flex items-center justify-center mx-auto border-4 border-cyan-500 shadow-2xl shadow-cyan-500/20">
                                    <span className="text-5xl">🛡️</span>
                                </div>
                                <div>
                                    <h2 className={`text-4xl md:text-5xl font-bold text-white mb-4 ${currentFont}`}>{t('title')}</h2>
                                    <p className={`text-lg text-slate-400 ${currentFont}`}>{t('subtitle')}</p>
                                    <p className={`text-sm text-slate-500 mt-4 ${currentFont}`}>
                                        {language === 'ur' ? 'فشنگ ای میلز کی شناخت، پاسورڈ طاقت کا تخمینہ، اور scam کی شناخت' :
                                         language === 'ps' ? 'فشنگ ایمیلونه پیژندنه، د پړنوم قوت تخمین، او scamm پیژندنه' :
                                         'Phishing identification, password crack estimation, and scam detection'}
                                    </p>
                                </div>
                                <button onClick={startChallenge}
                                    className={`px-8 py-4 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white text-lg font-bold rounded-full shadow-lg shadow-cyan-600/25 transition-all transform hover:scale-105 ${currentFont}`}>
                                    {t('startBtn')} 🚀
                                </button>
                            </div>
                        )}

                        {view === 'challenge' && shuffledChallenges.length > 0 && (
                            <div className="max-w-2xl w-full space-y-6">
                                <div className="flex items-center justify-between text-sm text-slate-400">
                                    <span className={currentFont}>{t('challenge')} {currentChallenge + 1} {t('of')} {shuffledChallenges.length}</span>
                                    <div className="w-48 bg-slate-800 h-2 rounded-full overflow-hidden" dir="ltr">
                                        <div className="bg-cyan-500 h-full transition-all duration-300" style={{ width: `${((currentChallenge + 1) / shuffledChallenges.length) * 100}%` }}></div>
                                    </div>
                                </div>

                                {(() => {
                                    const challenge = getChallengeData();
                                    if (challenge.type === 'phishing') return renderPhishingChallenge(challenge);
                                    if (challenge.type === 'password') return renderPasswordChallenge(challenge);
                                    if (challenge.type === 'scam') return renderScamChallenge(challenge);
                                    return null;
                                })()}

                                {answered && (
                                    <div className="flex justify-center">
                                        <button onClick={nextChallenge}
                                            className={`px-8 py-3 bg-cyan-600 hover:bg-cyan-700 text-white rounded-lg font-medium transition-colors ${currentFont}`}>
                                            {t('nextBtn')} →
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'result' && renderResult()}
                    </main>

                    <footer className="bg-slate-950 text-slate-600 py-6 text-center text-sm border-t border-slate-900">
                        <p>&copy; {new Date().getFullYear()} PashtunEinstein. All Rights Reserved.</p>
                        <div className="flex justify-center gap-4 mt-2">
                            <a href="https://pashtuneinstein.com/" className={`hover:text-cyan-400 ${currentFont}`}>Website</a>
                            <span className="text-slate-800">•</span>
                            <a href="https://blog.pashtuneinstein.com/" className={`hover:text-cyan-400 ${currentFont}`}>Blog</a>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://esm.sh/react@18.2.0" type="module"></script>
    <script src="https://esm.sh/react-dom@18.2.0/client" type="module"></script>
</body>
</html>
