<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PashtunEinstein AI Job Impact Analyzer</title>
    <meta name="description" content="Check how AI may affect different roles with the PashtunEinstein AI Job Impact Analyzer.">
    <meta name="robots" content="index,follow">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PashtunEinstein">
    <meta property="og:title" content="PashtunEinstein AI Job Impact Analyzer">
    <meta property="og:description" content="Check how AI may affect different roles with the PashtunEinstein AI Job Impact Analyzer.">
    <meta property="og:url" content="https://pashtuneinstein.com/aijobchecker/">
    <meta property="og:image" content="https://pashtuneinstein.com/logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PashtunEinstein AI Job Impact Analyzer">
    <meta name="twitter:description" content="Check how AI may affect different roles with the PashtunEinstein AI Job Impact Analyzer.">
    <meta name="twitter:image" content="https://pashtuneinstein.com/logo.png">
    <meta name="theme-color" content="#020617">
    <link rel="canonical" href="https://pashtuneinstein.com/aijobchecker/">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/logo.png">
    <script defer src="/pwa.js"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "PashtunEinstein AI Job Impact Analyzer",
      "url": "https://pashtuneinstein.com/aijobchecker/",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Any",
      "description": "A browser-based tool that helps users explore how AI may affect different jobs and roles.",
      "publisher": {
        "@id": "https://pashtuneinstein.com/#organization"
      }
    }
    </script>
    
    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Load Babel to process JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles for Animations -->
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <section class="bg-white border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-4 py-8">
            <h1 class="text-3xl font-bold text-slate-900">PashtunEinstein AI Job Impact Analyzer</h1>
            <p class="mt-3 text-lg text-slate-700">Explore how AI may automate, augment, or have limited effect on different job roles.</p>
            <p class="mt-3 text-slate-600">This tool gives quick educational guidance about job categories, automation risk, and how people can adapt by learning complementary skills.</p>
        </div>
    </section>

    <noscript>
        <section class="max-w-4xl mx-auto px-4 py-8">
            <h2 class="text-2xl font-semibold text-slate-900">JavaScript is required for the interactive analyzer</h2>
            <p class="mt-3 text-slate-700">The analyzer runs entirely in the browser. With JavaScript enabled, you can enter a job title and review AI impact guidance instantly.</p>
        </section>
    </noscript>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icon Components (Inlined for single-file portability) ---
        const IconWrapper = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Search = ({ className }) => (
            <IconWrapper className={className}>
                <circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" />
            </IconWrapper>
        );

        const Brain = ({ className }) => (
            <IconWrapper className={className}>
                <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" />
                <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" />
            </IconWrapper>
        );

        const AlertTriangle = ({ className }) => (
            <IconWrapper className={className}>
                <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><path d="M12 9v4" /><path d="M12 17h.01" />
            </IconWrapper>
        );

        const ShieldCheck = ({ className }) => (
            <IconWrapper className={className}>
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" /><path d="m9 12 2 2 4-4" />
            </IconWrapper>
        );

        const TrendingUp = ({ className }) => (
            <IconWrapper className={className}>
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><polyline points="17 6 23 6 23 12" />
            </IconWrapper>
        );

        const BookOpen = ({ className }) => (
            <IconWrapper className={className}>
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            </IconWrapper>
        );

        const User = ({ className }) => (
            <IconWrapper className={className}>
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" />
            </IconWrapper>
        );

        const Hammer = ({ className }) => (
            <IconWrapper className={className}>
                <path d="m15 12-8.5 8.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0a2.12 2.12 0 0 1 0-3L12 9" />
                <path d="M17.64 15 22 10.64" />
                <path d="m20.91 11.7-1.25-1.25c-.6-.6-.93-1.4-.93-2.25V7.86c0-.55-.45-1-1-1H16.4c-.84 0-1.65-.33-2.25-.93L12.9 4.68" />
                <path d="M15 12l-8.5 8.5" />
            </IconWrapper>
        );

        // --- Main App Component ---
        const App = () => {
            const [jobTitle, setJobTitle] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [logoError, setLogoError] = useState(false);

            const analyzeJob = (title) => {
                const lowerTitle = title.toLowerCase();
                
                // 1. HIGH AUTOMATION RISK
                const automationKeywords = [
                'data entry', 'telemarketer', 'cashier', 'clerk', 'bookkeeper', 'translator', 
                'proofreader', 'driver', 'assembler', 'factory', 'support', 'service rep', 
                'typist', 'paralegal', 'junior', 'admin', 'scheduler', 'dispatcher'
                ];

                // 2. HIGH AUGMENTATION
                const augmentationKeywords = [
                'developer', 'engineer', 'writer', 'marketer', 'designer', 'analyst', 
                'manager', 'consultant', 'lawyer', 'accountant', 'architect', 'scientist', 
                'teacher', 'professor', 'editor', 'researcher', 'hr', 'recruiter', 'strategist',
                'physician', 'doctor', 'sales', 'executive', 'ceo', 'founder'
                ];

                // 3. PHYSICAL / HUMAN CENTRIC
                const physicalKeywords = [
                'plumber', 'electrician', 'nurse', 'caregiver', 'chef', 'cook', 'athlete', 
                'artist', 'musician', 'actor', 'therapist', 'psychologist', 'construction', 
                'carpenter', 'mechanic', 'hairdresser', 'barber', 'firefighter', 'police', 
                'gardener', 'cleaner', 'waiter', 'bartender'
                ];

                let category = 'Mixed';
                let score = 50;
                let reason = "This role likely has a mix of tasks that can be automated and those requiring human judgment.";
                let advice = "Focus on soft skills and strategic thinking.";

                if (automationKeywords.some(k => lowerTitle.includes(k))) {
                category = 'Automation Risk';
                score = 85;
                reason = "This role involves repetitive, rules-based tasks (data processing, routine communication) that current AI agents excel at performing autonomously.";
                advice = "Pivot towards roles requiring complex problem solving or emotional intelligence. Learn to manage the AI tools that do this work.";
                } else if (physicalKeywords.some(k => lowerTitle.includes(k))) {
                category = 'Resilient / Human-Centric';
                score = 20;
                reason = "This job requires physical dexterity, mobility in unstructured environments, or deep human empathy—areas where AI still struggles significantly.";
                advice = "Your core skills are safe. However, look for AI tools that can handle your administrative paperwork (scheduling, invoicing) to save you time.";
                } else if (augmentationKeywords.some(k => lowerTitle.includes(k))) {
                category = 'High Augmentation';
                score = 60;
                reason = "AI won't replace you, but a human using AI will. This role involves complex analysis or creativity where AI acts as a powerful 'copilot' to boost speed and quality.";
                advice = "Become a power user of AI tools in your field. Focus on 'editing' and 'curating' AI outputs rather than creating everything from scratch.";
                }

                return { category, score, reason, advice };
            };

            const handleSearch = (e) => {
                e.preventDefault();
                if (!jobTitle.trim()) return;
                
                setLoading(true);
                setTimeout(() => {
                setResult(analyzeJob(jobTitle));
                setLoading(false);
                }, 800);
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans selection:bg-indigo-100">
                    {/* Header */}
                    <header className="bg-indigo-600 text-white py-8 px-4 shadow-lg relative overflow-hidden">
                        {/* Tech Pattern Overlay */}
                        <div className="absolute inset-0 opacity-10 pointer-events-none" 
                             style={{backgroundImage: 'radial-gradient(circle, #fff 1px, transparent 1px)', backgroundSize: '24px 24px'}}>
                        </div>

                        {/* Personalized Branding - Top Left & Bigger */}
                        <div className="absolute top-4 left-4 z-20">
                            {!logoError ? (
                                <img 
                                    src="/logo.png" 
                                    alt="PashtunEinstein Logo" 
                                    className="h-24 md:h-32 object-contain hover:scale-105 transition-transform duration-300 drop-shadow-lg"
                                    onError={() => setLogoError(true)}
                                />
                            ) : (
                                <span className="inline-flex items-center gap-2 px-4 py-2 bg-slate-900 border border-cyan-500/50 rounded-lg shadow-[0_0_15px_rgba(6,182,212,0.4)] transform hover:scale-105 transition-all duration-300 cursor-default">
                                    <span className="w-2 h-2 bg-cyan-400 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,211,238,0.8)]"></span>
                                    <span className="font-mono text-cyan-300 text-xs font-bold tracking-[0.2em] uppercase">
                                        PashtunEinstein
                                    </span>
                                </span>
                            )}
                        </div>

                        <div className="max-w-3xl mx-auto text-center relative z-10">
                        
                        <div className="flex justify-center mb-4 pt-12 md:pt-0">
                            <Brain className="w-12 h-12 text-indigo-200" />
                        </div>
                        <h1 className="text-3xl md:text-4xl font-bold mb-2">Will AI Take My Job?</h1>
                        <p className="text-indigo-100 text-lg">Instant AI Impact Assessment for 2025</p>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-2xl mx-auto px-4 -mt-6">
                        
                        {/* Search Box */}
                        <div className="bg-white rounded-xl shadow-xl p-6 md:p-8 relative z-10">
                        <form onSubmit={handleSearch} className="space-y-4">
                            <label className="block text-sm font-medium text-slate-600 uppercase tracking-wider">
                            Enter your job title
                            </label>
                            <div className="relative">
                            <input
                                type="text"
                                value={jobTitle}
                                onChange={(e) => setJobTitle(e.target.value)}
                                placeholder="e.g. Graphic Designer, Accountant, Truck Driver..."
                                className="w-full pl-4 pr-12 py-4 bg-slate-50 border-2 border-slate-200 rounded-lg focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all text-lg"
                            />
                            <button 
                                type="submit"
                                className="absolute right-2 top-2 bottom-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 rounded-md flex items-center justify-center transition-colors"
                            >
                                {loading ? (
                                <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                                ) : (
                                <Search className="w-5 h-5" />
                                )}
                            </button>
                            </div>
                        </form>
                        </div>

                        {/* Results Section */}
                        {result && !loading && (
                        <div className="mt-8 space-y-6 animate-in">
                            
                            {/* Score Card */}
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className={`h-2 w-full ${
                                result.category === 'Automation Risk' ? 'bg-red-500' : 
                                result.category === 'Resilient / Human-Centric' ? 'bg-emerald-500' : 
                                'bg-blue-500'
                            }`} />
                            
                            <div className="p-6 md:p-8">
                                <div className="flex items-start justify-between mb-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-slate-800 capitalize mb-1">
                                    {jobTitle}
                                    </h2>
                                    <div className={`inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold ${
                                    result.category === 'Automation Risk' ? 'bg-red-100 text-red-700' : 
                                    result.category === 'Resilient / Human-Centric' ? 'bg-emerald-100 text-emerald-700' : 
                                    'bg-blue-100 text-blue-700'
                                    }`}>
                                    {result.category === 'Automation Risk' && <AlertTriangle className="w-4 h-4 mr-2" />}
                                    {result.category === 'Resilient / Human-Centric' && <ShieldCheck className="w-4 h-4 mr-2" />}
                                    {result.category === 'High Augmentation' && <TrendingUp className="w-4 h-4 mr-2" />}
                                    {result.category}
                                    </div>
                                </div>
                                <div className="text-right hidden sm:block">
                                    <div className="text-sm text-slate-500">AI Impact Score</div>
                                    <div className="text-3xl font-black text-slate-800">{result.score}%</div>
                                </div>
                                </div>

                                <p className="text-lg text-slate-700 leading-relaxed mb-6">
                                {result.reason}
                                </p>

                                {/* Progress Bar (Visual only) */}
                                <div className="w-full bg-slate-100 rounded-full h-3 mb-8">
                                <div 
                                    className={`h-3 rounded-full transition-all duration-1000 ${
                                    result.category === 'Automation Risk' ? 'bg-red-500' : 
                                    result.category === 'Resilient / Human-Centric' ? 'bg-emerald-500' : 
                                    'bg-blue-500'
                                    }`}
                                    style={{ width: `${result.score}%` }}
                                ></div>
                                </div>

                                {/* Actionable Advice */}
                                <div className="bg-slate-50 rounded-lg p-5 border border-slate-100">
                                <h3 className="flex items-center text-indigo-900 font-bold mb-3">
                                    <BookOpen className="w-5 h-5 mr-2" />
                                    Survival Guide
                                </h3>
                                <p className="text-slate-600">
                                    {result.advice}
                                </p>
                                </div>
                            </div>
                            </div>

                            {/* General Stats Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                <div className="flex items-center mb-3 text-emerald-600">
                                <User className="w-5 h-5 mr-2" />
                                <h4 className="font-bold">Human Edge</h4>
                                </div>
                                <p className="text-sm text-slate-600">
                                Jobs requiring empathy, negotiation, and complex physical movement are the safest from full automation.
                                </p>
                            </div>
                            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                <div className="flex items-center mb-3 text-blue-600">
                                <Hammer className="w-5 h-5 mr-2" />
                                <h4 className="font-bold">New Skills</h4>
                                </div>
                                <p className="text-sm text-slate-600">
                                "Prompt Engineering" and "AI Literacy" are becoming as standard as knowing Microsoft Word.
                                </p>
                            </div>
                            </div>

                        </div>
                        )}
                        
                        {/* Default State / Info */}
                        {!result && !loading && (
                        <div className="mt-12 text-center text-slate-400">
                            <p>Try searching for "Accountant", "Plumber", or "Copywriter"</p>
                        </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
