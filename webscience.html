<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SciPashtuUrdu Explorer - PashtunEinstein</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Naskh+Arabic:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.8); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.5); }

        /* Animations */
        @keyframes float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-20px); }
          100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-float-delayed { animation: float 8s ease-in-out infinite reverse; }

        .font-urdu { font-family: 'Noto Nastaliq Urdu', serif; line-height: 2.2; }
        .font-pashto { font-family: 'Noto Naskh Arabic', serif; line-height: 1.8; }
    </style>

    <!-- Import Map for React & Icons -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1"
        }
    }
    </script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { 
            Rocket, Star, Globe, Moon, Sun, 
            Orbit, Zap, Dna, Atom, Microscope, 
            FlaskConical, Info, Sparkles, X, 
            ArrowRight, Languages, BookOpen, 
            Flame, CloudRain, Anchor, Activity, 
            Lightbulb, Magnet, Wind, Thermometer,
            Mountain, Droplets, Sprout, Bug,
            Cpu, Radio, Layers, Bone, Scale,
            Eye, Fingerprint, Tornado, TestTube,
            Copyright, ExternalLink, Brain, Leaf, TreePine, Users,
            Feather, Fish, Box, GraduationCap, Award
        } from 'lucide-react';

        // --- COMPONENTS ---

        const Background = () => (
            <div className="fixed inset-0 z-0 bg-slate-950 overflow-hidden pointer-events-none">
                <div className="absolute inset-0 bg-gradient-to-b from-slate-950 via-blue-950 to-slate-950"></div>
                <div className="absolute inset-0 opacity-10" style={{ 
                    backgroundImage: 'radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1px, transparent 0)',
                    backgroundSize: '40px 40px'
                }}></div>
                <div className="absolute top-20 left-10 animate-float opacity-20"><Atom className="w-20 h-20 md:w-32 md:h-32 text-blue-400" /></div>
                <div className="absolute bottom-40 right-20 animate-float-delayed opacity-20"><Dna className="w-24 h-24 md:w-40 md:h-40 text-purple-400" /></div>
                <div className="absolute top-1/3 right-1/4 animate-pulse opacity-10"><Globe className="w-16 h-16 md:w-24 md:h-24 text-cyan-400" /></div>
            </div>
        );

        const LanguageSelector = ({ currentLang, onSelect }) => {
            const langs = [
                { code: 'en', label: 'English' },
                { code: 'ur', label: 'اردو', font: 'font-urdu' },
                { code: 'ps', label: 'پښتو', font: 'font-pashto' }
            ];

            return (
                <div className="flex items-center bg-slate-800 rounded-full p-1 border border-slate-700 shadow-inner">
                    {langs.map((lang) => (
                        <button
                            key={lang.code}
                            onClick={() => onSelect(lang.code)}
                            className={`px-3 py-1.5 rounded-full text-xs sm:text-sm font-medium transition-all duration-200 ${
                                currentLang === lang.code 
                                ? 'bg-blue-600 text-white shadow-lg' 
                                : 'text-slate-400 hover:text-white hover:bg-slate-700'
                            } ${lang.font || ''}`}
                        >
                            {lang.label}
                        </button>
                    ))}
                </div>
            );
        };

        const LessonModal = ({ topic, onClose, lang }) => {
            if (!topic) return null;
            
            const title = lang === 'ur' ? topic.titleUrdu : lang === 'ps' ? topic.titlePashto : topic.title;
            const type = lang === 'ur' ? topic.typeUrdu : lang === 'ps' ? topic.typePashto : topic.type;
            const fact = lang === 'ur' ? topic.factUrdu : lang === 'ps' ? topic.factPashto : topic.fact;
            const content = lang === 'ur' ? topic.contentUrdu : lang === 'ps' ? topic.contentPashto : topic.content;
            
            const fontClass = lang === 'ur' ? "font-urdu" : lang === 'ps' ? "font-pashto" : "";
            const dir = (lang === 'ur' || lang === 'ps') ? "rtl" : "ltr";

            const labels = {
                fact: { en: 'Scientific Fact', ur: 'دلچسپ حقیقت', ps: 'سائنسي حقیقت' },
                close: { en: 'Close Lesson', ur: 'بند کریں', ps: 'سبق بند کړی' }
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-in fade-in duration-300">
                <div className="relative w-full max-w-2xl bg-slate-900/90 border border-slate-700 rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                    
                    <div className={`h-32 md:h-40 w-full bg-gradient-to-br ${topic.color} relative flex items-center justify-center p-6 md:p-8 overflow-hidden`}>
                    <button 
                        onClick={onClose}
                        className="absolute top-4 right-4 p-2 bg-black/20 hover:bg-black/40 rounded-full text-white transition-colors z-20"
                    >
                        <X className="w-6 h-6" />
                    </button>
                    
                    <div className="absolute inset-0 mix-blend-overlay opacity-50"></div>

                    <div className="text-center z-10 w-full px-4">
                        <span className={`inline-block px-3 py-1 mb-2 text-xs font-bold tracking-widest uppercase bg-black/30 text-white rounded-full backdrop-blur-md border border-white/20 ${fontClass}`}>
                        {type}
                        </span>
                        <h2 className={`text-3xl md:text-5xl font-bold text-white drop-shadow-lg ${fontClass}`}>
                        {title}
                        </h2>
                    </div>
                    </div>

                    <div className="p-6 md:p-8 overflow-y-auto custom-scrollbar flex-1" dir={dir}>
                    <div className="mb-8 p-5 bg-blue-950/50 border border-blue-500/30 rounded-2xl flex gap-4 items-start shadow-[0_0_15px_rgba(59,130,246,0.1)]">
                        <Sparkles className={`w-6 h-6 text-yellow-400 flex-shrink-0 mt-1 ${dir === 'rtl' ? 'ml-2' : 'mr-2'}`} />
                        <div>
                        <h4 className={`text-sm font-bold text-blue-300 uppercase mb-1 ${fontClass}`}>
                            {labels.fact[lang]}
                        </h4>
                        <p className={`text-slate-200 italic text-lg ${fontClass}`}>
                            {fact}
                        </p>
                        </div>
                    </div>

                    <div className={`prose prose-invert max-w-none ${dir === 'rtl' ? 'text-right' : 'text-left'}`}>
                        <p className={`text-lg md:text-xl text-slate-300 leading-relaxed ${fontClass}`}>
                        {content}
                        </p>
                    </div>
                    
                    <div className="mt-10 pt-6 border-t border-slate-800 flex justify-center">
                        <button 
                        onClick={onClose}
                        className="px-8 md:px-10 py-3 bg-gradient-to-r from-slate-800 to-slate-700 hover:from-blue-600 hover:to-purple-600 text-white rounded-full font-medium transition-all border border-slate-600 shadow-lg transform hover:scale-105"
                        >
                        <span className={fontClass}>{labels.close[lang]}</span>
                        </button>
                    </div>
                    </div>
                </div>
                </div>
            );
        };

        const TopicCard = ({ topic, lang, onClick }) => {
            const title = lang === 'ur' ? topic.titleUrdu : lang === 'ps' ? topic.titlePashto : topic.title;
            const type = lang === 'ur' ? topic.typeUrdu : lang === 'ps' ? topic.typePashto : topic.type;
            const fontClass = lang === 'ur' ? "font-urdu" : lang === 'ps' ? "font-pashto" : "";
            const dir = (lang === 'ur' || lang === 'ps') ? "rtl" : "ltr";
            const buttonText = lang === 'ur' ? 'سبق پڑھیں' : lang === 'ps' ? 'سبق ولولئ' : 'Start Lesson';

            return (
                <button
                onClick={() => onClick(topic)}
                className="group relative overflow-hidden rounded-2xl w-full aspect-[4/3] bg-slate-800/50 backdrop-blur-sm border border-slate-700 transition-all hover:scale-[1.02] hover:border-blue-500/50 hover:shadow-[0_0_25px_rgba(59,130,246,0.15)] text-left p-6 flex flex-col justify-between"
                dir={dir}
                >
                <div className={`absolute inset-0 bg-gradient-to-br ${topic.color} opacity-0 group-hover:opacity-10 transition-opacity duration-500`} />
                
                <div className={`relative z-10 flex flex-col ${dir === 'rtl' ? 'items-end' : 'items-start'}`}>
                    <span className={`text-xs font-mono text-slate-500 group-hover:text-blue-300 transition-colors bg-slate-900/50 px-2 py-1 rounded ${fontClass}`}>
                    {type}
                    </span>
                    <h4 className={`text-2xl font-bold text-slate-100 mt-2 group-hover:text-white ${fontClass}`}>
                    {title}
                    </h4>
                </div>

                <div className={`relative z-10 flex items-center gap-2 text-sm font-medium text-slate-400 group-hover:text-blue-400 transition-colors mt-4 ${dir === 'rtl' ? 'flex-row-reverse self-end' : ''}`}>
                    <span className={fontClass}>{buttonText}</span>
                    <ArrowRight className={`w-4 h-4 transform transition-transform ${dir === 'rtl' ? 'rotate-180 group-hover:-translate-x-1' : 'group-hover:translate-x-1'}`} />
                </div>
                </button>
            );
        };

        // --- DATA (70+ Topics with Detailed Content) ---
        const SCIENCE_DATA = [
            {
                id: 'space',
                title: 'Space & Astronomy',
                titleUrdu: 'خلا اور فلکیات',
                titlePashto: 'فضا او ستورپوهنه',
                icon: <Rocket className="w-6 h-6 text-purple-400" />,
                description: 'Explore the mysteries of the universe.',
                descriptionUrdu: 'کائنات کے اسرار دریافت کریں۔',
                descriptionPashto: 'د کائنات رازونه وپلټئ.',
                gradient: 'from-indigo-500/20 to-purple-500/20',
                topics: [
                    { id: 'sun', title: 'The Sun', titleUrdu: 'سورج', titlePashto: 'لمر', type: 'Star', typeUrdu: 'ستارہ', typePashto: 'ستوری', color: 'from-orange-400 to-red-600', fact: 'The Sun makes up 99.86% of the mass of the entire Solar System!', factUrdu: 'نظام شمسی کا 99.86 فیصد وزن صرف سورج کا ہے!', factPashto: 'لمر د ټول شمسي نظام ۹۹.۸۶٪ وزن جوړوي!', content: 'The Sun is the star at the center of our Solar System. It is a nearly perfect sphere of hot plasma, heated to incandescence by nuclear fusion reactions in its core. The Sun radiates this energy mainly as light, ultraviolet, and infrared radiation, and is the most important source of energy for life on Earth. Without the Sun\'s intense energy and heat, there would be no life on our planet; it would be a frozen, dark rock floating in space. The Sun is so massive that its gravity holds the solar system together, keeping everything from the biggest planets to the smallest particles of debris in its orbit.', contentUrdu: 'سورج ہمارے نظام شمسی کے مرکز میں واقع ستارہ ہے۔ یہ گرم پلازما کا تقریبا ایک مکمل دائرہ ہے، جو اپنے مرکز میں نیوکلیائی عمل کے ذریعے شدید گرم ہوتا ہے۔ سورج یہ توانائی زیادہ تر روشنی اور حرارت کی شکل میں خارج کرتا ہے، اور یہ زمین پر زندگی کے لیے توانائی کا سب سے اہم ذریعہ ہے۔ سورج کی شدید توانائی اور حرارت کے بغیر، ہمارے سیارے پر کوئی زندگی نہیں ہوگی؛ یہ خلا میں تیرتا ہوا ایک منجمد، تاریک چٹان ہوگا۔ سورج اتنا بڑا ہے کہ اس کی کشش ثقل نظام شمسی کو جوڑے رکھتی ہے، اور بڑے سیاروں سے لے کر چھوٹے ذرات تک ہر چیز کو اپنے مدار میں رکھتی ہے۔', contentPashto: 'لمر زموږ د شمسي نظام په مرکز کې ستوری دی. دا د ګرم پلازما یوه نږدې بشپړه کره ده، چې په خپل کور کې د اټومي فیوژن تعاملاتو لخوا ګرمیږي. لمر دا انرژي په عمده توګه د رڼا او تودوخې په توګه خپروي، او په ځمکه کې د ژوند لپاره د انرژي ترټولو مهمه سرچینه ده. د لمر د شدیدې انرژۍ او تودوخې پرته، زموږ په سیاره کې به ژوند نه وي؛ دا به په فضا کې یو کنګل، تیاره ډبره وي. لمر دومره لوی دی چې جاذبه یې شمسي نظام یوځای ساتي، او له لویو سیارو څخه نیولې تر کوچنیو ذراتو پورې هرڅه په خپل مدار کې ساتي.' },
                    { id: 'moon', title: 'The Moon', titleUrdu: 'چاند', titlePashto: 'سپوږمۍ', type: 'Satellite', typeUrdu: 'قدرتی سیارہ', typePashto: 'سپوږمکۍ', color: 'from-slate-300 to-slate-500', fact: 'The Moon is drifting away from Earth by about 3.8 cm every year.', factUrdu: 'چاند ہر سال زمین سے 3.8 سینٹی میٹر دور جا رہا ہے۔', factPashto: 'سپوږمۍ هر کال له ځمکې څخه ۳.۸ سانتي متره لرې کیږي.', content: 'The Moon is Earth\'s only natural satellite and the fifth largest satellite in the Solar System. It is thought to have formed about 4.5 billion years ago, not long after Earth. The Moon\'s gravitational influence produces the ocean tides, body tides, and the slight lengthening of the day. Unlike Earth, the Moon has very thin atmosphere, called an exosphere, so it cannot support life or protect itself from meteors. We always see the same face of the Moon because it is tidally locked to Earth, meaning it rotates on its axis at the same speed it orbits our planet.', contentUrdu: 'چاند زمین کا واحد قدرتی سیارہ ہے اور نظام شمسی کا پانچواں بڑا سیارہ ہے۔ خیال کیا جاتا ہے کہ یہ تقریباً 4.5 ارب سال پہلے بنا تھا، زمین کے بننے کے کچھ ہی عرصہ بعد۔ چاند کی کشش ثقل سمندری لہریں پیدا کرتی ہے اور دن کو تھوڑا سا لمبا کرتی ہے۔ زمین کے برعکس، چاند کی فضا بہت پتلی ہے، لہذا یہ زندگی کو سہارا نہیں دے سکتا اور نہ ہی خود کو شہاب ثاقب سے بچا سکتا ہے۔ ہم ہمیشہ چاند کا ایک ہی رخ دیکھتے ہیں کیونکہ یہ زمین کے ساتھ جڑا ہوا ہے، یعنی یہ اپنے محور پر اسی رفتار سے گھومتا ہے جس رفتار سے یہ ہمارے سیارے کے گرد چکر لگاتا ہے۔', contentPashto: 'سپوږمۍ د ځمکې یوازینۍ طبیعي سپوږمکۍ ده او په شمسي نظام کې پنځمه لویه سپوږمکۍ ده. داسې انګیرل کیږي چې دا شاوخوا ۴.۵ ملیارد کاله دمخه رامینځته شوې. د سپوږمۍ جاذبه د سمندر څپې رامینځته کوي او ورځ یو څه اوږدوي. د ځمکې برعکس، سپوږمۍ ډیر نازک اتموسفیر لري، نو دا نشي کولی د ژوند ملاتړ وکړي یا ځان د اسماني ډبرو څخه خوندي کړي. موږ تل د سپوږمۍ یو مخ وینو ځکه چې دا په خپل محور کې په ورته سرعت سره څرخیږي لکه څنګه چې دا زموږ د سیارې شاوخوا ګرځي.' },
                    { id: 'earth', title: 'Earth', titleUrdu: 'زمین', titlePashto: 'ځمکه', type: 'Planet', typeUrdu: 'سیارہ', typePashto: 'سیاره', color: 'from-blue-400 to-green-500', fact: 'Earth is the only planet known to have liquid water on its surface.', factUrdu: 'زمین واحد سیارہ ہے جس کی سطح پر مائع پانی موجود ہے۔', factPashto: 'ځمکه یوازینۍ سیاره ده چې په سطح یې مایع اوبه شتون لري.', content: 'Earth is the third planet from the Sun and the only astronomical object known to harbor life. About 29% of Earth\'s surface is land consisting of continents and islands. The remaining 71% is covered with water, mostly by oceans but also lakes, rivers, and other fresh water, which together constitute the hydrosphere. Earth\'s atmosphere consists mostly of nitrogen and oxygen. It protects us from the sun\'s harmful rays and meteoroids. Earth orbits the sun once every 365.25 days, which is why we have a leap year every four years.', contentUrdu: 'زمین سورج سے تیسرا سیارہ ہے اور واحد معلوم سیارہ ہے جہاں زندگی موجود ہے۔ زمین کی سطح کا تقریباً 29 فیصد حصہ خشکی پر مشتمل ہے جس میں براعظم اور جزیرے شامل ہیں۔ باقی 71 فیصد پانی سے ڈھکا ہوا ہے، زیادہ تر سمندروں سے، لیکن جھیلیں اور دریا بھی شامل ہیں۔ زمین کی فضا زیادہ تر نائٹروجن اور آکسیجن پر مشتمل ہے۔ یہ ہمیں سورج کی نقصان دہ شعاعوں اور شہاب ثاقب سے بچاتی ہے۔ زمین ہر 365.25 دنوں میں سورج کے گرد ایک چکر مکمل کرتی ہے، اسی لیے ہر چار سال بعد لیپ کا سال ہوتا ہے۔', contentPashto: 'ځمکه له لمر څخه دریمه سیاره ده او یوازینی سیاره ده چې ژوند پکې شتون لري. د ځمکې د سطحې شاوخوا ۲۹٪ ځمکه ده چې لویی وچې او ټاپوګان پکې شامل دي. پاتې ۷۱٪ په اوبو پوښل شوي، چې ډیری یې سمندرونه دي، مګر جهیلونه او سیندونه هم پکې شامل دي. د ځمکې اتموسفیر ډیری نایتروجن او اکسیجن لري. دا موږ د لمر له زیان رسوونکو وړانګو او اسماني ډبرو څخه ساتي. ځمکه په هر ۳۶۵.۲۵ ورځو کې یو ځل د لمر شاوخوا ګرځي.' },
                    { id: 'mars', title: 'Mars', titleUrdu: 'مریخ', titlePashto: 'مریخ', type: 'Planet', typeUrdu: 'سیارہ', typePashto: 'سیاره', color: 'from-red-500 to-orange-700', fact: 'Mars appears red because of iron oxide (rust) on its surface.', factUrdu: 'مریخ اپنی سطح پر زنگ کی وجہ سے سرخ نظر آتا ہے۔', factPashto: 'مریخ د زنګ (اوسپنې اکسایډ) له امله سور ښکاري.', content: 'Mars is the fourth planet from the Sun and the second-smallest planet in the Solar System. It is often called the "Red Planet" because the iron oxide prevalent on its surface gives it a reddish appearance. Mars is a terrestrial planet with a thin atmosphere, having surface features reminiscent both of the impact craters of the Moon and the valleys, deserts, and polar ice caps of Earth. Scientists are very interested in Mars because it may have had liquid water in the past, which means it might have supported microscopic life forms billions of years ago.', contentUrdu: 'مریخ سورج سے چوتھا سیارہ ہے اور نظام شمسی کا دوسرا سب سے چھوٹا سیارہ ہے۔ اسے اکثر "سرخ سیارہ" کہا جاتا ہے کیونکہ اس کی سطح پر موجود آئرن آکسائیڈ اسے سرخی مائل رنگ دیتا ہے۔ مریخ ایک زمینی سیارہ ہے جس کی فضا پتلی ہے، اور اس کی سطح پر چاند کی طرح گڑھے اور زمین کی طرح وادیاں، صحرا اور قطبی برف کی چوٹیاں ہیں۔ سائنسدان مریخ میں بہت دلچسپی رکھتے ہیں کیونکہ ماضی میں یہاں مائع پانی ہو سکتا تھا، جس کا مطلب ہے کہ اربوں سال پہلے یہاں خوردبینی زندگی موجود ہو سکتی تھی۔', contentPashto: 'مریخ له لمر څخه څلورمه سیاره ده او په شمسي نظام کې دویمه کوچنۍ سیاره ده. دا ډیری وختونه د "سرې سیارې" په نوم یادیږي ځکه چې د هغې په سطح کې د اوسپنې اکسایډ دا سور رنګ ورکوي. مریخ یوه ځمکنۍ سیاره ده چې نری اتموسفیر لري، او سطح یې د سپوږمۍ په څیر کندې او د ځمکې په څیر وادۍ او صحراګانې لري. ساینس پوهان په مریخ کې ډیره علاقه لري ځکه چې ممکن په تیرو وختونو کې هلته مایع اوبه موجودې وې، پدې معنی چې ملیاردونه کاله دمخه هلته مایکروسکوپي ژوند شتون درلود.' },
                    { id: 'jupiter', title: 'Jupiter', titleUrdu: 'مشتری', titlePashto: 'مشتري', type: 'Gas Giant', typeUrdu: 'گیس دیو', typePashto: 'د ګاز لوی', color: 'from-orange-300 to-yellow-600', fact: 'Jupiter is so big that 1,300 Earths could fit inside it.', factUrdu: 'مشتری اتنا بڑا ہے کہ اس میں 1,300 زمینیں سما سکتی ہیں۔', factPashto: 'مشتري دومره لوی دی چې ۱۳۰۰ ځمکې پکې ځای کیدی شي.', content: 'Jupiter is the fifth planet from the Sun and the largest in the Solar System. It is a gas giant with a mass one-thousandth that of the Sun, but two-and-a-half times that of all the other planets in the Solar System combined. Jupiter lacks a well-defined solid surface. Because of its rapid rotation, the planet possesses a slight bulge around the equator. It is known for its Great Red Spot, a giant storm that is bigger than Earth and has been raging for hundreds of years.', contentUrdu: 'مشتری سورج سے پانچواں سیارہ ہے اور نظام شمسی کا سب سے بڑا سیارہ ہے۔ یہ ایک گیس دیو ہے جس کا وزن سورج کا ہزارواں حصہ ہے، لیکن نظام شمسی کے دیگر تمام سیاروں کے مجموعی وزن سے ڈھائی گنا زیادہ ہے۔ مشتری کی کوئی ٹھوس سطح نہیں ہے۔ اپنی تیز گردش کی وجہ سے، یہ سیارہ خط استوا کے گرد تھوڑا ابھرا ہوا ہے۔ یہ اپنے "عظیم سرخ دھبے" کے لیے جانا جاتا ہے، جو ایک بہت بڑا طوفان ہے جو زمین سے بھی بڑا ہے اور سینکڑوں سالوں سے جاری ہے۔', contentPashto: 'مشتري له لمر څخه پنځمه سیاره ده او په شمسي نظام کې ترټولو لویه ده. دا یو ګازي لوی دی چې وزن یې د لمر د زرو برخې یوه برخه ده، مګر د نورو ټولو سیارو په پرتله دوه نیم چنده ډیر دی. مشتري یوه ټاکلې کلکه سطحه نلري. د دې ګړندي گردش له امله، سیاره د استوا په شاوخوا کې لږ څه پړسیدلې ده. دا د خپل لوی سور ځای لپاره پیژندل کیږي، یو لوی طوفان چې د ځمکې څخه لوی دی او د سلګونو کلونو راهیسې روان دی.' },
                    { id: 'saturn', title: 'Saturn', titleUrdu: 'زحل', titlePashto: 'زحل', type: 'Gas Giant', typeUrdu: 'گیس دیو', typePashto: 'د ګاز لوی', color: 'from-yellow-200 to-orange-300', fact: 'Saturn\'s rings are made mostly of ice and rock.', factUrdu: 'زحل کے حلقے برف اور چٹانوں سے بنے ہیں۔', factPashto: 'د زحل کړۍ اکثرا د واورې او ډبرو څخه جوړې شوي دي.', content: 'Saturn is the sixth planet from the Sun and the second-largest in the Solar System, after Jupiter. It is a gas giant with an average radius of about nine and a half times that of Earth. It has only one-eighth the average density of Earth; however, with its larger volume, Saturn is over 95 times more massive. Saturn is famous for its prominent ring system, which is composed mostly of ice particles, with a smaller amount of rocky debris and dust.', contentUrdu: 'زحل سورج سے چھٹا سیارہ ہے اور مشتری کے بعد نظام شمسی کا دوسرا سب سے بڑا سیارہ ہے۔ یہ ایک گیس دیو ہے جس کا اوسط رداس زمین سے تقریباً ساڑھے نو گنا زیادہ ہے۔ اس کی اوسط کثافت زمین کے مقابلے میں صرف آٹھواں حصہ ہے؛ تاہم، اپنے بڑے حجم کی وجہ سے، زحل 95 گنا زیادہ وزنی ہے۔ زحل اپنے نمایاں حلقوں کے نظام کے لیے مشہور ہے، جو زیادہ تر برف کے ذرات، اور تھوڑی مقدار میں چٹانی ملبے اور دھول سے بنا ہے۔', contentPashto: 'زحل له لمر څخه شپږمه سیاره ده او له مشتري وروسته په شمسي نظام کې دویمه لویه سیاره ده. دا یو ګازي لوی دی چې اوسط وړانګې یې د ځمکې په پرتله شاوخوا نهه نیم چنده دي. دا د ځمکې د اوسط کثافت یوازې اتمه برخه لري؛ په هرصورت، د خپل لوی حجم سره، زحل له ۹۵ ځله ډیر وزن لري. زحل د خپل مشهور حلقوي سیسټم لپاره مشهور دی، چې ډیری یې د یخ ذراتو څخه جوړ شوي، د لږ مقدار ډبرې او دوړو سره.' },
                    { id: 'uranus', title: 'Uranus', titleUrdu: 'یورینس', titlePashto: 'یورینس', type: 'Ice Giant', typeUrdu: 'برفیلا دیو', typePashto: 'یخ لوی', color: 'from-cyan-300 to-blue-400', fact: 'Uranus rotates on its side, rolling like a ball.', factUrdu: 'یورینس اپنی سائیڈ پر گھومتا ہے، جیسے گیند لڑھک رہی ہو۔', factPashto: 'یورینس په خپل اړخ څرخیږي، لکه د توپ په څیر.', content: 'Uranus is the seventh planet from the Sun. Its name is a reference to the Greek god of the sky, Uranus. It has the third-largest planetary radius and fourth-largest planetary mass in the Solar System. Uranus is similar in composition to Neptune, and both have bulk chemical compositions which differ from that of the larger gas giants Jupiter and Saturn. For this reason, scientists often classify Uranus and Neptune as "ice giants".', contentUrdu: 'یورینس سورج سے ساتواں سیارہ ہے۔ اس کا نام آسمان کے یونانی دیوتا یورینس کے حوالے سے ہے۔ یہ نظام شمسی میں تیسرا سب سے بڑا سیارہ اور چوتھا سب سے زیادہ کمیت والا سیارہ ہے۔ یورینس ساخت میں نیپچون سے ملتا جلتا ہے، اور دونوں کی کیمیائی ساخت بڑے گیس دیو مشتری اور زحل سے مختلف ہے۔ اس وجہ سے، سائنسدان اکثر یورینس اور نیپچون کو "برفانی دیو" کے طور پر درجہ بندی کرتے ہیں۔', contentPashto: 'یورینس له لمر څخه اوومه سیاره ده. د دې نوم د اسمان یوناني خدای، یورینس ته اشاره ده. دا په شمسي نظام کې د سیارې دریمه لویه وړانګې او څلورم لوی سیارې ډله لري. یورینس په جوړښت کې نیپچون ته ورته دی، او دواړه لوی کیمیاوي ترکیبونه لري چې د لوی ګاز جنات مشتري او زحل څخه توپیر لري. د دې دلیل لپاره، ساینس پوهان ډیری وختونه یورینس او نیپچون د "یخ جنات" په توګه طبقه بندي کوي.' },
                    { id: 'neptune', title: 'Neptune', titleUrdu: 'نیپچون', titlePashto: 'نیپچون', type: 'Ice Giant', typeUrdu: 'برفیلا دیو', typePashto: 'یخ لوی', color: 'from-blue-600 to-indigo-700', fact: 'Neptune has the strongest winds in the solar system.', factUrdu: 'نیپچون پر نظام شمسی کی سب سے تیز ہوائیں چلتی ہیں۔', factPashto: 'نیپچون په شمسي نظام کې تر ټولو تیز بادونه لري.', content: 'Neptune is the eighth and farthest-known Solar planet from the Sun. In the Solar System, it is the fourth-largest planet by diameter, the third-most-massive planet, and the densest giant planet. It is 17 times the mass of Earth, slightly more massive than its near-twin Uranus. Neptune is darker, colder, and much windier than Uranus. Its atmosphere is notable for its active and visible weather patterns.', contentUrdu: 'نیپچون سورج سے آٹھواں اور سب سے دور معلوم نظام شمسی کا سیارہ ہے۔ نظام شمسی میں، یہ قطر کے لحاظ سے چوتھا سب سے بڑا سیارہ، تیسرا سب سے زیادہ کمیت والا سیارہ، اور سب سے گھنا دیو ہیکل سیارہ ہے۔ یہ زمین کی کمیت سے 17 گنا زیادہ ہے، اور اپنے جڑواں یورینس سے تھوڑا زیادہ بھاری ہے۔ نیپچون یورینس سے زیادہ تاریک، سرد اور ہوا دار ہے۔ اس کا ماحول اپنے فعال اور نظر آنے والے موسمی نمونوں کے لیے قابل ذکر ہے۔', contentPashto: 'نیپچون له لمر څخه اتمه او تر ټولو لرې پیژندل شوې سیاره ده. په شمسي نظام کې، دا د قطر له مخې څلورمه لویه سیاره، دریمه لویه ډله ایزه سیاره، او تر ټولو کثافت لرونکی لوی سیاره ده. دا د ځمکې د وزن ۱۷ چنده دی، د خپل نږدې جوړه یورینس څخه لږ څه ډیر لوی دی. نیپچون د یورینس په پرتله تیاره، سړه او ډیر باد لري. د دې اتموسفیر د فعال او لید وړ هوا نمونو لپاره د پام وړ دی.' },
                    { id: 'pluto', title: 'Pluto', titleUrdu: 'پلوٹو', titlePashto: 'پلوټو', type: 'Dwarf Planet', typeUrdu: 'بونا سیارہ', typePashto: 'کوتۍ سیاره', color: 'from-stone-400 to-stone-600', fact: 'Pluto is smaller than Earth\'s moon.', factUrdu: 'پلوٹو زمین کے چاند سے بھی چھوٹا ہے۔', factPashto: 'پلوټو د ځمکې د سپوږمۍ څخه کوچنی دی.', content: 'Pluto is a dwarf planet in the Kuiper belt, a ring of bodies beyond the orbit of Neptune. It was the first and the largest Kuiper belt object to be discovered. After Pluto was discovered in 1930, it was declared to be the ninth planet from the Sun. However, beginning in the 1990s, its status as a planet was questioned following the discovery of several objects of similar size in the Kuiper belt.', contentUrdu: 'پلوٹو کائپر بیلٹ میں ایک بونا سیارہ ہے، جو نیپچون کے مدار سے پرے اجسام کا ایک حلقہ ہے۔ یہ دریافت ہونے والا پہلا اور سب سے بڑا کائپر بیلٹ آبجیکٹ تھا۔ 1930 میں پلوٹو کی دریافت کے بعد، اسے سورج سے نواں سیارہ قرار دیا گیا۔ تاہم، 1990 کی دہائی کے آغاز سے، کائپر بیلٹ میں اسی سائز کی کئی چیزوں کی دریافت کے بعد اس کی سیارے کی حیثیت پر سوال اٹھایا گیا۔', contentPashto: 'پلوټو په کوپر بیلټ کې یوه بونه سیاره ده، چې د نیپچون له مدار څخه بهر د اجسامو یوه حلقه ده. دا د کوپر بیلټ لومړی او ترټولو لوی څیز و چې کشف شو. وروسته له دې چې پلوټو په ۱۹۳۰ کې کشف شو، دا له لمر څخه نهمه سیاره اعلان شوه. په هرصورت، د ۱۹۹۰ لسیزې په پیل کې، د کوپر بیلټ کې د ورته اندازې ډیری شیانو له موندلو وروسته د یوې سیارې په توګه د دې وضعیت پوښتنې لاندې راغی.' },
                    { id: 'black-hole', title: 'Black Hole', titleUrdu: 'بلیک ہول', titlePashto: 'تور سوري', type: 'Phenomenon', typeUrdu: 'مظہر', typePashto: 'پدیده', color: 'from-slate-900 to-black', fact: 'Nothing can escape a black hole, not even light.', factUrdu: 'بلیک ہول سے روشنی بھی نہیں بچ سکتی۔', factPashto: 'هیڅ شی د تور سوري څخه نشي تیښتیدلی، حتی رڼا.', content: 'A black hole is a region of spacetime where gravity is so strong that nothing—no particles or even electromagnetic radiation such as light—can escape from it. The theory of general relativity predicts that a sufficiently compact mass can deform spacetime to form a black hole. Most black holes form from the remnants of a large star that dies in a supernova explosion. Because no light can get out, they are invisible, but we can find them by observing how their strong gravity affects the stars and gas around them.', contentUrdu: 'بلیک ہول خلائی وقت کا وہ خطہ ہے جہاں کشش ثقل اتنی مضبوط ہے کہ کوئی چیز—کوئی ذرات یا روشنی جیسی برقی مقناطیسی تابکاری—اس سے نہیں بچ سکتی۔ عمومی اضافیت کا نظریہ پیش گوئی کرتا ہے کہ اگر کوئی چیز کافی کثیف ہو تو وہ بلیک ہول بنا سکتی ہے۔ زیادہ تر بلیک ہولز ایک بڑے ستارے کی باقیات سے بنتے ہیں جو سپر نووا دھماکے میں مر جاتا ہے۔ چونکہ کوئی روشنی باہر نہیں آ سکتی، اس لیے یہ نظر نہیں آتے، لیکن ہم ان کے گرد موجود ستاروں اور گیس پر ان کی کشش ثقل کے اثرات دیکھ کر انہیں تلاش کر سکتے ہیں۔', contentPashto: 'تور سوري د فضا یوه سیمه ده چیرې چې جاذبه دومره قوي ده چې هیڅ شی - هیڅ ذرات یا حتی بریښنایی مقناطیسي وړانګې لکه رڼا - نشي کولی له هغې څخه وتښتي. د عمومي نسبیت تیوري وړاندوینه کوي چې یو کافي کثافت لرونکی شی کولی شي تور سوری جوړ کړي. ډیری تور سوري د یو لوی ستوري له پاتې شونو څخه رامینځته کیږي چې د سپر نووا په چاودنه کې مري. څرنګه چې رڼا نشي وتلی، دوی د لیدو وړ ندي، مګر موږ کولی شو د دوی شاوخوا ستورو او ګاز باندې د دوی د قوي جاذبې اغیزې مشاهده کولو سره ومومو.' },
                    { id: 'galaxy', title: 'Galaxy', titleUrdu: 'کہکشاں', titlePashto: 'کهکشان', type: 'Structure', typeUrdu: 'ساخت', typePashto: 'جوړښت', color: 'from-purple-600 to-pink-600', fact: 'The Milky Way contains over 100 billion stars.', factUrdu: 'ہماری کہکشاں میں 100 ارب سے زیادہ ستارے ہیں۔', factPashto: 'زموږ په کهکشان کې له ۱۰۰ ملیارد څخه ډیر ستوري دي.', content: 'A galaxy is a huge collection of gas, dust, and billions of stars and their solar systems, all held together by gravity. A galaxy is held together by gravity. Our Solar System is in a galaxy called the Milky Way. Scientists estimate there are over 100 billion galaxies in the observable universe. Galaxies can be spiral, elliptical, or irregular in shape. At the center of most galaxies, including ours, there is a supermassive black hole.', contentUrdu: 'کہکشاں گیس، دھول، اور اربوں ستاروں اور ان کے نظام شمسی کا ایک بہت بڑا مجموعہ ہے، جو سب کشش ثقل کے ذریعے جڑے ہوئے ہیں۔ ہمارا نظام شمسی ملکی وے نامی کہکشاں میں ہے۔ سائنسدانوں کا اندازہ ہے کہ قابل مشاہدہ کائنات میں 100 ارب سے زیادہ کہکشائیں ہیں۔ کہکشائیں سرپل، بیضوی یا بے قاعدہ شکل کی ہو سکتی ہیں۔ ہماری کہکشاں سمیت زیادہ تر کہکشاؤں کے مرکز میں ایک بہت بڑا بلیک ہول ہوتا ہے۔', contentPashto: 'کهکشان د ګاز، دوړو او ملیاردونو ستورو او د هغوی د شمسي سیسټمونو یوه لویه ټولګه ده، چې ټول د جاذبې لخوا یوځای ساتل شوي. زموږ شمسي نظام په یوه کهکشان کې دی چې د شیدو لاره نومیږي. ساینس پوهان اټکل کوي چې په لیدل شوي کائنات کې له ۱۰۰ ملیارد څخه ډیر کهکشانونه شتون لري. کهکشانونه کیدای شي سرپل، بیضوي، یا په شکل کې غیر منظم وي. د ډیری کهکشانونو په مرکز کې، زموږ په شمول، یو خورا لوی تور سوری شتون لري.' },
                    { id: 'asteroid', title: 'Asteroid', titleUrdu: 'سیارچہ', titlePashto: 'سیارک', type: 'Rock', typeUrdu: 'چٹان', typePashto: 'ډبره', color: 'from-stone-500 to-stone-700', fact: 'Most asteroids orbit between Mars and Jupiter.', factUrdu: 'زیادہ تر سیارچے مریخ اور مشتری کے درمیان ہوتے ہیں۔', factPashto: 'ډیری سیارکونه د مریخ او مشتري ترمنځ دي.', content: 'Asteroids are small, rocky objects that orbit the Sun. Although asteroids orbit the Sun like planets, they are much smaller than planets. There are lots of asteroids in our solar system. Most of them live in the main asteroid belt—a region between the orbits of Mars and Jupiter. Asteroids are leftovers from the formation of our solar system about 4.6 billion years ago.', contentUrdu: 'سیارچے چھوٹے، چٹانی اجسام ہیں جو سورج کے گرد گھومتے ہیں۔ اگرچہ سیارچے سیاروں کی طرح سورج کے گرد چکر لگاتے ہیں، لیکن وہ سیاروں سے بہت چھوٹے ہوتے ہیں۔ ہمارے نظام شمسی میں بہت سے سیارچے ہیں۔ ان میں سے زیادہ تر مین ایسٹروئیڈ بیلٹ میں رہتے ہیں—مریخ اور مشتری کے مدار کے درمیان کا خطہ۔ سیارچے تقریباً 4.6 ارب سال پہلے ہمارے نظام شمسی کی تشکیل سے بچ جانے والی باقیات ہیں۔', contentPashto: 'سیارکونه کوچني، ډبرین شیان دي چې د لمر شاوخوا ګرځي. که څه هم سیارکونه د سیارې په څیر د لمر شاوخوا ګرځي، دوی د سیارونو په پرتله خورا کوچني دي. زموږ په شمسي نظام کې ډیری سیارکونه شتون لري. ډیری یې د اصلي سیارک بیلټ کې ژوند کوي - د مریخ او مشتري مدارونو ترمنځ یوه سیمه. سیارکونه شاوخوا ۴.۶ ملیارد کاله دمخه زموږ د لمریز سیسټم له رامینځته کیدو څخه پاتې شوي دي.' },
                    { id: 'comet', title: 'Comet', titleUrdu: 'دمدار ستارہ', titlePashto: 'لکۍ لرونکی ستوری', type: 'Ice', typeUrdu: 'برف', typePashto: 'یخ', color: 'from-cyan-200 to-blue-400', fact: 'Comets are dirty snowballs of space.', factUrdu: 'دمدار ستارے خلا کے گندے برف کے گولے ہیں۔', factPashto: 'لکۍ لرونکي ستوري د فضا ناپاکه د واورې توپونه دي.', content: 'A comet is an icy, small Solar System body that, when passing close to the Sun, warms and begins to release gases, a process called outgassing. This produces a visible atmosphere or coma, and sometimes also a tail. Comets contain dust, ice, carbon dioxide, ammonia, methane and more. Astronomers think comets are leftovers from the gas, dust, ice and rocks that initially formed the solar system about 4.6 billion years ago.', contentUrdu: 'دمدار ستارہ ایک برفیلا، چھوٹا نظام شمسی کا جسم ہے جو سورج کے قریب سے گزرتے وقت گرم ہو جاتا ہے اور گیسیں خارج کرنا شروع کر دیتا ہے۔ یہ ایک نظر آنے والا ماحول یا کوما، اور بعض اوقات دم بھی پیدا کرتا ہے۔ دمدار ستاروں میں دھول، برف، کاربن ڈائی آکسائیڈ، امونیا، میتھین اور بہت کچھ ہوتا ہے۔ ماہرین فلکیات کا خیال ہے کہ دمدار ستارے گیس، دھول، برف اور چٹانوں کی باقیات ہیں جنہوں نے ابتدائی طور پر تقریباً 4.6 ارب سال پہلے نظام شمسی تشکیل دیا تھا۔', contentPashto: 'لکۍ لرونکی ستوری یو یخ، کوچنی شمسي سیسټم دی چې کله لمر ته نږدې تیریږي، ګرمیږي او د ګازونو خوشې کول پیل کوي. دا یو لیدل شوی اتموسفیر یا کوما تولیدوي، او ځینې وختونه لکۍ هم. لکۍ لرونکي ستوري دوړې، یخ، کاربن ډای اکسایډ، امونیا، میتان او نور ډیر څه لري. ستورپوهان فکر کوي چې لکۍ لرونکي ستوري د ګاز، دوړو، یخ او ډبرو څخه پاتې دي چې په پیل کې شاوخوا ۴.۶ ملیارد کاله دمخه شمسي سیسټم رامینځته کړی.' },
                    { id: 'meteor', title: 'Meteor', titleUrdu: 'شہاب ثاقب', titlePashto: 'د اسمان ډبره', type: 'Rock', typeUrdu: 'چٹان', typePashto: 'ډبره', color: 'from-orange-300 to-red-400', fact: 'A shooting star is actually a meteor burning up.', factUrdu: 'ٹوٹتا تارہ دراصل ایک جلتا ہوا شہاب ثاقب ہے۔', factPashto: 'وریدونکی ستوری په اصل کې یوه سوځیدونکې ډبره ده.', content: 'A meteor is a space rock—or meteoroid—that enters Earth\'s atmosphere. As it falls toward Earth, the resistance—or drag—of the air on the rock makes it extremely hot. What we see is a "shooting star." That tail is not actually the rock, but rather the glowing hot air as the hot rock zips through the atmosphere. When Earth encounters many meteoroids at once, we call it a meteor shower.', contentUrdu: 'شہاب ثاقب ایک خلائی چٹان ہے—یا میٹرائڈ—جو زمین کی فضا میں داخل ہوتی ہے۔ جیسے ہی یہ زمین کی طرف گرتا ہے، چٹان پر ہوا کی مزاحمت—یا ڈریگ—اسے انتہائی گرم بنا دیتی ہے۔ جو ہم دیکھتے ہیں وہ ایک "ٹوٹتا ہوا تارہ" ہے۔ وہ دم دراصل چٹان نہیں ہے، بلکہ چمکتی ہوئی گرم ہوا ہے کیونکہ گرم چٹان فضا سے گزرتی ہے۔ جب زمین ایک ہی وقت میں بہت سے میٹرائڈز کا سامنا کرتی ہے، تو ہم اسے میٹیور شاور کہتے ہیں۔', contentPashto: 'د اسمان ډبره یوه فضایی ډبره ده — یا میټروایډ — چې د ځمکې اتموسفیر ته ننوځي. لکه څنګه چې دا د ځمکې په لور راښکته کیږي، په ډبره کې د هوا مقاومت دا خورا ګرموي. هغه څه چې موږ ګورو یو "وریدونکی ستوری" دی. دا لکۍ په حقیقت کې ډبره نه ده، بلکې ځلیږي ګرمه هوا ده ځکه چې ګرمه ډبره د اتموسفیر له لارې تیریږي. کله چې ځمکه په یو وخت کې د ډیری میټروایډونو سره مخ کیږي، موږ ورته د میټرو شاور وایو.' },
                    { id: 'big-bang', title: 'Big Bang', titleUrdu: 'بگ بینگ', titlePashto: 'لوی بنګ', type: 'Theory', typeUrdu: 'نظریہ', typePashto: 'نظریه', color: 'from-fuchsia-600 to-purple-900', fact: 'The universe is still expanding.', factUrdu: 'کائنات اب بھی پھیل رہا ہے۔', factPashto: 'کائنات لاهم پراخیږي.', content: 'The Big Bang theory is the prevailing cosmological model for the universe from the earliest known periods through its subsequent large-scale evolution. The model describes how the universe expanded from an initial state of high density and temperature, and offers a comprehensive explanation for a broad range of observed phenomena, including the abundance of light elements, the cosmic microwave background (CMB) radiation, and large-scale structure.', contentUrdu: 'بگ بینگ تھیوری ابتدائی معلوم ادوار سے لے کر اس کے بعد کے بڑے پیمانے پر ارتقاء تک کائنات کا مروجہ کائناتی ماڈل ہے۔ ماڈل یہ بیان کرتا ہے کہ کس طرح کائنات اعلی کثافت اور درجہ حرارت کی ابتدائی حالت سے پھیلی، اور مشاہدہ شدہ مظاہر کی ایک وسیع رینج کے لیے ایک جامع وضاحت پیش کرتی ہے، جس میں روشنی کے عناصر کی کثرت، کائناتی مائیکروویو پس منظر (CMB) تابکاری، اور بڑے پیمانے پر ساخت شامل ہیں۔', contentPashto: 'د لوی بنګ تیوري د کائنات لپاره د پیژندل شوي لومړیو دورو څخه د هغې وروسته د لوی کچې تکامل پورې موجوده کاسمولوژیکي ماډل دی. ماډل تشریح کوي چې څنګه کائنات د لوړ کثافت او تودوخې له لومړني حالت څخه پراخه شوی، او د لیدل شوي پدیدې پراخه لړۍ لپاره جامع توضیحات وړاندې کوي، پشمول د رڼا عناصرو ډیروالی، د کاسمیک مایکروویو پس منظر (CMB) وړانګې، او لوی پیمانه جوړښت.' },
                    { id: 'satellite', title: 'Satellite', titleUrdu: 'سیٹلائٹ', titlePashto: 'سپوږمکۍ', type: 'Technology', typeUrdu: 'ٹیکنالوجی', typePashto: 'تکنالوژي', color: 'from-cyan-500 to-blue-500', fact: 'The first artificial satellite was Sputnik 1.', factUrdu: 'پہلا مصنوعی سیٹلائٹ سپٹنک 1 تھا۔', factPashto: 'لومړنۍ مصنوعي سپوږمکۍ سپوتنیک ۱ وه.', content: 'A satellite is an object that has been intentionally placed into orbit. These objects are called artificial satellites to distinguish them from natural satellites such as Earth\'s Moon. Satellites are used for many purposes. Among several other applications, they can be used to make star maps and maps of planetary surfaces, and also take pictures of planets they are launched into. Common types include military and civilian Earth observation satellites, communications satellites, navigation satellites, weather satellites, and space telescopes.', contentUrdu: 'سیٹلائٹ ایک ایسی چیز ہے جسے جان بوجھ کر مدار میں رکھا گیا ہے۔ ان اشیاء کو قدرتی سیاروں جیسے زمین کے چاند سے ممتاز کرنے کے لیے مصنوعی سیٹلائٹ کہا جاتا ہے۔ سیٹلائٹ بہت سے مقاصد کے لیے استعمال ہوتے ہیں۔ کئی دیگر ایپلی کیشنز کے علاوہ، انہیں ستاروں کے نقشے اور سیاروں کی سطحوں کے نقشے بنانے کے لیے استعمال کیا جا سکتا ہے، اور ان سیاروں کی تصویریں بھی لی جا سکتی ہیں جن میں انہیں لانچ کیا جاتا ہے۔ عام اقسام میں فوجی اور سویلین زمین کا مشاہدہ کرنے والے سیٹلائٹ، مواصلاتی سیٹلائٹ، نیویگیشن سیٹلائٹ، موسمی سیٹلائٹ، اور خلائی دوربینیں شامل ہیں۔', contentPashto: 'سپوږمکۍ یو داسې څیز دی چې په قصدي ډول په مدار کې ځای پرځای شوی دی. دا شیان مصنوعي سپوږمکۍ بلل کیږي ترڅو دوی د طبیعي سپوږمکیو لکه د ځمکې سپوږمۍ څخه توپیر وکړي. سپوږمکۍ د ډیری موخو لپاره کارول کیږي. د ډیری نورو غوښتنلیکونو په مینځ کې، دوی د ستورو نقشې او د سیارې سطحو نقشې جوړولو لپاره کارول کیدی شي، او همدارنګه د هغه سیارونو عکسونه اخلي چې دوی پکې توغول کیږي. په عام ډولونو کې نظامي او ملکي د ځمکې د څارنې سپوږمکۍ، مخابراتي سپوږمکۍ، د نیویګیشن سپوږمکۍ، د هوا سپوږمکۍ، او فضايي ټیلیسکوپونه شامل دي.' }
                ]

            {
                id: 'physics',
                title: 'Physics & Forces',
                titleUrdu: 'طبیعیات اور قوتیں',
                titlePashto: 'فزیک او ځواکونه',
                icon: <Zap className="w-6 h-6 text-yellow-400" />,
                description: 'From gravity to energy.',
                descriptionUrdu: 'کشش ثقل سے توانائی تک۔',
                descriptionPashto: 'د جاذبې څخه تر انرژۍ پورې.',
                gradient: 'from-yellow-500/20 to-orange-500/20',
                topics: [
                    { id: 'gravity', title: 'Gravity', titleUrdu: 'کشش ثقل', titlePashto: 'جاذبه', type: 'Force', typeUrdu: 'قوت', typePashto: 'ځواک', color: 'from-indigo-500 to-blue-700', fact: 'You weigh less on the Moon.', factUrdu: 'چاند پر آپ کا وزن کم ہوتا ہے۔', factPashto: 'په سپوږمۍ کې ستاسو وزن کم وي.', content: 'Gravity is a fundamental force of nature that attracts two bodies with mass towards each other. It is what keeps your feet on the ground and prevents you from floating off into space. On a larger scale, gravity is the glue that holds the entire universe together; it keeps the Moon orbiting around the Earth, and the Earth orbiting around the Sun. The strength of gravity depends on the mass of the objects and the distance between them. Objects with more mass have stronger gravity. That is why you would weigh less on the Moon than on Earth—the Moon has less mass than Earth, so its gravitational pull is weaker.', contentUrdu: 'کشش ثقل فطرت کی ایک بنیادی قوت ہے جو کمیت والے دو اجسام کو ایک دوسرے کی طرف کھینچتی ہے۔ یہ وہ طاقت ہے جو آپ کے قدموں کو زمین پر جمائے رکھتی ہے اور آپ کو خلا میں تیرنے سے روکتی ہے۔ بڑے پیمانے پر، کشش ثقل وہ گوند ہے جو پوری کائنات کو جوڑے رکھتی ہے؛ یہ چاند کو زمین کے گرد اور زمین کو سورج کے گرد گھماتی ہے۔ کشش ثقل کی طاقت کا انحصار اجسام کی کمیت اور ان کے درمیان فاصلے پر ہوتا ہے۔ زیادہ کمیت والی چیزوں کی کشش ثقل زیادہ مضبوط ہوتی ہے۔ یہی وجہ ہے کہ چاند پر آپ کا وزن زمین سے کم ہوگا—کیونکہ چاند کی کمیت زمین سے کم ہے، اس لیے اس کی کھینچنے کی قوت کمزور ہے۔', contentPashto: 'جاذبه د طبیعت یو بنسټیز ځواک دی چې دوه اجسام د وزن سره یو بل ته جذبوي. دا هغه څه دي چې ستاسو پښې په ځمکه ساتي او تاسو فضا ته د تیریدو مخه نیسي. په لویه کچه، جاذبه هغه سریښ دی چې ټول کائنات یوځای ساتي؛ دا سپوږمۍ د ځمکې شاوخوا او ځمکه د لمر شاوخوا ساتي. د جاذبې ځواک د شیانو په وزن او د هغوی ترمنځ واټن پورې اړه لري. هغه شیان چې ډیر وزن لري قوي جاذبه لري. له همدې امله تاسو به په سپوږمۍ کې د ځمکې په پرتله لږ وزن ولرئ — سپوږمۍ د ځمکې په پرتله لږ وزن لري، نو د هغې د کشولو ځواک کمزوری دی.' },
                    { id: 'energy', title: 'Energy', titleUrdu: 'توانائی', titlePashto: 'انرژي', type: 'Concept', typeUrdu: 'تصور', typePashto: 'مفهوم', color: 'from-amber-400 to-orange-500', fact: 'Energy cannot be created or destroyed.', factUrdu: 'توانائی کو نہ پیدا کیا جا سکتا ہے اور نہ ختم۔', factPashto: 'انرژي نه رامینځته کیدی شي او نه له مینځه وړل کیدی شي.', content: 'Energy is defined as the ability to do work. It comes in many different forms, including heat, light, motion, electrical, chemical, and nuclear energy. One of the most important laws in physics is the Law of Conservation of Energy, which states that energy cannot be created or destroyed, only changed from one form to another. For example, when you eat food, your body converts the chemical energy in the food into kinetic energy (movement) and thermal energy (heat). Batteries convert chemical energy into electrical energy to power your devices. Understanding energy is key to understanding how the universe functions.', contentUrdu: 'توانائی کی تعریف کام کرنے کی صلاحیت کے طور پر کی جاتی ہے۔ یہ بہت سی مختلف شکلوں میں آتی ہے، بشمول حرارت، روشنی، حرکت، برقی، کیمیائی اور جوہری توانائی۔ طبیعیات میں سب سے اہم قوانین میں سے ایک توانائی کے تحفظ کا قانون ہے، جو کہتا ہے کہ توانائی کو نہ تو پیدا کیا جا سکتا ہے اور نہ ہی ختم کیا جا سکتا ہے، صرف ایک شکل سے دوسری شکل میں تبدیل کیا جا سکتا ہے۔ مثال کے طور پر، جب آپ کھانا کھاتے ہیں، تو آپ کا جسم کھانے میں موجود کیمیائی توانائی کو حرکی توانائی (حرکت) اور حرارتی توانائی (گرمی) میں تبدیل کرتا ہے۔ بیٹریاں کیمیائی توانائی کو برقی توانائی میں تبدیل کرتی ہیں۔ توانائی کو سمجھنا کائنات کے کام کرنے کے طریقے کو سمجھنے کی کلید ہے۔', contentPashto: 'انرژي د کار کولو وړتیا په توګه تعریف شوې. دا په ډیری مختلف ډولونو کې راځي، پشمول تودوخه، رڼا، حرکت، بریښنا، کیمیاوي او اټومي انرژي. په فزیک کې یو له خورا مهم قوانینو څخه د انرژي د ساتنې قانون دی، کوم چې وایي چې انرژي نشي رامینځته کیدی یا له مینځه وړل کیدی شي، یوازې له یوې بڼې څخه بلې ته بدلیدلی شي. د مثال په توګه، کله چې تاسو خواړه خورئ، ستاسو بدن په خواړو کې کیمیاوي انرژي په حرکي انرژي (حرکت) او حرارتي انرژي (تودوخه) بدلوي. بیټرۍ کیمیاوي انرژي په بریښنایی انرژي بدلوي ترڅو ستاسو وسایل چل کړي. د انرژي پوهیدل د دې پوهیدو لپاره کلیدي دي چې کائنات څنګه کار کوي.' },
                    { id: 'friction', title: 'Friction', titleUrdu: 'رگڑ', titlePashto: 'رګړ', type: 'Force', typeUrdu: 'قوت', typePashto: 'ځواک', color: 'from-stone-400 to-stone-600', fact: 'Friction creates heat.', factUrdu: 'رگڑ گرمی پیدا کرتی ہے۔', factPashto: 'رګړ تودوخه پیدا کوي.', content: 'Friction is the resistance that one surface or object encounters when moving over another. It is a force that slows things down. For example, if you roll a ball on the grass, it eventually stops because of friction between the ball and the grass. Friction creates heat; if you rub your hands together quickly, they get warm due to friction. While friction can be annoying because it makes it harder to move things, it is also very useful. Without friction, your shoes would not grip the ground, and you would slip everywhere. Brakes on cars work because of friction.', contentUrdu: 'رگڑ وہ مزاحمت ہے جو ایک سطح یا چیز کو دوسری پر حرکت کرتے وقت پیش آتی ہے۔ یہ ایک ایسی قوت ہے جو چیزوں کو سست کرتی ہے۔ مثال کے طور پر، اگر آپ گھاس پر گیند لڑھکاتے ہیں، تو یہ گیند اور گھاس کے درمیان رگڑ کی وجہ سے آخرکار رک جاتی ہے۔ رگڑ گرمی پیدا کرتی ہے؛ اگر آپ اپنے ہاتھوں کو تیزی سے رگڑیں، تو وہ رگڑ کی وجہ سے گرم ہو جاتے ہیں۔ اگرچہ رگڑ پریشان کن ہو سکتی ہے کیونکہ یہ چیزوں کو حرکت دینا مشکل بناتی ہے، لیکن یہ بہت مفید بھی ہے۔ رگڑ کے بغیر، آپ کے جوتے زمین کو نہیں پکڑیں ​​گے، اور آپ ہر جگہ پھسل جائیں گے۔ گاڑیوں کے بریک رگڑ کی وجہ سے کام کرتے ہیں۔', contentPashto: 'رګړ هغه مقاومت دی چې یوه سطحه یا څیز د بل په سر د حرکت کولو پرمهال ورسره مخ کیږي. دا یو ځواک دی چې شیان سستوي. د مثال په توګه، که تاسو په واښو یو توپ وغورځوئ، نو دا به په پای کې د توپ او واښو ترمنځ د رګړ له امله ودریږي. رګړ تودوخه رامینځته کوي؛ که تاسو خپل لاسونه په چټکۍ سره یوځای ومینځئ، نو د رګړ له امله ګرمیږي. که څه هم رګړ ځورونکی کیدی شي ځکه چې دا د شیانو حرکت کول سختوي، دا خورا ګټور هم دی. د رګړ پرته، ستاسو بوټان به ځمکه ونه نیسي، او تاسو به هرچیرې وښویېږئ. د موټرو بریکونه د رګړ له امله کار کوي.' },
                    { id: 'electricity', title: 'Electricity', titleUrdu: 'بجلی', titlePashto: 'بریښنا', type: 'Energy', typeUrdu: 'توانائی', typePashto: 'انرژي', color: 'from-yellow-400 to-orange-500', fact: 'Lightning is natural electricity.', factUrdu: 'آسمانی بجلی قدرتی بجلی ہے۔', factPashto: 'تندر طبیعي بریښنا ده.', content: 'Electricity is the flow of electric charge, usually carried by tiny particles called electrons. It powers our world, running everything from the lights in your house to the computer or phone you are using right now. Electricity can be generated from many sources, including wind, sunlight, flowing water, and burning fuels like coal or gas. In nature, we see electricity as lightning during a storm. Conductors, like copper wire, allow electricity to flow easily, while insulators, like rubber or plastic, stop the flow to keep us safe.', contentUrdu: 'بجلی برقی چارج کا بہاؤ ہے، جو عام طور پر ننھے ذرات یعنی الیکٹران کے ذریعے لے جایا جاتا ہے۔ یہ ہماری دنیا کو چلاتا ہے، آپ کے گھر کی روشنیوں سے لے کر اس کمپیوٹر یا فون تک جسے آپ ابھی استعمال کر رہے ہیں۔ بجلی بہت سے ذرائع سے پیدا کی جا سکتی ہے، بشمول ہوا، سورج کی روشنی، بہتا ہوا پانی، اور کوئلہ یا گیس جیسے ایندھن کو جلانا۔ فطرت میں، ہم طوفان کے دوران آسمانی بجلی کے طور پر بجلی دیکھتے ہیں۔ کنڈکٹرز، جیسے تانبے کی تار، بجلی کو آسانی سے بہنے دیتے ہیں، جبکہ انسولیٹر، جیسے ربڑ یا پلاسٹک، ہمیں محفوظ رکھنے کے لیے بہاؤ کو روکتے ہیں۔', contentPashto: 'بریښنا د بریښنایی چارج جریان دی، چې معمولا د کوچنیو ذراتو لخوا لیږدول کیږي چې الکترون نومیږي. دا زموږ نړۍ چلوي، ستاسو په کور کې د څراغونو څخه نیولې تر هغه کمپیوټر یا تلیفون پورې چې تاسو یې اوس کاروئ. بریښنا د ډیری سرچینو څخه تولید کیدی شي، پشمول باد، د لمر وړانګې، روانې اوبه، او د ډبرو سکرو یا ګازو په څیر د تیلو سوځول. په طبیعت کې، موږ د طوفان په وخت کې بریښنا د تندر په توګه وینو. کنډکټرونه، لکه د مسو تار، بریښنا ته اجازه ورکوي چې په اسانۍ سره تیریږي، پداسې حال کې چې انسولټرونه، لکه ربړ یا پلاستیک، جریان بندوي ترڅو موږ خوندي وساتي.' },
                    { id: 'light', title: 'Light', titleUrdu: 'روشنی', titlePashto: 'رڼا', type: 'Wave', typeUrdu: 'لہر', typePashto: 'څپه', color: 'from-yellow-200 to-yellow-400', fact: 'Light is the fastest thing in the universe.', factUrdu: 'روشنی کائنات کی تیز ترین چیز ہے۔', factPashto: 'رڼا په کائنات کې ترټولو ګړندی شی دی.', content: 'Light is a type of electromagnetic radiation that allows us to see the world around us. It travels in straight lines and moves at an incredible speed—about 300,000 kilometers per second. Light can come from natural sources like the Sun and stars, or artificial sources like light bulbs. When light hits an object, it can be absorbed, reflected, or pass through it. We see objects because they reflect light into our eyes. White light is actually made up of a spectrum of colors, which we can see in a rainbow.', contentUrdu: 'روشنی ایک قسم کی برقی مقناطیسی تابکاری ہے جو ہمیں اپنے ارد گرد کی دنیا کو دیکھنے کی اجازت دیتی ہے۔ یہ سیدھی لکیروں میں سفر کرتی ہے اور ناقابل یقین رفتار سے حرکت کرتی ہے—تقریباً 3 لاکھ کلومیٹر فی سیکنڈ۔ روشنی قدرتی ذرائع جیسے سورج اور ستاروں، یا مصنوعی ذرائع جیسے لائٹ بلب سے آ سکتی ہے۔ جب روشنی کسی چیز سے ٹکراتی ہے، تو یہ جذب ہو سکتی ہے، منعکس ہو سکتی ہے، یا اس میں سے گزر سکتی ہے۔ ہم چیزوں کو دیکھتے ہیں کیونکہ وہ ہماری آنکھوں میں روشنی منعکس کرتی ہیں۔ سفید روشنی دراصل رنگوں کے ایک طیف پر مشتمل ہوتی ہے، جسے ہم قوس قزح میں دیکھ سکتے ہیں۔', contentPashto: 'رڼا د بریښنایی مقناطیسي وړانګو یو ډول دی چې موږ ته اجازه راکوي چې شاوخوا نړۍ وګورو. دا په مستقیم خطونو کې سفر کوي او په نه منلو وړ سرعت سره حرکت کوي - په یوه ثانیه کې شاوخوا ۳۰۰،۰۰۰ کیلومتره. رڼا کولی شي د طبیعي سرچینو لکه لمر او ستورو، یا مصنوعي سرچینو لکه د رڼا بلبونو څخه راشي. کله چې رڼا په یو شی برید کوي، دا جذب کیدی شي، منعکس کیدی شي، یا د هغې له لارې تیریږي. موږ شیان ګورو ځکه چې دوی زموږ سترګو ته رڼا منعکس کوي. سپینه رڼا په حقیقت کې د رنګونو د طیف څخه جوړه شوې ده، کوم چې موږ په رینبو کې لیدلی شو.' },
                    { id: 'sound', title: 'Sound', titleUrdu: 'آواز', titlePashto: 'غږ', type: 'Wave', typeUrdu: 'لہر', typePashto: 'څپه', color: 'from-cyan-400 to-teal-500', fact: 'Sound cannot travel in space.', factUrdu: 'آواز خلا میں سفر نہیں کر سکتی۔', factPashto: 'غږ په فضا کې سفر نشي کولی.', content: 'Sound is a type of energy made by vibrations. When an object vibrates, it causes movement in the air particles. These particles bump into other particles close to them, which makes them vibrate too, causing sound waves to travel through the air. Our ears collect these sound waves and turn them into signals that our brain interprets as sound. Sound needs a medium to travel through, like air, water, or solid objects. That is why there is no sound in the vacuum of space.', contentUrdu: 'آواز ایک قسم کی توانائی ہے جو تھرتھراہٹ سے پیدا ہوتی ہے۔ جب کوئی چیز تھرتھراتی ہے تو یہ ہوا کے ذرات میں حرکت پیدا کرتی ہے۔ یہ ذرات اپنے قریب دوسرے ذرات سے ٹکراتے ہیں، جس سے وہ بھی تھرتھراتے ہیں، جس سے آواز کی لہریں ہوا کے ذریعے سفر کرتی ہیں۔ ہمارے کان ان صوتی لہروں کو اکٹھا کرتے ہیں اور انہیں سگنلز میں تبدیل کرتے ہیں جنہیں ہمارا دماغ آواز کے طور پر سمجھتا ہے۔ آواز کو سفر کرنے کے لیے کسی ذریعہ کی ضرورت ہوتی ہے، جیسے ہوا، پانی، یا ٹھوس چیزیں۔ اسی لیے خلا میں کوئی آواز نہیں ہوتی۔', contentPashto: 'غږ د انرژی یو ډول دی چې د وایبریشن لخوا رامینځته کیږي. کله چې یو شی وایبریټ کوي، دا د هوا په ذراتو کې د حرکت لامل کیږي. دا ذرات د نورو ذراتو سره نږدې نښته کوي، کوم چې دوی هم وایبریټ کوي، چې د غږ څپې د هوا له لارې سفر کوي. زموږ غوږونه دا غږیز څپې راټولوي او په سیګنالونو بدلوي چې زموږ مغز د غږ په توګه تشریح کوي. غږ د سفر کولو لپاره یوې وسیلې ته اړتیا لري، لکه هوا، اوبه، یا جامد شیان. له همدې امله د فضا په خلا کې غږ نشته.' },
                    { id: 'magnetism', title: 'Magnetism', titleUrdu: 'مقناطیسیت', titlePashto: 'مقناطیسیت', type: 'Force', typeUrdu: 'قوت', typePashto: 'ځواک', color: 'from-red-500 to-blue-500', fact: 'Opposite poles attract.', factUrdu: 'مخالف قطب ایک دوسرے کو کھینچتے ہیں۔', factPashto: 'مخالف قطبونه یو بل جذبوي.', content: 'Magnetism is a force that can attract (pull closer) or repel (push away) objects that have a magnetic material like iron inside them (magnetic objects). Magnets have two poles: a North Pole and a South Pole. If you try to push two magnets together, they will either stick together or push each other away. Opposite poles attract each other (North and South), while like poles repel each other (North and North, or South and South). Earth itself is a giant magnet with magnetic poles.', contentUrdu: 'مقناطیسیت ایک ایسی قوت ہے جو ان چیزوں کو اپنی طرف متوجہ کر سکتی ہے (قریب کھینچ سکتی ہے) یا پیچھے ہٹا سکتی ہے (دور دھکیل سکتی ہے) جن کے اندر لوہے جیسا مقناطیسی مواد موجود ہوتا ہے (مقناطیسی اشیاء)۔ مقناطیس کے دو قطب ہوتے ہیں: شمالی قطب اور جنوبی قطب۔ اگر آپ دو مقناطیسوں کو ایک ساتھ دھکیلنے کی کوشش کرتے ہیں، تو وہ یا تو آپس میں چپک جائیں گے یا ایک دوسرے کو دور دھکیل دیں گے۔ مخالف قطب ایک دوسرے کو کھینچتے ہیں (شمال اور جنوب)، جبکہ ایک جیسے قطب ایک دوسرے کو پیچھے ہٹاتے ہیں (شمال اور شمال، یا جنوب اور جنوب)۔ زمین خود مقناطیسی قطبوں کے ساتھ ایک بہت بڑا مقناطیس ہے۔', contentPashto: 'مقناطیسیت یو ځواک دی چې کولی شي هغه شیان جذب کړي (نږدې کړي) یا بیرته راوباسي (لرې کړي) چې د دوی دننه مقناطیسي مواد لکه اوسپنه لري (مقناطیسي شیان). مقناطیس دوه قطبونه لري: شمالي قطب او جنوبي قطب. که تاسو هڅه وکړئ دوه مقناطیسونه یوځای کړئ، دوی به یا یوځای ودریږي یا یو بل لرې کړي. مخالف قطبونه یو بل جذبوي (شمال او سویل)، پداسې حال کې چې ورته قطبونه یو بل بیرته راوباسي (شمال او شمال، یا سویل او سویل). ځمکه پخپله یو لوی مقناطیس دی چې مقناطیسي قطبونه لري.' },
                    { id: 'force', title: 'Force', titleUrdu: 'قوت', titlePashto: 'ځواک', type: 'Concept', typeUrdu: 'تصور', typePashto: 'مفهوم', color: 'from-red-500 to-rose-600', fact: 'A force is a push or pull.', factUrdu: 'قوت دھکیلنا یا کھینچنا ہے۔', factPashto: 'ځواک فشار یا کشول دي.', content: 'In science, a force is a push or a pull on an object. Forces can make things move, change direction, or stop. For example, when you kick a ball, you are using force to make it move. When you catch a ball, you are using force to stop it. There are many kinds of forces, such as gravity, friction, and magnetism. Forces are measured in units called Newtons. Understanding forces helps us understand how everything in the universe moves and interacts.', contentUrdu: 'سائنس میں، قوت کسی چیز کو دھکیلنا یا کھینچنا ہے۔ قوتیں چیزوں کو حرکت دے سکتی ہیں، سمت بدل سکتی ہیں، یا روک سکتی ہیں۔ مثال کے طور پر، جب آپ گیند کو لات مارتے ہیں، تو آپ اسے حرکت دینے کے لیے طاقت کا استعمال کر رہے ہوتے ہیں۔ جب آپ گیند کو پکڑتے ہیں، تو آپ اسے روکنے کے لیے طاقت کا استعمال کر رہے ہوتے ہیں۔ بہت سی قسم کی قوتیں ہیں، جیسے کشش ثقل، رگڑ اور مقناطیسیت۔ قوتوں کی پیمائش نیوٹن نامی اکائیوں میں کی جاتی ہے۔ قوتوں کو سمجھنے سے ہمیں یہ سمجھنے میں مدد ملتی ہے کہ کس طرح کائنات میں ہر چیز حرکت کرتی ہے اور تعامل کرتی ہے۔', contentPashto: 'په ساینس کې، ځواک په یو شی فشار یا کشول دي. ځواکونه کولی شي شیان حرکت وکړي، سمت بدل کړي، یا ودروي. د مثال په توګه، کله چې تاسو یو توپ لتاړئ، تاسو د حرکت کولو لپاره ځواک کاروئ. کله چې تاسو یو توپ ونیسئ، تاسو د بندولو لپاره ځواک کاروئ. د ځواکونو ډیری ډولونه شتون لري، لکه جاذبه، رګړ، او مقناطیسیت. ځواکونه په واحدونو کې اندازه کیږي چې د نیوټن په نوم یادیږي. د ځواکونو پوهیدل موږ سره مرسته کوي پوه شو چې په کائنات کې هرڅه څنګه حرکت کوي او تعامل کوي.' },
                    { id: 'inertia', title: 'Inertia', titleUrdu: 'جمود', titlePashto: 'جمود', type: 'Law', typeUrdu: 'قانون', typePashto: 'قانون', color: 'from-blue-400 to-indigo-500', fact: 'Objects want to keep doing what they are doing.', factUrdu: 'چیزیں اپنی حالت برقرار رکھنا چاہتی ہیں۔', factPashto: 'شیان غواړي خپل حالت وساتي.', content: 'Inertia is the resistance of any physical object to any change in its velocity. This includes changes to the object\'s speed, or direction of motion. An object at rest stays at rest and an object in motion stays in motion with the same speed and in the same direction unless acted upon by an unbalanced force. This is Newton\'s First Law of Motion. For example, if you are in a car that stops suddenly, your body keeps moving forward because of inertia.', contentUrdu: 'جمود کسی بھی جسمانی شے کی اپنی رفتار میں کسی بھی تبدیلی کے خلاف مزاحمت ہے۔ اس میں چیز کی رفتار، یا حرکت کی سمت میں تبدیلیاں شامل ہیں۔ ساکن چیز ساکن رہتی ہے اور حرکت کرنے والی چیز اسی رفتار اور اسی سمت میں حرکت کرتی رہتی ہے جب تک کہ اس پر کوئی غیر متوازن قوت عمل نہ کرے۔ یہ نیوٹن کا پہلا قانون حرکت ہے۔ مثال کے طور پر، اگر آپ کسی ایسی کار میں ہیں جو اچانک رک جاتی ہے، تو جمود کی وجہ سے آپ کا جسم آگے بڑھتا رہتا ہے۔', contentPashto: 'جمود د هر فزیکي څیز مقاومت دی چې د هغې سرعت کې هر بدلون ته ځواب ورکوي. پدې کې د څیز سرعت یا د حرکت سمت کې بدلونونه شامل دي. یو شی په آرام کې په آرام پاتې کیږي او په حرکت کې یو شی د ورته سرعت او ورته سمت سره په حرکت کې پاتې کیږي تر هغه چې د غیر متوازن ځواک لخوا عمل ونشي. دا د نیوټن د حرکت لومړی قانون دی. د مثال په توګه، که تاسو په داسې موټر کې یاست چې ناڅاپه ودریږي، ستاسو بدن د جمود له امله مخ په وړاندې حرکت کوي.' },
                    { id: 'velocity', title: 'Velocity', titleUrdu: 'سمتی رفتار', titlePashto: 'وولوسیټي', type: 'Measure', typeUrdu: 'پیمائش', typePashto: 'اندازه', color: 'from-green-400 to-emerald-600', fact: 'Velocity includes direction.', factUrdu: 'سمتی رفتار میں سمت شامل ہوتی ہے۔', factPashto: 'وولوسیټي کې سمت شامل دی.', content: 'Velocity is the speed of an object plus its direction of motion. Speed tells you how fast something is going, but velocity tells you how fast it is going and where it is going. For example, "50 miles per hour" is a speed, but "50 miles per hour north" is a velocity. Velocity is a vector quantity, meaning it has both magnitude (size) and direction. If a car turns a corner while maintaining the same speed, its velocity changes because its direction changes.', contentUrdu: 'سمتی رفتار کسی چیز کی رفتار کے علاوہ اس کی حرکت کی سمت ہے۔ رفتار آپ کو بتاتی ہے کہ کوئی چیز کتنی تیزی سے جا رہی ہے، لیکن سمتی رفتار آپ کو بتاتی ہے کہ یہ کتنی تیزی سے جا رہی ہے اور کہاں جا رہی ہے۔ مثال کے طور پر، "50 میل فی گھنٹہ" ایک رفتار ہے، لیکن "50 میل فی گھنٹہ شمال" ایک سمتی رفتار ہے۔ سمتی رفتار ایک ویکٹر کی مقدار ہے، یعنی اس کی وسعت (سائز) اور سمت دونوں ہیں۔ اگر کوئی کار ایک ہی رفتار کو برقرار رکھتے ہوئے کسی کونے سے مڑتی ہے، تو اس کی سمتی رفتار بدل جاتی ہے کیونکہ اس کی سمت بدل جاتی ہے۔', contentPashto: 'وولوسیټي د یو شی سرعت او د حرکت سمت دی. سرعت تاسو ته وایی چې یو شی څومره ګړندی روان دی، مګر وولوسیټي تاسو ته وایی چې دا څومره ګړندی روان دی او چیرته روان دی. د مثال په توګه، "په ساعت کې ۵۰ میله" یو سرعت دی، مګر "په ساعت کې ۵۰ میله شمال" یو وولوسیټي ده. وولوسیټي یو ویکتور مقدار دی، پدې معنی چې دا دواړه شدت (اندازه) او سمت لري. که یو موټر د ورته سرعت ساتلو پرمهال یو کونج وګرځوي، د هغې وولوسیټي بدلیږي ځکه چې سمت یې بدلیږي.' },
                    { id: 'density', title: 'Density', titleUrdu: 'کثافت', titlePashto: 'کثافت', type: 'Property', typeUrdu: 'خاصیت', typePashto: 'خاصیت', color: 'from-slate-500 to-slate-700', fact: 'Oil floats on water because it is less dense.', factUrdu: 'تیل پانی پر تیرتا ہے کیونکہ یہ کم کثیف ہے۔', factPashto: 'تیل په اوبو کې تیریږي ځکه چې کثافت یې کم دی.', content: 'Density is a measure of how much mass is contained in a given volume. It describes how compact or heavy something is for its size. The formula for density is mass divided by volume. If two objects are the same size but one is heavier, the heavier one is more dense. For example, a rock is denser than a piece of wood of the same size. This explains why rocks sink in water while wood floats.', contentUrdu: 'کثافت اس بات کا پیمانہ ہے کہ دیئے گئے حجم میں کتنی کمیت موجود ہے۔ یہ بتاتا ہے کہ کوئی چیز اپنے سائز کے لحاظ سے کتنی کمپیکٹ یا بھاری ہے۔ کثافت کا فارمولا بڑے پیمانے پر حجم سے تقسیم کیا جاتا ہے۔ اگر دو چیزیں ایک ہی سائز کی ہوں لیکن ایک بھاری ہو تو بھاری چیز زیادہ کثیف ہوتی ہے۔ مثال کے طور پر، ایک چٹان اسی سائز کے لکڑی کے ٹکڑے سے زیادہ گھنی ہوتی ہے۔ یہ بتاتا ہے کہ چٹانیں پانی میں کیوں ڈوبتی ہیں جبکہ لکڑی تیرتی ہے۔', contentPashto: 'کثافت د دې اندازه ده چې په ورکړل شوي حجم کې څومره ډله (mass) شتون لري. دا تشریح کوي چې یو څه د هغې اندازې لپاره څومره کمپیکٹ یا دروند دی. د کثافت فارمول د حجم لخوا ویشل شوی ډله ده. که دوه شیان یو شان وي مګر یو یې دروند وي، دروند یې ډیر کثافت لري. د مثال په توګه، یوه ډبره د ورته اندازې د لرګیو د یوې ټوټې په پرتله کثافت لري. دا تشریح کوي چې ولې ډبرې په اوبو کې ډوبیږي پداسې حال کې چې لرګي تیریږي.' },
                    { id: 'buoyancy', title: 'Buoyancy', titleUrdu: 'اچھال', titlePashto: 'اچھال', type: 'Force', typeUrdu: 'قوت', typePashto: 'ځواک', color: 'from-blue-400 to-cyan-500', fact: 'Buoyancy helps boats float.', factUrdu: 'اچھال کشتیوں کو تیرنے میں مدد دیتا ہے۔', factPashto: 'اچھال د کښتیو سره په لامبو کې مرسته کوي.', content: 'Buoyancy is the upward force exerted by a fluid (like water or air) that opposes the weight of an immersed object. This force explains why ships float on the ocean and why helium balloons rise in the air. Archimedes\' principle states that the buoyant force on an object is equal to the weight of the fluid displaced by the object. If the buoyant force is greater than the object\'s weight, it floats; if less, it sinks.', contentUrdu: 'اچھال ایک سیال (جیسے پانی یا ہوا) کی طرف سے لگائی جانے والی اوپر کی طرف قوت ہے جو ڈوبی ہوئی چیز کے وزن کی مخالفت کرتی ہے۔ یہ قوت بتاتی ہے کہ جہاز سمندر پر کیوں تیرتے ہیں اور ہیلیم غبارے ہوا میں کیوں اٹھتے ہیں۔ ارشمیدس کا اصول کہتا ہے کہ کسی چیز پر تیرنے والی قوت اس چیز کے ذریعے ہٹائے گئے سیال کے وزن کے برابر ہے۔ اگر تیرنے والی قوت چیز کے وزن سے زیادہ ہو تو وہ تیرتی ہے؛ اگر کم ہو تو وہ ڈوب جاتی ہے۔', contentPashto: 'اچھال هغه پورته خوا ته ځواک دی چې د مایع (لکه اوبه یا هوا) لخوا کارول کیږي چې د ډوب شوي څیز وزن سره مخالفت کوي. دا ځواک تشریح کوي چې ولې کښتۍ په سمندر کې تیریږي او ولې هیلیم بالونونه په هوا کې پورته کیږي. د ارکیمیډیز اصول وایی چې په یو شی باندې د اچھال ځواک د مایع وزن سره مساوي دی چې د څیز لخوا بې ځایه شوی. که چیرې د اچھال ځواک د څیز وزن څخه ډیر وي، نو دا تیریږي؛ که لږ وي، دا ډوبیږي.' },
                    { id: 'lever', title: 'Lever', titleUrdu: 'لیور', titlePashto: 'لیور', type: 'Machine', typeUrdu: 'مشین', typePashto: 'ماشین', color: 'from-stone-500 to-orange-400', fact: 'A seesaw is a lever.', factUrdu: 'سی-سا ایک لیور ہے۔', factPashto: 'سی-سا یو لیور دی.', content: 'A lever is a simple machine consisting of a beam or rigid rod pivoted at a fixed hinge, or fulcrum. It is one of the six simple machines identified by Renaissance scientists. Levers are used to amplify force, making it easier to lift heavy objects. Examples of levers in everyday life include seesaws, crowbars, scissors, and wheelbarrows. By changing the position of the fulcrum, load, and effort, you can change how much force is needed to do work.', contentUrdu: 'لیور ایک سادہ مشین ہے جو ایک بیم یا سخت سلاخ پر مشتمل ہوتی ہے جو ایک فکسڈ قبضے، یا فلکرم پر پیوٹ ہوتی ہے۔ یہ چھ سادہ مشینوں میں سے ایک ہے جس کی نشاندہی نشاۃ ثانیہ کے سائنسدانوں نے کی تھی۔ لیورز کا استعمال طاقت کو بڑھانے کے لیے کیا جاتا ہے، جس سے بھاری چیزوں کو اٹھانا آسان ہو جاتا ہے۔ روزمرہ کی زندگی میں لیور کی مثالوں میں سیسو، کروبار، کینچی اور وہیل بارو شامل ہیں۔ فلکرم، بوجھ اور کوشش کی پوزیشن کو تبدیل کرکے، آپ یہ تبدیل کر سکتے ہیں کہ کام کرنے کے لیے کتنی طاقت درکار ہے۔', contentPashto: 'لیور یو ساده ماشین دی چې یو بیم یا سخت راډ لري چې په یو ثابت قبضه یا فولکرم کې پیوټ شوی وي. دا یو له شپږو ساده ماشینونو څخه دی چې د رینیسانس ساینس پوهانو لخوا پیژندل شوي. لیور د ځواک لوړولو لپاره کارول کیږي، د درنو شیانو پورته کول اسانه کوي. په ورځني ژوند کې د لیورونو مثالونه شامل دي سی-سا، کروبارونه، کینچی، او ویل بارو. د فولکرم، بار او هڅې د موقعیت په بدلولو سره، تاسو کولی شئ بدلون ورکړئ چې د کار کولو لپاره څومره ځواک ته اړتیا ده.' },
                    { id: 'pulley', title: 'Pulley', titleUrdu: 'چرخی', titlePashto: 'چرخی', type: 'Machine', typeUrdu: 'مشین', typePashto: 'ماشین', color: 'from-zinc-400 to-zinc-600', fact: 'Pulleys make lifting easier.', factUrdu: 'چرخیاں اٹھانا آسان بناتی ہیں۔', factPashto: 'چرخی پورته کول اسانه کوي.', content: 'A pulley is a wheel on an axle or shaft that is designed to support movement and change of direction of a taut cable or belt. Pulleys are used in a variety of ways to lift loads, apply forces, and transmit power. In nautical contexts, the assembly of wheel, axle, and supporting shell is referred to as a "block." A pulley system can reduce the amount of force needed to lift a heavy object by distributing the weight over multiple ropes.', contentUrdu: 'چرخی ایکسل یا شافٹ پر ایک پہیہ ہے جسے نقل و حرکت اور ٹاٹ کیبل یا بیلٹ کی سمت تبدیل کرنے کے لیے ڈیزائن کیا گیا ہے۔ چرخیاں بوجھ اٹھانے، قوتیں لگانے اور طاقت منتقل کرنے کے لیے مختلف طریقوں سے استعمال ہوتی ہیں۔ سمندری سیاق و سباق میں، وہیل، ایکسل، اور سپورٹنگ شیل کی اسمبلی کو "بلاک" کہا جاتا ہے۔ ایک پللی نظام بھاری چیز کو اٹھانے کے لیے درکار طاقت کی مقدار کو کم کر سکتا ہے وزن کو متعدد رسیوں پر تقسیم کر کے۔', contentPashto: 'چرخی په محور یا شافټ کې یو څرخ دی چې د حرکت او د تنګ کیبل یا بیلټ سمت بدلون ملاتړ لپاره ډیزاین شوی. چرخۍ په بیلابیلو لارو د بارونو پورته کولو، ځواکونو پلي کولو، او بریښنا لیږدولو لپاره کارول کیږي. په سمندري شرایطو کې، د څرخ، محور او ملاتړ کونکي خولۍ مجلس ته "بلاک" ویل کیږي. د پلۍ سیسټم کولی شي د دروند شی پورته کولو لپاره اړین ځواک کم کړي د وزن په څو رسیو ویشلو سره.' },
                    { id: 'quantum', title: 'Quantum', titleUrdu: 'کوانٹم', titlePashto: 'کوانټم', type: 'Physics', typeUrdu: 'طبیعیات', typePashto: 'فزیک', color: 'from-violet-500 to-purple-700', fact: 'Particles behave like waves.', factUrdu: 'ذرات لہروں کی طرح برتاؤ کرتے ہیں۔', factPashto: 'ذرات د څپو په څیر چلند کوي.', content: 'Quantum mechanics is a fundamental theory in physics that provides a description of the physical properties of nature at the scale of atoms and subatomic particles. Unlike classical physics, where objects have definite positions and speeds, quantum mechanics deals with probabilities. One of its key principles is wave-particle duality, meaning matter and light exhibit behaviors of both particles and waves. It explains how everything from the sun to microchips works.', contentUrdu: 'کوانٹم میکینکس طبیعیات میں ایک بنیادی نظریہ ہے جو ایٹموں اور سبٹومک ذرات کے پیمانے پر فطرت کی جسمانی خصوصیات کی تفصیل فراہم کرتا ہے۔ کلاسیکی طبیعیات کے برعکس، جہاں اشیاء کی یقینی پوزیشن اور رفتار ہوتی ہے، کوانٹم میکینکس امکانات سے نمٹتی ہے۔ اس کے کلیدی اصولوں میں سے ایک لہر-ذرہ دوہرا پن ہے، یعنی مادہ اور روشنی دونوں ذرات اور لہروں کے رویے ظاہر کرتے ہیں۔ یہ وضاحت کرتا ہے کہ سورج سے لے کر مائیکرو چپس تک سب کچھ کیسے کام کرتا ہے۔', contentPashto: 'کوانٹم میخانیک په فزیک کې یو بنسټیز تیوري ده چې د اتومونو او فرعي اټومي ذراتو په پیمانه د طبیعت فزیکي ملکیتونو توضیحات وړاندې کوي. د کلاسیک فزیک برخلاف، چیرې چې شیان دقیق موقعیتونه او سرعت لري، کوانٹم میخانیک د احتمالاتو سره معامله کوي. د دې یو له مهمو اصولو څخه د څپې - ذرات دوه ګونی دی، پدې معنی چې ماده او رڼا د ذراتو او څپو دواړو چلند څرګندوي. دا تشریح کوي چې څنګه د لمر څخه مایکروچپس پورې هرڅه کار کوي.' },
                    { id: 'pressure', title: 'Pressure', titleUrdu: 'دباؤ', titlePashto: 'دباو', type: 'Force', typeUrdu: 'قوت', typePashto: 'ځواک', color: 'from-orange-600 to-red-500', fact: 'Deep water has high pressure.', factUrdu: 'گہرے پانی میں دباؤ زیادہ ہوتا ہے۔', factPashto: 'ژورې اوبه لوړ دباو لري.', content: 'Pressure is the amount of force exerted per unit area. It is calculated by dividing the force by the area over which it is applied. In fluids (liquids and gases), pressure acts in all directions. Atmospheric pressure is the weight of the air pushing down on us. Water pressure increases with depth because of the weight of the water above. High pressure can crush objects, while low pressure allows them to expand.', contentUrdu: 'دباؤ فی یونٹ رقبہ پر لگائی جانے والی قوت کی مقدار ہے۔ اس کا حساب اس قوت کو اس علاقے سے تقسیم کرکے لگایا جاتا ہے جس پر اسے لاگو کیا جاتا ہے۔ سیالوں (مائعات اور گیسوں) میں، دباؤ تمام سمتوں میں کام کرتا ہے۔ ماحولیاتی دباؤ ہوا کا وزن ہے جو ہمیں نیچے دھکیل رہا ہے۔ اوپر پانی کے وزن کی وجہ سے گہرائی کے ساتھ پانی کا دباؤ بڑھتا ہے۔ ہائی پریشر چیزوں کو کچل سکتا ہے، جبکہ کم دباؤ انہیں پھیلنے دیتا ہے۔', contentPashto: 'دباو د ځواک مقدار دی چې په فی واحد ساحه کې کارول کیږي. دا د هغه ساحې په واسطه د ځواک ویشلو سره محاسبه کیږي چې پرې پلي کیږي. په مایعاتو (مایعاتو او ګازونو) کې، دباو په ټولو لورو کې عمل کوي. د اتموسفیر دباو د هوا وزن دی چې موږ لاندې کوي. د اوبو دباو د ژوروالي سره د پورته اوبو وزن له امله ډیریږي. لوړ دباو کولی شي شیان ټوټه کړي، پداسې حال کې چې ټیټ دباو دوی ته د پراخیدو اجازه ورکوي.' }
                ]
