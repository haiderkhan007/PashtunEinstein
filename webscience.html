                description: 'Volcanoes, oceans, and weather.',
                descriptionUrdu: 'آتش فشاں، سمندر اور موسم۔',
                descriptionPashto: 'آتش فشانونه، سمندرونه او هوا.',
                gradient: 'from-blue-600/20 to-cyan-600/20',
                topics: [
                    { id: 'volcano', title: 'Volcano', titleUrdu: 'آتش فشاں', titlePashto: 'آتش فشان', type: 'Geology', typeUrdu: 'ارضیات', typePashto: 'جیولوژي', color: 'from-red-600 to-orange-600', fact: 'There are about 1,500 active volcanoes on Earth today.', factUrdu: 'آج زمین پر تقریباً 1,500 فعال آتش فشاں موجود ہیں۔', factPashto: 'نن ورځ په ځمکه کې شاوخوا ۱،۵۰۰ فعال آتش فشانونه شتون لري.', content: 'A volcano is an opening in the Earth\'s crust that allows molten rock (magma), volcanic ash, and gases to escape from a magma chamber below the surface. When this material escapes, it causes an eruption. An eruption can be explosive, sending ash and gas high into the sky, or calmer, with lava flowing down the mountain. Volcanoes are often found where tectonic plates meet. While they can be destructive, volcanoes also create new land and provide rich soil for farming.', contentUrdu: 'آتش فشاں زمین کی سطح میں ایک سوراخ ہے جو پگھلی ہوئی چٹان (میگما)، آتش فشاں راکھ اور گیسوں کو سطح کے نیچے میگما چیمبر سے باہر نکلنے کی اجازت دیتا ہے۔ جب یہ مواد باہر نکلتا ہے تو یہ دھماکے کا سبب بنتا ہے۔ ایک دھماکہ دھماکہ خیز ہو سکتا ہے، راکھ اور گیس کو آسمان میں اونچا بھیج سکتا ہے، یا پرسکون، لاوا پہاڑ سے نیچے بہتا ہے۔ آتش فشاں اکثر وہاں پائے جاتے ہیں جہاں ٹیکٹونک پلیٹیں ملتی ہیں۔ اگرچہ وہ تباہ کن ہو سکتے ہیں، آتش فشاں نئی زمین بھی بناتے ہیں اور کاشتکاری کے لیے زرخیز مٹی فراہم کرتے ہیں۔', contentPashto: 'آتش فشان د ځمکې په قشر کې یوه خوله ده چې پخه شوې ډبرې (مګما)، اورشیني ایرې او ګازونو ته اجازه ورکوي چې د سطحې لاندې د مګما خونې څخه وتښتي. کله چې دا مواد وتښتي، دا د چاودنې لامل کیږي. یوه چاودنه کیدای شي چاودیدونکي وي، ایرې او ګاز اسمان ته لوړ لیږي، یا آرام وي، د لاوا سره چې د غره لاندې بهیږي. آتش فشانونه اکثرا چیرې موندل کیږي چیرې چې ټیکټونیک پلیټونه سره لیدل کیږي. پداسې حال کې چې دوی ویجاړونکي کیدی شي، آتش فشانونه نوې ځمکه هم رامینځته کوي او د کرنې لپاره بډایه خاوره چمتو کوي.' },
                    { id: 'earthquake', title: 'Earthquake', titleUrdu: 'زلزلہ', titlePashto: 'زلزله', type: 'Disaster', typeUrdu: 'آفت', typePashto: 'آفت', color: 'from-orange-700 to-red-700', fact: 'The largest earthquake ever recorded was a magnitude 9.5 in Chile in 1960.', factUrdu: 'اب تک کا سب سے بڑا زلزلہ 1960 میں چلی میں 9.5 شدت کا ریکارڈ کیا گیا تھا۔', factPashto: 'ترټولو لویه زلزله چې تر اوسه ثبت شوې د ۱۹۶۰ کال په چیلي کې د ۹.۵ درجې زلزله وه.', content: 'An earthquake is an intense shaking of Earth\'s surface. The shaking is caused by movements in Earth\'s outermost layer. Earth is not a single solid rock; its crust is divided into huge tectonic plates that are constantly moving. When these plates get stuck at their edges due to friction and then suddenly slip, energy is released in waves that travel through the earth\'s crust and cause the shaking that we feel. The point underground where the earthquake starts is called the hypocenter, and the place right above it on the surface is the epicenter.', contentUrdu: 'زلزلہ زمین کی سطح کا شدید ہلنا ہے۔ یہ جھٹکا زمین کی سب سے بیرونی تہہ میں حرکت کی وجہ سے ہوتا ہے۔ زمین کوئی ایک ٹھوس چٹان نہیں ہے؛ اس کا قشر بڑی ٹیکٹونک پلیٹوں میں تقسیم ہے جو مسلسل حرکت کر رہی ہیں۔ جب یہ پلیٹیں رگڑ کی وجہ سے اپنے کناروں پر پھنس جاتی ہیں اور پھر اچانک پھسل جاتی ہیں، تو توانائی لہروں کی صورت میں خارج ہوتی ہے جو زمین کے قشر سے گزرتی ہیں اور اس جھٹکے کا سبب بنتی ہیں جسے ہم محسوس کرتے ہیں۔ زمین کے نیچے وہ نقطہ جہاں زلزلہ شروع ہوتا ہے اسے ہائپو سینٹر کہتے ہیں، اور سطح پر اس کے بالکل اوپر کی جگہ ایپی سینٹر ہے۔', contentPashto: 'زلزله د ځمکې د سطحې شدید ټکان دی. ټکان د ځمکې په بهرنۍ طبقه کې د حرکتونو له امله رامینځته کیږي. ځمکه یوه کلکه ډبره نه ده؛ د دې قشر په لویو ټیکټونیک پلیټونو ویشل شوی چې په دوامداره توګه حرکت کوي. کله چې دا پلیټونه د رګړ له امله په خپلو څنډو کې ودریږي او بیا ناڅاپه راښکته شي، انرژي په څپو کې خپریږي چې د ځمکې د کرسټ له لارې سفر کوي او هغه ټکان رامینځته کوي چې موږ یې احساس کوو. د ځمکې لاندې هغه نقطه چیرې چې زلزله پیل کیږي د هایپو سینټر په نوم یادیږي، او د هغې پورته ځای په سطحه د ایپی سینټر دی.' },
                    { id: 'ocean', title: 'The Ocean', titleUrdu: 'سمندر', titlePashto: 'سمندر', type: 'Water', typeUrdu: 'پانی', typePashto: 'وبه', color: 'from-blue-500 to-blue-800', fact: 'Oceans cover 70% of Earth.', factUrdu: 'سمندر زمین کے 70 فیصد حصے کو ڈھانپتے ہیں۔', factPashto: 'سمندرونه د ځمکې ۷۰٪ برخه پوښي.', content: 'An ocean is a body of water that composes much of a planet\'s hydrosphere. On Earth, an ocean is one of the major conventional divisions of the World Ocean. These are, in descending order by area, the Pacific, Atlantic, Indian, Southern, and Arctic Oceans. The word "ocean" is often used interchangeably with "sea" in American English. Strictly speaking, a sea is a body of water (generally a division of the World Ocean) partly or fully enclosed by land.', contentUrdu: 'ایک سمندر پانی کا ایک جسم ہے جو سیارے کے ہائیڈرو اسپیئر کا زیادہ تر حصہ بناتا ہے۔ زمین پر، ایک سمندر عالمی سمندر کی بڑی روایتی تقسیموں میں سے ایک ہے۔ یہ رقبے کے لحاظ سے نزولی ترتیب میں ہیں، بحر الکاہل، بحر اوقیانوس، بحر ہند، جنوبی اور آرکٹک سمندر۔ لفظ "سمندر" اکثر امریکی انگریزی میں "سمندر" کے ساتھ دوسرے کے بدلے استعمال ہوتا ہے۔ سخت الفاظ میں، سمندر پانی کا ایک جسم ہے (عام طور پر عالمی سمندر کی تقسیم) جزوی طور پر یا مکمل طور پر زمین سے گھرا ہوا ہے۔', contentPashto: 'سمندر د اوبو یو بدن دی چې د سیارې د هایدروسفیئر ډیره برخه جوړوي. په ځمکه کې، سمندر د نړۍ د سمندر یو له لوی دودیز ویش څخه دی. دا د ساحې له مخې په نزولي ترتیب کې دي، ارام سمندر، اتلانتیک، هند، سویلي او ارکټیک سمندرونه. د "سمندر" کلمه ډیری وختونه په امریکایی انګلیسي کې د "سمندر" سره د تبادلې وړ کارول کیږي. په کلکه ووایو، سمندر د اوبو یو بدن دی (عموما د نړیوال سمندر ویش) په جزوي یا بشپړ ډول د ځمکې لخوا محاصره شوی.' },
                    { id: 'tsunami', title: 'Tsunami', titleUrdu: 'سونامی', titlePashto: 'سونامي', type: 'Disaster', typeUrdu: 'آفت', typePashto: 'آفت', color: 'from-cyan-600 to-blue-700', fact: 'Giant waves.', factUrdu: 'دیو ہیکل لہریں۔', factPashto: 'لویې څپې.', content: 'A tsunami is a series of waves in a water body caused by the displacement of a large volume of water, generally in an ocean or a large lake. Earthquakes, volcanic eruptions and other underwater explosions (including detonations, landslides, glacier calvings, meteorite impacts and other disturbances) above or below water all have the potential to generate a tsunami. Unlike normal ocean waves, which are generated by wind, or tides, which are generated by the gravitational pull of the Moon and the Sun, a tsunami is generated by the displacement of water.', contentUrdu: 'سونامی پانی کے جسم میں لہروں کا ایک سلسلہ ہے جو پانی کی ایک بڑی مقدار کے بے گھر ہونے کی وجہ سے ہوتا ہے، عام طور پر سمندر یا بڑی جھیل میں۔ زلزلے، آتش فشاں پھٹنے اور پانی کے اندر دیگر دھماکے (بشمول دھماکے، لینڈ سلائیڈنگ، گلیشیئر کیلنگ، میٹورائٹ کے اثرات اور دیگر خلل) پانی کے اوپر یا نیچے سب میں سونامی پیدا کرنے کی صلاحیت ہے۔ عام سمندری لہروں کے برعکس، جو ہوا سے پیدا ہوتی ہیں، یا لہریں، جو چاند اور سورج کی کشش ثقل سے پیدا ہوتی ہیں، سونامی پانی کے بے گھر ہونے سے پیدا ہوتی ہے۔', contentPashto: 'سونامي د اوبو په بدن کې د څپو یوه لړۍ ده چې د اوبو د لوی مقدار د بې ځایه کیدو له امله رامینځته کیږي ، په ځانګړي توګه په سمندر یا لوی جهیل کې. زلزلې، آتش فشانونه او د اوبو لاندې نورې چاودنې (د چاودنو، د ځمکې ښویدنې، د ګلیشیر کالوینګ، د الکا اغیزې او نور ګډوډي په شمول) د اوبو څخه پورته یا لاندې ټول د سونامي تولیدولو وړتیا لري. د سمندر د عادي څپو برخلاف، چې د باد لخوا رامینځته کیږي، یا د لمر او سپوږمۍ د جاذبې کشش لخوا رامینځته کیږي، سونامي د اوبو د بې ځایه کیدو لخوا رامینځته کیږي.' },
                    { id: 'rock-cycle', title: 'Rock Cycle', titleUrdu: 'چٹانی چکر', titlePashto: 'د ډبرې دوران', type: 'Process', typeUrdu: 'عمل', typePashto: 'پروسه', color: 'from-stone-500 to-stone-700', fact: 'Rocks change over time.', factUrdu: 'چٹانیں وقت کے ساتھ بدلتی ہیں۔', factPashto: 'ډبرې د وخت په تیریدو سره بدلیږي.', content: 'The rock cycle is a basic concept in geology that describes time-consuming transitions through geologic time among the three main rock types: sedimentary, metamorphic, and igneous. Each rock type is altered when it is forced out of its equilibrium conditions. For example, an igneous rock such as basalt may break down and dissolve when exposed to the atmosphere, or melt as it is subducted under a continent. Due to the driving forces of the rock cycle, plate tectonics and the water cycle, rocks do not remain in equilibrium and change as they encounter new environments.', contentUrdu: 'چٹان کا چکر ارضیات میں ایک بنیادی تصور ہے جو تین اہم چٹانوں کی اقسام کے درمیان ارضیاتی وقت کے ذریعے وقت طلب ٹرانزیشن کو بیان کرتا ہے: تلچھٹ، میٹامورفک، اور اگنیئس۔ ہر چٹان کی قسم اس وقت تبدیل ہو جاتی ہے جب اسے اس کے توازن کے حالات سے زبردستی نکال دیا جاتا ہے۔ مثال کے طور پر، ایک اگنیئس چٹان جیسا کہ بیسالٹ ٹوٹ سکتا ہے اور فضا کے سامنے آنے پر تحلیل ہو سکتا ہے، یا پگھل سکتا ہے کیونکہ یہ براعظم کے نیچے دب جاتا ہے۔ چٹان کے چکر کی محرک قوتوں، پلیٹ ٹیکٹونکس اور آبی چکر کی وجہ سے، چٹانیں توازن میں نہیں رہتیں اور نئے ماحول کا سامنا کرتے ہی بدل جاتی ہیں۔', contentPashto: 'د ډبرې دوران په جیولوژي کې یو بنسټیز مفهوم دی چې د دریو اصلي ډبرې ډولونو ترمنځ د جیولوژیکي وخت له لارې د وخت مصرفونکي لیږدونه بیانوي: سیډمینټري، میټامورفیک، او اګنیس. د ډبرې هر ډول بدلیږي کله چې دا د توازن شرایطو څخه بهر کیږي. د مثال په توګه، یوه اګنیس ډبره لکه بیسالټ کیدای شي مات شي او تحلیل شي کله چې اتموسفیر ته ښکاره شي، یا د یوې براعظم لاندې فرعي کیدو سره منحل شي. د ډبرې د دورې د چلولو ځواکونو، پلیټ ټیکټونکس او د اوبو د دورې له امله، ډبرې په توازن کې نه پاتې کیږي او بدلیږي کله چې دوی د نوي چاپیریال سره مخ کیږي.' },
                    { id: 'fossil', title: 'Fossil', titleUrdu: 'فوسل', titlePashto: 'فوسیل', type: 'History', typeUrdu: 'تاریخ', typePashto: 'تاریخ', color: 'from-amber-700 to-yellow-800', fact: 'Fossils are old bones.', factUrdu: 'فوسلز پرانی ہڈیاں ہیں۔', factPashto: 'فوسیلونه زاړه هډوکي دي.', content: 'Fossils are the preserved remains, or traces of remains, of ancient organisms. Fossils are not the remains of the organism itself! They are rocks. A fossil can preserve an entire organism or just part of one. Bones, shells, feathers, and leaves can all become fossils. Fossils can be very large or very small. Microfossils are only visible with a microscope. Bacteria and pollen are microfossils. Macrofossils can be several meters long and weigh several tons. Petrified trees and dinosaur bones are macrofossils.', contentUrdu: 'فوسلز قدیم جانداروں کی محفوظ باقیات، یا باقیات کے نشانات ہیں۔ فوسلز خود جاندار کی باقیات نہیں ہیں! وہ چٹانیں ہیں۔ ایک فوسل پورے جاندار یا صرف ایک کے حصے کو محفوظ رکھ سکتا ہے۔ ہڈیاں، گولے، پنکھ اور پتے سب فوسل بن سکتے ہیں۔ فوسلز بہت بڑے یا بہت چھوٹے ہو سکتے ہیں۔ مائیکرو فوسل صرف خوردبین سے نظر آتے ہیں۔ بیکٹیریا اور پولن مائیکرو فوسل ہیں۔ میکرو فوسلز کئی میٹر لمبے اور کئی ٹن وزنی ہو سکتے ہیں۔ پیٹریفائیڈ درخت اور ڈایناسور کی ہڈیاں میکرو فوسلز ہیں۔', contentPashto: 'فوسیلونه د لرغونو ژوندیو موجوداتو ساتل شوي پاتې شوني، یا د پاتې شونو نښې دي. فوسیل پخپله د ژوندی موجود پاتې شوني ندي! دوی ډبرې دي. یو فوسیل کولی شي ټول ژوندی موجود یا یوازې یوه برخه وساتي. هډوکي، مرمۍ، بڼکې او پاڼې ټول فوسیل کیدای شي. فوسیلونه خورا لوی یا خورا کوچني کیدی شي. مایکرو فوسیلونه یوازې د مایکروسکوپ سره لیدل کیږي. باکتریا او ګرده مایکرو فوسیلونه دي. میکروفوسیلونه څو متره اوږد او څو ټنه وزن لري. پیټریفایډ شوي ونې او د ډیناسور هډوکي میکرو فوسیلونه دي.' },
                    { id: 'soil', title: 'Soil', titleUrdu: 'مٹی', titlePashto: 'خاوره', type: 'Earth', typeUrdu: 'زمین', typePashto: 'ځمکه', color: 'from-stone-600 to-amber-700', fact: 'Soil helps plants grow.', factUrdu: 'مٹی پودوں کو اگنے میں مدد دیتی ہے۔', factPashto: 'خاوره د نباتاتو وده کې مرسته کوي.', content: 'Soil is a mixture of organic matter, minerals, gases, liquids, and organisms that together support life. Earth\'s body of soil, called the pedosphere, has four important functions: as a medium for plant growth; as a means of water storage, supply and purification; as a modifier of Earth\'s atmosphere; and as a habitat for organisms. All of these functions, in their turn, modify the soil and its properties.', contentUrdu: 'مٹی نامیاتی مادے، معدنیات، گیسوں، مائعات اور جانداروں کا ایک مرکب ہے جو مل کر زندگی کو سہارا دیتے ہیں۔ زمین کی مٹی کا جسم، جسے پیڈوسفیئر کہا جاتا ہے، کے چار اہم کام ہیں: پودوں کی نشوونما کے لیے ایک ذریعہ کے طور پر؛ پانی ذخیرہ کرنے، فراہمی اور صاف کرنے کے ذرائع کے طور پر؛ زمین کے ماحول میں تبدیلی کرنے والے کے طور پر؛ اور جانداروں کے لیے رہائش گاہ کے طور پر۔ یہ تمام افعال اپنی باری میں مٹی اور اس کی خصوصیات میں ترمیم کرتے ہیں۔', contentPashto: 'خاوره د عضوي موادو، منرالونو، ګازونو، مایعاتو او ژوندیو موجوداتو مخلوط دی چې یوځای د ژوند ملاتړ کوي. د ځمکې د خاورې بدن، چې د پیډوسفیر په نوم یادیږي، څلور مهمې دندې لري: د نبات د ودې لپاره د یوې وسیلې په توګه؛ د اوبو ذخیره کولو، رسولو او پاکولو د وسیلې په توګه؛ د ځمکې د اتموسفیر د بدلون کونکي په توګه؛ او د ژوندیو موجوداتو لپاره د استوګنې په توګه. دا ټولې دندې، په خپل وار، خاوره او د هغې ملکیتونه بدلوي.' },
                    { id: 'atmosphere', title: 'Atmosphere', titleUrdu: 'فضا', titlePashto: 'اتموسفیر', type: 'Air', typeUrdu: 'ہوا', typePashto: 'هوا', color: 'from-sky-300 to-sky-600', fact: 'It is a blanket of air.', factUrdu: 'یہ ہوا کا کمبل ہے۔', factPashto: 'دا د هوا کمپلې ده.', content: 'An atmosphere is a layer or a set of layers of gases surrounding a planet or other material body, that is held in place by the gravity of that body. An atmosphere is more likely to be retained if the gravity it is subject to is high and the temperature of the atmosphere is low. The atmosphere of Earth consists of nitrogen (78%), oxygen (21%), argon (0.9%), carbon dioxide (0.04%) and other gases.', contentUrdu: 'فضا گیسوں کی ایک تہہ یا تہوں کا مجموعہ ہے جو کسی سیارے یا دوسرے مادی جسم کو گھیرے ہوئے ہے، جسے اس جسم کی کشش ثقل نے اپنی جگہ پر رکھا ہوا ہے۔ ماحول کو برقرار رکھنے کا زیادہ امکان ہے اگر اس کی کشش ثقل زیادہ ہو اور ماحول کا درجہ حرارت کم ہو۔ زمین کا ماحول نائٹروجن (78٪)، آکسیجن (21٪)، آرگن (0.9٪)، کاربن ڈائی آکسائیڈ (0.04٪) اور دیگر گیسوں پر مشتمل ہے۔', contentPashto: 'اتموسفیر یوه طبقه یا د ګازونو یوه ټولګه ده چې یوه سیاره یا نور مادي بدن محاصره کوي، چې د هغه بدن د جاذبې په واسطه ساتل کیږي. یو اتموسفیر ډیر احتمال لري چې وساتل شي که چیرې د جاذبې ځواک لوړ وي او د اتموسفیر تودوخه ټیټه وي. د ځمکې اتموسفیر نایتروجن (۷۸٪)، اکسیجن (۲۱٪)، ارګون (۰.۹٪)، کاربن ډای اکسایډ (۰.۰۴٪) او نورو ګازونو څخه جوړ دی.' },
                    { id: 'clouds', title: 'Clouds', titleUrdu: 'بادل', titlePashto: 'ورېځې', type: 'Weather', typeUrdu: 'موسم', typePashto: 'هوا', color: 'from-slate-400 to-slate-600', fact: 'Clouds are water.', factUrdu: 'بادل پانی ہیں۔', factPashto: 'ورېځې اوبه دي.', content: 'In meteorology, a cloud is an aerosol consisting of a visible mass of minute liquid droplets, frozen crystals, or other particles suspended in the atmosphere of a planetary body or similar space. Water or various other chemicals may compose the droplets and crystals. On Earth, clouds are formed as a result of saturation of the air when it is cooled to its dew point, or when it gains sufficient moisture (usually in the form of water vapor) from an adjacent source to raise the dew point to the ambient temperature.', contentUrdu: 'موسمیات میں، بادل ایک ایروسول ہے جو سیاروں کے جسم یا اسی طرح کی جگہ کے ماحول میں معلق منٹ کے مائع قطروں، منجمد کرسٹل، یا دیگر ذرات کے دکھائی دینے والے بڑے پیمانے پر مشتمل ہوتا ہے۔ پانی یا مختلف دیگر کیمیکل بوندوں اور کرسٹل کو بنا سکتے ہیں۔ زمین پر، بادل ہوا کی سنترپتی کے نتیجے میں بنتے ہیں جب اسے اس کے اوس نقطہ پر ٹھنڈا کیا جاتا ہے، یا جب یہ ملحقہ ذریعہ سے کافی نمی (عام طور پر پانی کے بخارات کی صورت میں) حاصل کرتا ہے تاکہ اوس پوائنٹ کو محیطی درجہ حرارت تک بڑھا سکے۔', contentPashto: 'په هوا پیژندنه کې، ورېځ یو ایروسول دی چې د سیارې بدن یا ورته ځای په اتموسفیر کې د دقیقو مایع څاڅکو، منجمد کرسټالونو، یا نورو ذراتو څخه جوړ شوی دی. اوبه یا نور مختلف کیمیاوي توکي ممکن څاڅکي او کرسټالونه جوړ کړي. په ځمکه کې، ورېځې د هوا د سنتریت په پایله کې رامینځته کیږي کله چې دا د خپل شبنم نقطې ته یخ شي، یا کله چې دا د نږدې سرچینې څخه کافي رطوبت (معمولا د اوبو بخار په شکل کې) ترلاسه کوي ترڅو د شبنم نقطه محیطي تودوخې ته لوړه کړي.' },
                    { id: 'rain', title: 'Rain', titleUrdu: 'بارش', titlePashto: 'باران', type: 'Weather', typeUrdu: 'موسم', typePashto: 'هوا', color: 'from-blue-400 to-blue-600', fact: 'Water falls from sky.', factUrdu: 'پانی آسمان سے گرتا ہے۔', factPashto: 'اوبه له اسمانه لویږي.', content: 'Rain is liquid water in the form of droplets that have condensed from atmospheric water vapor and then become heavy enough to fall under gravity. Rain is a major component of the water cycle and is responsible for depositing most of the fresh water on the Earth. It provides suitable conditions for many types of ecosystems, as well as water for hydroelectric power plants and crop irrigation.', contentUrdu: 'بارش بوندوں کی شکل میں مائع پانی ہے جو ماحول کے پانی کے بخارات سے گاڑھا ہوا ہے اور پھر کشش ثقل کے نیچے گرنے کے لئے کافی بھاری ہو گیا ہے۔ بارش پانی کے چکر کا ایک اہم جزو ہے اور زمین پر زیادہ تر تازہ پانی جمع کرنے کا ذمہ دار ہے۔ یہ بہت سے قسم کے ماحولیاتی نظاموں کے ساتھ ساتھ پن بجلی گھروں اور فصلوں کی آبپاشی کے لیے پانی کے لیے موزوں حالات فراہم کرتا ہے۔', contentPashto: 'باران مایع اوبه دي چې د څاڅکو په بڼه د اتموسفیر د اوبو بخار څخه کنډش شوي او بیا دومره دروند شوي چې د جاذبې لاندې راشي. باران د اوبو د دورې یوه لویه برخه ده او په ځمکه کې د تازه اوبو د ډیری ذخیره کولو مسولیت لري. دا د ډیری ډولونو ایکوسیستمونو لپاره مناسب شرایط چمتو کوي ، په بیله بیا د بریښنایی بریښنا فابریکو او فصلونو اوبو لګولو لپاره اوبه.' },
                    { id: 'snow', title: 'Snow', titleUrdu: 'برف', titlePashto: 'واوره', type: 'Weather', typeUrdu: 'موسم', typePashto: 'هوا', color: 'from-white to-slate-200', fact: 'Snowflakes are unique.', factUrdu: 'برف کے ٹکڑے منفرد ہوتے ہیں۔', factPashto: 'د واورې ټوټې بې ساري دي.', content: 'Snow comprises individual ice crystals that grow while suspended in the atmosphere—usually within clouds—and then fall, accumulating on the ground where they undergo further changes. It consists of frozen crystalline water throughout its life cycle, starting when, under suitable conditions, the ice crystals form in the atmosphere, increase to millimeter size, precipitate and accumulate on surfaces, then metamorphose in place, and ultimately melt, slide or sublimate away.', contentUrdu: 'برف انفرادی برف کے کرسٹل پر مشتمل ہوتی ہے جو فضا میں معلق رہتے ہوئے بڑھتے ہیں—عام طور پر بادلوں کے اندر—اور پھر گرتے ہیں، زمین پر جمع ہوتے ہیں جہاں ان میں مزید تبدیلیاں آتی ہیں۔ یہ اپنی پوری زندگی کے دوران منجمد کرسٹل لائن پانی پر مشتمل ہوتا ہے، شروع ہوتا ہے جب مناسب حالات میں، برف کے کرسٹل فضا میں بنتے ہیں، ملی میٹر کے سائز میں بڑھتے ہیں، سطحوں پر گرتے اور جمع ہوتے ہیں، پھر جگہ جگہ میٹامورفوس ہوتے ہیں، اور بالآخر پگھل جاتے ہیں، پھسل جاتے ہیں۔ یا دور ہو جانا.', contentPashto: 'واوره د انفرادي یخ کرسټالونه لري چې په اتموسفیر کې د ځنډیدو پرمهال وده کوي — معمولا د ورېځو دننه — او بیا راښکته کیږي ، په ځمکه راټولیږي چیرې چې نور بدلونونه تیریږي. دا د خپل ژوند په اوږدو کې د منجمد کرسټال اوبو څخه جوړ دی، کله چې په مناسبو شرایطو کې، د یخ کرسټالونه په اتموسفیر کې جوړیږي، د ملی متر اندازې ته زیاتیږي، په سطحونو کې تیریږي او راټولیږي، بیا په ځای کې میټامورفوز کیږي، او په پای کې خړوبیږي، سلایډ یا فرعي لیرې کیږي.' },
                    { id: 'wind', title: 'Wind', titleUrdu: 'ہوا', titlePashto: 'باد', type: 'Weather', typeUrdu: 'موسم', typePashto: 'هوا', color: 'from-slate-200 to-slate-400', fact: 'Wind moves air.', factUrdu: 'ہوا ہوا کو حرکت دیتی ہے۔', factPashto: 'باد هوا خوځوي.', content: 'Wind is the flow of gases on a large scale. On the surface of the Earth, wind consists of the bulk movement of air. In outer space, solar wind is the movement of gases or charged particles from the Sun through space, while planetary wind is the outgassing of light chemical elements from a planet\'s atmosphere into space. Winds are commonly classified by their spatial scale, their speed, the types of forces that cause them, the regions in which they occur, and their effect.', contentUrdu: 'ہوا بڑے پیمانے پر گیسوں کا بہاؤ ہے۔ زمین کی سطح پر، ہوا ہوا کی بڑی نقل و حرکت پر مشتمل ہے۔ بیرونی خلا میں، شمسی ہوا خلا کے ذریعے سورج سے گیسوں یا چارج شدہ ذرات کی نقل و حرکت ہے، جبکہ سیاروں کی ہوا سیارے کے ماحول سے خلا میں روشنی کے کیمیائی عناصر کا اخراج ہے۔ ہواؤں کی درجہ بندی عام طور پر ان کے مقامی پیمانے، ان کی رفتار، ان قوتوں کی اقسام جو ان کا سبب بنتی ہیں، ان علاقوں میں جہاں وہ واقع ہوتی ہیں، اور ان کے اثر سے کی جاتی ہے۔', contentPashto: 'باد په لویه کچه د ګازونو جریان دی. د ځمکې په سطحه، باد د هوا لوی حرکت لري. په بهرنۍ فضا کې، لمریز باد د فضا له لارې د لمر څخه د ګازونو یا چارج شوي ذراتو حرکت دی، پداسې حال کې چې د سیارې باد د سیارې له اتموسفیر څخه فضا ته د رڼا کیمیاوي عناصرو ګاز ورکول دي. بادونه عموما د دوی د ځایي پیمانه، د دوی سرعت، د ځواکونو ډولونه چې د دوی لامل کیږي، هغه سیمې چې دوی پکې پیښیږي، او د دوی اغیزې لخوا طبقه بندي کیږي.' },
                    { id: 'hurricane', title: 'Hurricane', titleUrdu: 'طوفان', titlePashto: 'سمندري طوفان', type: 'Storm', typeUrdu: 'طوفان', typePashto: 'طوفان', color: 'from-blue-700 to-slate-600', fact: 'A giant storm.', factUrdu: 'ایک بڑا طوفان۔', factPashto: 'یو لوی طوفان.', content: 'A tropical cyclone is a rapidly rotating storm system characterized by a low-pressure center, a closed low-level atmospheric circulation, strong winds, and a spiral arrangement of thunderstorms that produce heavy rain and squalls. Depending on its location and strength, a tropical cyclone is referred to by different names, including hurricane, typhoon, tropical storm, cyclonic storm, tropical depression, or simply cyclone.', contentUrdu: 'ایک اشنکٹبندیی طوفان ایک تیزی سے گھومنے والا طوفان کا نظام ہے جس کی خصوصیات کم دباؤ والے مرکز، ایک بند نچلی سطح کی وایمنڈلیی گردش، تیز ہوائیں، اور گرج چمک کے طوفانوں کا سرپل انتظام ہے جو موسلادھار بارش اور طوفان پیدا کرتا ہے۔ اس کے مقام اور طاقت پر منحصر ہے، ایک اشنکٹبندیی طوفان کو مختلف ناموں سے پکارا جاتا ہے، بشمول سمندری طوفان، ٹائفون، اشنکٹبندیی طوفان، سائیکلون طوفان، اشنکٹبندیی دباؤ، یا محض سائیکلون۔', contentPashto: 'استوایی طوفان یو ګړندی څرخیدونکی طوفان سیسټم دی چې د ټیټ فشار مرکز ، د ټیټ کچې تړل شوي اتموسفیر گردش ، قوي بادونه ، او د تندرونو سرپل ترتیب لخوا مشخص کیږي چې دروند باران او طوفانونه رامینځته کوي. د دې موقعیت او ځواک پورې اړه لري، یو استوایی طوفان د مختلفو نومونو لخوا راجع کیږي، پشمول د طوفان، ٹائفون، استوایی طوفان، سایکلون طوفان، استوایی فشار، یا په ساده ډول سایکلون.' },
                    { id: 'glacier', title: 'Glacier', titleUrdu: 'گلیشیئر', titlePashto: 'یخچال', type: 'Ice', typeUrdu: 'برف', typePashto: 'یخ', color: 'from-cyan-100 to-cyan-300', fact: 'Rivers of ice.', factUrdu: 'برف کے دریا۔', factPashto: 'د یخ سیندونه.', content: 'A glacier is a persistent body of dense ice that is constantly moving under its own weight. A glacier forms where the accumulation of snow exceeds its ablation over many years, often centuries. Glaciers slowly deform and flow under stresses induced by their weight, creating crevasses, seracs, and other distinguishing features. They also abrade rock and debris from their substrate to create landforms such as cirques, moraines, or fjords. Glaciers form only on land and are distinct from the much thinner sea ice and lake ice that forms on the surface of bodies of water.', contentUrdu: 'گلیشیئر گھنی برف کا ایک مستقل جسم ہے جو اپنے وزن کے نیچے مسلسل حرکت کرتا رہتا ہے۔ ایک گلیشیر بنتا ہے جہاں برف کا جمع ہونا کئی سالوں، اکثر صدیوں میں اس کے خاتمے سے زیادہ ہوتا ہے۔ گلیشیئر دھیرے دھیرے درست ہوتے ہیں اور اپنے وزن کی وجہ سے پیدا ہونے والے دباؤ کے نیچے بہتے ہیں، جس سے دراڑیں، سیراک اور دیگر امتیازی خصوصیات پیدا ہوتی ہیں۔ وہ چٹان اور ملبے کو اپنے ذیلی ذخیرے سے بھی ہٹاتے ہیں تاکہ لینڈ فارم جیسے سرکس، مورینز یا fjords بنائیں۔ گلیشیئر صرف زمین پر بنتے ہیں اور بہت پتلی سمندری برف اور جھیل کی برف سے الگ ہوتے ہیں جو پانی کے اجسام کی سطح پر بنتی ہے۔', contentPashto: 'یخچال د ګنده یخ یوه دوامداره بدن دی چې په دوامداره توګه د خپل وزن لاندې حرکت کوي. یو یخچال جوړیږي چیرې چې د واورې راټولول د ډیری کلونو ، ډیری وختونو پیړیو کې د هغې له تخریب څخه ډیر وي. ګلیشیرونه په تدریجي ډول خرابیږي او د دوی د وزن له امله رامینځته شوي فشارونو لاندې تیریږي ، درزونه ، سیراکونه او نور مشخص ځانګړتیاوې رامینځته کوي. دوی ډبرې او ملنډې هم د خپل سبسټریټ څخه لرې کوي ترڅو د ځمکې شکلونه رامینځته کړي لکه سرکونه ، مورین یا fjords. ګلیشیرونه یوازې په ځمکه کې جوړیږي او د ډیر پتلي سمندري یخ او جهيل یخ څخه توپیر لري چې د اوبو د بدنونو په سطحه رامینځته کیږي.' },
                    { id: 'seasons', title: 'Seasons', titleUrdu: 'موسم', titlePashto: 'فصلونه', type: 'Cycle', typeUrdu: 'چکر', typePashto: 'دوره', color: 'from-green-400 to-orange-400', fact: 'Earth tilts.', factUrdu: 'زمین جھکتی ہے۔', factPashto: 'ځمکه کږه ده.', content: 'A season is a division of the year marked by changes in weather, ecology, and the amount of daylight. On Earth, seasons are the result of Earth\'s orbit around the Sun and Earth\'s axial tilt relative to the ecliptic plane. In temperate and polar regions, the seasons are marked by changes in the intensity of sunlight that reaches the Earth\'s surface, variations of which may cause animals to undergo hibernation or to migrate, and plants to be dormant. Various cultures define the number and nature of seasons based on regional variations, and as such there are a number of modern and historical cultures whose number of seasons vary.', contentUrdu: 'موسم سال کی ایک تقسیم ہے جس میں موسم، ماحولیات اور دن کی روشنی کی مقدار میں تبدیلی ہوتی ہے۔ زمین پر، موسم سورج کے گرد زمین کے مدار اور چاند گرہن کے طیارے کے نسبت زمین کے محوری جھکاؤ کا نتیجہ ہیں۔ معتدل اور قطبی خطوں میں، موسموں کو سورج کی روشنی کی شدت میں تبدیلیوں سے نشان زد کیا جاتا ہے جو زمین کی سطح تک پہنچتی ہے، جن کے تغیرات جانوروں کو ہائبرنیشن یا ہجرت کرنے اور پودوں کے غیر فعال ہونے کا سبب بن سکتے ہیں۔ مختلف ثقافتیں علاقائی تغیرات کی بنیاد پر موسموں کی تعداد اور نوعیت کی وضاحت کرتی ہیں، اور اس طرح بہت سی جدید اور تاریخی ثقافتیں ہیں جن کے موسموں کی تعداد مختلف ہوتی ہے۔', contentPashto: 'یو فصل د کال ویش دی چې د هوا، ایکولوژي، او د ورځې د رڼا په مقدار کې د بدلونونو لخوا نښه شوی. په ځمکه کې، موسمونه د لمر په شاوخوا کې د ځمکې د مدار او د تودوخې الوتکې په نسبتا د ځمکې محوری ټیلټ پایله ده. په معتدل او قطبي سیمو کې، موسمونه د لمر د وړانګو په شدت کې بدلونونه په نښه کوي چې د ځمکې سطحې ته رسیږي، چې بدلونونه کیدای شي حیوانات د خوب یا مهاجرت لامل شي، او نباتات غیر فعال وي. مختلف کلتورونه د سیمه ایزو بدلونونو پراساس د موسمونو شمیر او ماهیت تعریفوي، او پدې توګه یو شمیر عصري او تاریخي کلتورونه شتون لري چې د موسمونو شمیر توپیر لري.' },
                    { id: 'cave', title: 'Cave', titleUrdu: 'غار', titlePashto: 'غار', type: 'Geology', typeUrdu: 'ارضیات', typePashto: 'جیولوژي', color: 'from-stone-700 to-stone-900', fact: 'Caves are underground.', factUrdu: 'غاریں زیر زمین ہیں۔', factPashto: 'غارونه تر ځمکې لاندې دي.', content: 'A cave or cavern is a natural void in the ground, specifically a space large enough for a human to enter. Caves often form by the weathering of rock and often extend deep underground. The word cave can also refer to much smaller openings such as sea caves, rock shelters, and grottos, though strictly speaking a cave is exogene, meaning it is deeper than its opening is wide, and a rock shelter is endogene. Speleology is the science of exploration and study of all aspects of caves and the cave environment.', contentUrdu: 'غار یا غار زمین میں ایک قدرتی خلا ہے، خاص طور پر ایک ایسی جگہ جو انسان کے داخل ہونے کے لیے کافی بڑی ہے۔ غار اکثر چٹان کے موسم سے بنتے ہیں اور اکثر زمین کے نیچے گہرائی تک پھیلتے ہیں۔ لفظ غار بہت چھوٹے سوراخوں کا بھی حوالہ دے سکتا ہے جیسے سمندری غار، چٹانوں کی پناہ گاہیں اور گروٹوز، حالانکہ سختی سے بات کی جائے تو غار exogene ہے، یعنی یہ اس کے کھلنے سے زیادہ گہرا ہے، اور چٹان کی پناہ گاہ اینڈوجین ہے۔ Speleology غاروں اور غار کے ماحول کے تمام پہلوؤں کی کھوج اور مطالعہ کی سائنس ہے۔', contentPashto: 'غار یا غار په ځمکه کې یو طبیعي باطل دی، په ځانګړې توګه یو ځای چې د انسان د ننوتلو لپاره کافي لوی وي. غارونه اکثرا د ډبرې د تودوخې په واسطه جوړیږي او ډیری وختونه د ځمکې لاندې ژور پراخیږي. د غار کلمه کولی شي ډیر کوچني خلاصیدو ته هم اشاره وکړي لکه د سمندري غارونو ، د ډبرې پناه ځایونه او ګروټوز ، که څه هم په کلکه خبرې کول یو غار exogene دی ، پدې معنی چې دا د خلاصیدو په پرتله ژور دی ، او د ډبرې پناه ځای اینڈوجین دی. سپیلیولوژی د غارونو او غار چاپیریال ټولو اړخونو سپړلو او مطالعې ساینس دی.' },
                    { id: 'island', title: 'Island', titleUrdu: 'جزیرہ', titlePashto: 'ټاپو', type: 'Geography', typeUrdu: 'جغرافیہ', typePashto: 'جغرافیه', color: 'from-green-300 to-blue-400', fact: 'Islands are land.', factUrdu: 'جزیرے زمین ہیں۔', factPashto: 'ټاپوګان ځمکه ده.', content: 'An island or isle is any piece of sub-continental land that is surrounded by water. Very small islands such as emergent land features on atolls can be called islets, skerries, cays or keys. An island in a river or a lake island may be called an eyot or ait, and a small island off the coast may be called a holm. Sedimentary islands in the Ganges delta are called chars. A grouping of geographically or geologically related islands, such as the Philippines, is referred to as an archipelago.', contentUrdu: 'جزیرہ یا جزیرہ ذیلی براعظمی زمین کا کوئی بھی ٹکڑا ہے جو پانی سے گھرا ہوا ہے۔ بہت چھوٹے جزائر جیسے اٹول پر ابھرتی ہوئی زمینی خصوصیات کو آئیلیٹس، سکیریز، کیز یا کیز کہا جا سکتا ہے۔ دریا یا جھیل کے جزیرے میں ایک جزیرے کو eyot یا ait کہا جا سکتا ہے، اور ساحل سے دور ایک چھوٹے سے جزیرے کو ہولم کہا جا سکتا ہے۔ گنگا کے ڈیلٹا میں تلچھٹ والے جزیروں کو چار کہتے ہیں۔ جغرافیائی یا ارضیاتی طور پر متعلقہ جزائر کا ایک گروپ، جیسے فلپائن، کو جزیرے کا نام دیا جاتا ہے۔', contentPashto: 'ټاپو یا ټاپو د فرعي براعظم ځمکې هر هغه ټوټه ده چې د اوبو لخوا محاصره وي. ډیر کوچني ټاپوګان لکه په اتولونو کې د ځمکې راپورته کیدونکي ځانګړتیاوې کیدای شي د ostrv، skerries، cays یا کیلي په نوم یاد شي. په سیند یا د جهيل ټاپو کې یو ټاپو کیدای شي ایوټ یا ایټ وبلل شي، او د ساحل څخه لیرې یو کوچنی ټاپو ممکن د هولم په نوم یاد شي. د ګنګا په ډیلټا کې د سیډمینټري ټاپوګانو چارس ویل کیږي. د جغرافیایی یا جیولوژیکي اړوند ټاپوګانو ګروپ کول، لکه فیلیپین، د ارکیپیلاګو په نوم یادیږي.' }
                ]

                            <a href="https://pashtuneinstein.com/#contact" className="hover:text-blue-400 transition-colors">Contact</a>
                            <a href="https://blog.pashtuneinstein.com/" className="hover:text-blue-400 transition-colors">Blog</a>
                            <a href="privacy_policy.html" className="hover:text-blue-400 transition-colors">Privacy Policy</a>
                        </div>
                        <div className="flex items-center gap-2">
                            <BookOpen className="w-4 h-4" />
                            <p className={currentFontClass}>{uiText.footerQuote[language]}</p>
                        </div>
                        </div>
                    </footer>

                    <LessonModal topic={activeTopic} lang={language} onClose={() => setActiveTopic(null)} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
