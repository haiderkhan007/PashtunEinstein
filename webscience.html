            {
                id: 'biology',
                title: 'Biology & Nature',
                titleUrdu: 'حیاتیات اور فطرت',
                titlePashto: 'بیولوژي او طبیعت',
                icon: <Dna className="w-6 h-6 text-green-400" />,
                description: 'From cells to forests.',
                descriptionUrdu: 'خلیات سے جنگلات تک۔',
                descriptionPashto: 'له حجرو څخه تر ځنګلونو پورې.',
                gradient: 'from-green-500/20 to-emerald-500/20',
                topics: [
                    { id: 'tree', title: 'Trees', titleUrdu: 'درخت', titlePashto: 'ونې', type: 'Nature', typeUrdu: 'فطرت', typePashto: 'طبیعت', color: 'from-green-600 to-emerald-800', fact: 'Trees are the lungs of the Earth.', factUrdu: 'درخت زمین کے پھیپھڑے ہیں۔', factPashto: 'ونې د ځمکې سږي دي.', content: 'Trees are tall, woody plants that live for many years. They are vital to life on Earth because they perform photosynthesis, taking in carbon dioxide and releasing oxygen for us to breathe. Trees also help clean the air by trapping dust and pollutants. Their roots hold the soil together, preventing erosion, and their leaves provide shade and cooling. Forests of trees are habitats for millions of animals, birds, and insects. Without trees, the Earth would be much hotter and the air would be hard to breathe.', contentUrdu: 'درخت لمبے، لکڑی والے پودے ہیں جو کئی سال زندہ رہتے ہیں۔ یہ زمین پر زندگی کے لیے اہم ہیں کیونکہ یہ ضیائی تالیف کرتے ہیں، کاربن ڈائی آکسائیڈ لیتے ہیں اور ہمارے سانس لینے کے لیے آکسیجن خارج کرتے ہیں۔ درخت دھول اور آلودگی کو جذب کرکے ہوا کو صاف کرنے میں بھی مدد کرتے ہیں۔ ان کی جڑیں مٹی کو جوڑے رکھتی ہیں، کٹاؤ کو روکتی ہیں، اور ان کے پتے سایہ اور ٹھنڈک فراہم کرتے ہیں۔ درختوں کے جنگلات لاکھوں جانوروں، پرندوں اور کیڑوں کا مسکن ہیں۔ درختوں کے بغیر، زمین بہت زیادہ گرم ہوتی اور ہوا میں سانس لینا مشکل ہوتا۔', contentPashto: 'ونې لوړ، لرګین نباتات دي چې د ډیرو کلونو لپاره ژوند کوي. دوی په ځمکه کې د ژوند لپاره حیاتي دي ځکه چې دوی فوتوسنتز ترسره کوي، کاربن ډای اکسایډ اخلي او د تنفس لپاره اکسیجن خوشې کوي. ونې د دوړو او ککړتیاو په نیولو سره د هوا پاکولو کې هم مرسته کوي. د دوی ریښې خاوره یوځای ساتي، د تخریب مخه نیسي، او د دوی پاڼې سیوری او یخوالی چمتو کوي. د ونو ځنګلونه د ملیونونو حیواناتو، مرغیو او حشراتو استوګنځایونه دي. د ونو پرته، ځمکه به ډیره ګرمه وي او تنفس کول به سخت وي.' },
                    { id: 'forests', title: 'Forests', titleUrdu: 'جنگلات', titlePashto: 'ځنګلونه', type: 'Ecosystem', typeUrdu: 'ماحولیاتی نظام', typePashto: 'ایکو سیسټم', color: 'from-emerald-500 to-green-700', fact: 'Forests are home to 80% of land animals.', factUrdu: 'جنگلات 80 فیصد زمینی جانوروں کا گھر ہیں۔', factPashto: 'ځنګلونه د ۸۰٪ ځمکنیو حیواناتو کور دی.', content: 'A forest is a large area dominated by trees. Forests cover about 31% of the world\'s land area. They are critical for the health of our planet because they absorb carbon dioxide, a greenhouse gas that causes global warming. Forests also regulate the water cycle, prevent soil erosion, and provide food and shelter for countless species. There are different types of forests, such as tropical rainforests, temperate forests, and boreal forests, each with its own unique plants and animals.', contentUrdu: 'جنگل ایک بڑا علاقہ ہے جس پر درختوں کا غلبہ ہے۔ جنگلات دنیا کے زمینی رقبے کا تقریباً 31 فیصد احاطہ کرتے ہیں۔ یہ ہمارے سیارے کی صحت کے لیے اہم ہیں کیونکہ یہ کاربن ڈائی آکسائیڈ جذب کرتے ہیں، جو ایک گرین ہاؤس گیس ہے جو گلوبل وارمنگ کا سبب بنتی ہے۔ جنگلات آبی چکر کو بھی منظم کرتے ہیں، مٹی کے کٹاؤ کو روکتے ہیں، اور لاتعداد پرجاتیوں کے لیے خوراک اور پناہ گاہ فراہم کرتے ہیں۔ جنگلات کی مختلف اقسام ہیں، جیسے اشنکٹبندیی برساتی جنگلات، معتدل جنگلات، اور بوریل جنگلات، ہر ایک کے اپنے منفرد پودے اور جانور ہیں۔', contentPashto: 'ځنګل یوه لویه سیمه ده چې د ونو تسلط لري. ځنګلونه د نړۍ د ځمکې شاوخوا ۳۱٪ برخه پوښي. دوی زموږ د سیارې روغتیا لپاره خورا مهم دي ځکه چې دوی کاربن ډای اکسایډ جذبوي، یو شنو خونو ګاز چې د نړیوال تودوخې لامل کیږي. ځنګلونه د اوبو دوره هم تنظیموي، د خاورې د تخریب مخه نیسي، او د بې شمیره ډولونو لپاره خواړه او سرپناه چمتو کوي. د ځنګلونو بیلابیل ډولونه شتون لري، لکه استوایی باراني ځنګلونه، معتدل ځنګلونه، او بوریل ځنګلونه، هر یو د خپل ځانګړي نباتاتو او حیواناتو سره.' },
                    { id: 'cell', title: 'The Cell', titleUrdu: 'خلیہ', titlePashto: 'حجره', type: 'Unit', typeUrdu: 'اکائی', typePashto: 'واحد', color: 'from-green-400 to-teal-600', fact: 'Cells are the building blocks of life.', factUrdu: 'خلیات زندگی کی بنیاد ہیں۔', factPashto: 'حجرې د ژوند بنسټیز بلاکونه دي.', content: 'A cell is the smallest structural and functional unit of an organism. It is often called the "building block of life." All living things, from tiny bacteria to giant whales, are made of cells. Some organisms, like bacteria, are unicellular (made of only one cell), while others, like humans, are multicellular (made of trillions of cells). Cells have different parts that do different jobs, like the nucleus which holds DNA, and the mitochondria which provides energy. Your body is essentially a massive community of cells working together.', contentUrdu: 'خلیہ کسی جاندار کی سب سے چھوٹی ساختی اور فعال اکائی ہے۔ اسے اکثر "زندگی کی بنیادی اکائی" کہا جاتا ہے۔ تمام جاندار، چھوٹے بیکٹیریا سے لے کر دیو ہیکل وہیل تک، خلیات سے بنے ہیں۔ کچھ جاندار، جیسے بیکٹیریا، یک خلوی (صرف ایک خلیے سے بنے) ہوتے ہیں، جبکہ دوسرے، جیسے انسان، کثیر خلوی (کھربوں خلیات سے بنے) ہوتے ہیں۔ خلیات کے مختلف حصے ہوتے ہیں جو مختلف کام کرتے ہیں، جیسے نیوکلئس جو ڈی این اے رکھتا ہے، اور مائٹوکونڈریا جو توانائی فراہم کرتا ہے۔ آپ کا جسم بنیادی طور پر خلیات کی ایک بڑی برادری ہے جو مل کر کام کر رہے ہیں۔', contentPashto: 'حجره د یو ژوندي موجود ترټولو کوچنی جوړښتی او وظیفوي واحد دی. دا ډیری وختونه د "ژوند د ودانۍ بلاک" په نوم یادیږي. ټول ژوندي شیان، له کوچنیو باکتریا څخه نیولې تر لویو ویلونو پورې، له حجرو څخه جوړ شوي دي. ځینې ژوندي موجودات، لکه باکتریا، یو حجروي دي (یوازې د یوې حجرې څخه جوړ شوي)، پداسې حال کې چې نور، لکه انسانان، څو حجروي دي (د ټریلیونونو حجرو څخه جوړ شوي). حجرې بیلابیلې برخې لري چې مختلف دندې ترسره کوي، لکه نیوکلیوس چې DNA ساتي، او مایتوکونډریا چې انرژي چمتو کوي. ستاسو بدن په اصل کې د حجرو یوه لویه ټولنه ده چې یوځای کار کوي.' },
                    { id: 'dna', title: 'DNA', titleUrdu: 'ڈی این اے', titlePashto: 'DNA', type: 'Genetics', typeUrdu: 'جینیات', typePashto: 'جینیتیک', color: 'from-rose-400 to-pink-600', fact: 'DNA holds your genetic code.', factUrdu: 'ڈی این اے میں آپ کا جینیاتی کوڈ ہوتا ہے۔', factPashto: 'DNA ستاسو جینیاتی کوډ لري.', content: 'DNA, or deoxyribonucleic acid, is the molecule that carries genetic information for the development and functioning of an organism. It is like a blueprint or recipe book for life. DNA is made of two long chains that coil around each other to form a double helix. The information in DNA is stored as a code made up of four chemical bases: adenine (A), guanine (G), cytosine (C), and thymine (T). This code determines your traits, such as your eye color, hair color, and height.', contentUrdu: 'ڈی این اے، یا ڈیوکسیریبونوکلک ایسڈ، وہ مالیکیول ہے جو کسی جاندار کی نشوونما اور کام کرنے کے لیے جینیاتی معلومات رکھتا ہے۔ یہ زندگی کے لیے ایک بلیو پرنٹ یا ترکیب کی کتاب کی طرح ہے۔ ڈی این اے دو لمبی زنجیروں سے بنا ہے جو ایک دوسرے کے گرد کنڈلی بنا کر ڈبل ہیلکس بناتے ہیں۔ ڈی این اے میں معلومات چار کیمیائی بنیادوں پر مشتمل کوڈ کے طور پر محفوظ کی جاتی ہیں: ایڈینائن (A)، گوانین (G)، سائٹوسین (C)، اور تھامین (T)۔ یہ کوڈ آپ کی خصوصیات کا تعین کرتا ہے، جیسے آپ کی آنکھوں کا رنگ، بالوں کا رنگ، اور قد۔', contentPashto: 'ډي این اې، یا ډیوکسیریبونیوکلیک اسید، هغه مالیکول دی چې د ژوندي موجود د پراختیا او فعالیت لپاره جینیاتي معلومات لیږدوي. دا د ژوند لپاره د نقشې یا ترکیب کتاب په څیر دی. DNA د دوو اوږدو زنځیرونو څخه جوړ شوی دی چې د یو بل په شاوخوا کې د دوه ګوني هیلکس جوړولو لپاره کویل کوي. په DNA کې معلومات د کوډ په توګه ساتل کیږي چې له څلورو کیمیاوي اډو څخه جوړ شوي: اډینین (A)، ګوانین (G)، سایتوسین (C)، او تایمین (T). دا کوډ ستاسو ځانګړتیاوې ټاکي، لکه ستاسو د سترګو رنګ، د ویښتو رنګ، او قد.' },
                    { id: 'brain', title: 'The Brain', titleUrdu: 'دماغ', titlePashto: 'ماغزه', type: 'Organ', typeUrdu: 'عضو', typePashto: 'عضو', color: 'from-pink-400 to-rose-500', fact: 'The brain controls the body.', factUrdu: 'دماغ جسم کو کنٹرول کرتا ہے۔', factPashto: 'ماغزه بدن کنټرولوي.', content: 'The brain is the most complex organ in the human body. It serves as the center of the nervous system, controlling all our thoughts, movements, memories, and emotions. The brain receives information from our senses (sight, sound, touch, taste, smell) and processes it to help us understand the world. It is made up of billions of nerve cells called neurons, which communicate with each other through electrical and chemical signals. The brain is divided into different parts, each responsible for different functions, such as balance, breathing, and decision-making.', contentUrdu: 'دماغ انسانی جسم کا سب سے پیچیدہ عضو ہے۔ یہ اعصابی نظام کے مرکز کے طور پر کام کرتا ہے، ہمارے تمام خیالات، حرکات، یادوں اور جذبات کو کنٹرول کرتا ہے۔ دماغ ہمارے حواس (بصارت، آواز، لمس، ذائقہ، بو) سے معلومات حاصل کرتا ہے اور دنیا کو سمجھنے میں ہماری مدد کے لیے اس پر عمل کرتا ہے۔ یہ اربوں اعصابی خلیوں سے بنا ہے جسے نیوران کہتے ہیں، جو برقی اور کیمیائی سگنلوں کے ذریعے ایک دوسرے سے بات چیت کرتے ہیں۔ دماغ کو مختلف حصوں میں تقسیم کیا گیا ہے، ہر ایک مختلف افعال کے لیے ذمہ دار ہے، جیسے توازن، سانس لینے اور فیصلہ سازی۔', contentPashto: 'مازغه د انسان په بدن کې ترټولو پیچلي عضوي ده. دا د عصبي سیسټم د مرکز په توګه کار کوي، زموږ ټول فکرونه، حرکتونه، یادونه او احساسات کنټرولوي. مغز زموږ د حواس (لید، غږ، لمس، خوند، بوی) څخه معلومات ترلاسه کوي او پروسس کوي ترڅو موږ سره د نړۍ په پوهیدو کې مرسته وکړي. دا د ملیاردونو عصبي حجرو څخه جوړ دی چې نیورون نومیږي، کوم چې د بریښنایی او کیمیاوي سیګنالونو له لارې یو بل سره اړیکه نیسي. مغز په بیلابیلو برخو ویشل شوی، هر یو د مختلفو دندو مسولیت لري، لکه توازن، تنفس، او پریکړه کول.' },
                    { id: 'heart', title: 'The Heart', titleUrdu: 'دل', titlePashto: 'زړه', type: 'Organ', typeUrdu: 'عضو', typePashto: 'عضو', color: 'from-red-500 to-red-700', fact: 'The heart is a muscle.', factUrdu: 'دل ایک پٹھا ہے۔', factPashto: 'زړه یوه عضلې ده.', content: 'The heart is a muscular organ about the size of your fist, located just behind and slightly left of the breastbone. Its main function is to pump blood throughout the body via the circulatory system. This blood delivers oxygen and nutrients to all the cells in the body and removes waste products like carbon dioxide. The heart has four chambers: two upper atria and two lower ventricles. It works tirelessly, beating about 100,000 times a day to keep you alive.', contentUrdu: 'دل ایک عضلاتی عضو ہے جو آپ کی مٹھی کے سائز کے بارے میں ہے، جو چھاتی کی ہڈی کے بالکل پیچھے اور تھوڑا بائیں طرف واقع ہے۔ اس کا بنیادی کام دوران خون کے نظام کے ذریعے پورے جسم میں خون پمپ کرنا ہے۔ یہ خون جسم کے تمام خلیوں تک آکسیجن اور غذائی اجزاء پہنچاتا ہے اور کاربن ڈائی آکسائیڈ جیسے فضلہ کو ہٹاتا ہے۔ دل کے چار خانے ہوتے ہیں: دو اوپری ایٹریا اور دو نچلے وینٹریکلز۔ یہ انتھک محنت کرتا ہے، آپ کو زندہ رکھنے کے لیے دن میں تقریباً 100,000 بار دھڑکتا ہے۔', contentPashto: 'زړه یو عضلاتی غړی دی چې ستاسو د مټي د اندازې په اړه دی، یوازې د سینې هډوکي شاته او یو څه کیڼ لور ته موقعیت لري. د دې اصلي دنده د دوران سیسټم له لارې په ټول بدن کې وینه پمپ کول دي. دا وینه د بدن ټولو حجرو ته اکسیجن او غذايي مواد رسوي او د کاربن ډای اکسایډ په څیر فاضله محصولات لرې کوي. زړه څلور خونې لري: دوه پورته ایټریا او دوه ښکته وینټریکونه. دا نه ستړي کیدونکي کار کوي، په ورځ کې شاوخوا ۱۰۰،۰۰۰ ځله وهل کیږي ترڅو تاسو ژوندي وساتئ.' },
                    { id: 'lungs', title: 'The Lungs', titleUrdu: 'پھیپھڑے', titlePashto: 'سږي', type: 'Organ', typeUrdu: 'عضو', typePashto: 'عضو', color: 'from-sky-300 to-blue-400', fact: 'We breathe in oxygen.', factUrdu: 'ہم آکسیجن میں سانس لیتے ہیں۔', factPashto: 'موږ اکسیجن تنفس کوو.', content: 'The lungs are a pair of spongy, air-filled organs located on either side of the chest. They are the primary organs of the respiratory system. When you breathe in (inhale), air enters your lungs, and oxygen from that air moves into your blood. At the same time, a waste gas called carbon dioxide moves from your blood into the lungs and is breathed out (exhaled). This process is called gas exchange and is essential for life.', contentUrdu: 'پھیپھڑے سینے کے دونوں طرف واقع اسفنجی، ہوا سے بھرے اعضاء کا ایک جوڑا ہیں۔ وہ نظام تنفس کے بنیادی اعضاء ہیں۔ جب آپ سانس لیتے ہیں (سانس لیتے ہیں)، ہوا آپ کے پھیپھڑوں میں داخل ہوتی ہے، اور اس ہوا سے آکسیجن آپ کے خون میں منتقل ہوتی ہے۔ اسی وقت، کاربن ڈائی آکسائیڈ نامی فضلہ گیس آپ کے خون سے پھیپھڑوں میں منتقل ہوتی ہے اور سانس باہر نکالی جاتی ہے (سانس چھوڑنا)۔ اس عمل کو گیس کا تبادلہ کہتے ہیں اور یہ زندگی کے لیے ضروری ہے۔', contentPashto: 'سږي یو جوړه سپنجي، د هوا څخه ډک شوي غړي دي چې د سینې په دواړو اړخونو کې موقعیت لري. دوی د تنفسي سیسټم لومړني غړي دي. کله چې تاسو تنفس کوئ (تنفس کوئ)، هوا ستاسو سږو ته ننوځي، او له دې هوا څخه اکسیجن ستاسو وینې ته ځي. په ورته وخت کې، د کاربن ډای اکسایډ په نوم فاضله ګاز ستاسو د وینې څخه سږو ته ځي او تنفس کیږي (توزیع کیږي). دې پروسې ته د ګاز تبادله ویل کیږي او د ژوند لپاره اړین دي.' },
                    { id: 'stomach', title: 'The Stomach', titleUrdu: 'معدہ', titlePashto: 'معده', type: 'Organ', typeUrdu: 'عضو', typePashto: 'عضو', color: 'from-orange-300 to-pink-400', fact: 'Acid digests food.', factUrdu: 'تیزاب کھانا ہضم کرتا ہے۔', factPashto: 'تیزاب خواړه هضموي.', content: 'The stomach is a J-shaped organ located in the upper abdomen. It is part of the digestive system. When you eat, food travels down a tube called the esophagus into your stomach. The stomach churns the food and mixes it with strong digestive juices (acids and enzymes) to break it down into a liquid mixture. This process prepares the food so that your body can absorb nutrients and energy from it in the intestines.', contentUrdu: 'معدہ اوپری پیٹ میں واقع ایک J شکل کا عضو ہے۔ یہ نظام انہضام کا حصہ ہے۔ جب آپ کھاتے ہیں تو کھانا غذائی نالی نامی ٹیوب کے نیچے آپ کے معدے میں جاتا ہے۔ معدہ کھانے کو مٹاتا ہے اور اسے مضبوط ہاضمے کے جوس (تیزاب اور انزائمز) کے ساتھ ملا دیتا ہے تاکہ اسے مائع مرکب میں توڑ دیا جا سکے۔ یہ عمل کھانے کو تیار کرتا ہے تاکہ آپ کا جسم آنتوں میں اس سے غذائی اجزاء اور توانائی جذب کر سکے۔', contentPashto: 'معده یو J-شکل لرونکی عضوی دی چې په پورتنۍ معدې کې موقعیت لري. دا د هاضمي سیسټم برخه ده. کله چې تاسو وخورئ، خواړه د یو ټیوب لاندې سفر کوي چې د esophagus په نوم یادیږي ستاسو معدې ته. معده خواړه ماتوي او د قوي هاضمي جوس (تیزاب او انزایمونو) سره ګډوي ترڅو دا په مایع مخلوط کې مات کړي. دا پروسه خواړه چمتو کوي ترڅو ستاسو بدن وکولی شي په کولمو کې له هغې څخه مغذي مواد او انرژي جذب کړي.' },
                    { id: 'skeleton', title: 'Skeleton', titleUrdu: 'ڈھانچہ', titlePashto: 'سکلیټ', type: 'System', typeUrdu: 'نظام', typePashto: 'سیسټم', color: 'from-stone-200 to-stone-400', fact: 'Adults have 206 bones.', factUrdu: 'بالغوں میں 206 ہڈیاں ہوتی ہیں۔', factPashto: 'لویان ۲۰۶ هډوکي لري.', content: 'The skeleton is the internal framework of the human body. It is made up of 206 bones in an adult. The skeleton serves several key functions: it supports the body and gives it shape, protects vital internal organs (like the skull protecting the brain and ribs protecting the heart), allows movement by providing attachment points for muscles, stores minerals like calcium, and produces blood cells in the bone marrow.', contentUrdu: 'ڈھانچہ انسانی جسم کا اندرونی فریم ورک ہے۔ یہ ایک بالغ میں 206 ہڈیوں سے بنا ہے۔ ڈھانچہ کئی اہم کام انجام دیتا ہے: یہ جسم کو سہارا دیتا ہے اور اسے شکل دیتا ہے، اہم اندرونی اعضاء کی حفاظت کرتا ہے (جیسے کھوپڑی دماغ کی حفاظت کرتی ہے اور پسلیاں دل کی حفاظت کرتی ہیں)، پٹھوں کے لیے اٹیچمنٹ پوائنٹس فراہم کر کے حرکت کی اجازت دیتا ہے، کیلشیم جیسے معدنیات کو ذخیرہ کرتا ہے، اور بون میرو میں خون کے خلیات پیدا کرتا ہے۔', contentPashto: 'سکلیټ د انسان د بدن داخلي چوکاټ دی. دا په بالغ کې د ۲۰۶ هډوکو څخه جوړ شوی دی. سکلیټ ډیری کلیدي دندې ترسره کوي: دا د بدن ملاتړ کوي او شکل ورکوي، د حیاتي داخلي ارګانونو ساتنه کوي (لکه کوپړۍ د دماغ ساتنه کوي او پسښې د زړه ساتنه کوي)، د عضلاتو لپاره د ضمیمه ټکو چمتو کولو سره د حرکت اجازه ورکوي، منرالونه لکه کلسیم ذخیره کوي، او د هډوکي میرو کې د وینې حجرې تولیدوي.' },
                    { id: 'skin', title: 'Skin', titleUrdu: 'جلد', titlePashto: 'پوټکی', type: 'Organ', typeUrdu: 'عضو', typePashto: 'عضو', color: 'from-amber-200 to-orange-200', fact: 'Skin is the largest organ.', factUrdu: 'جلد سب سے بڑا عضو ہے۔', factPashto: 'پوټکی ترټولو لوی غړی دی.', content: 'The skin is the largest organ of the body. It covers the entire body and serves as a protective barrier against injury, infection, and ultraviolet light. The skin also helps regulate body temperature (through sweating) and allows us to feel sensations like touch, heat, and cold. It has three main layers: the epidermis (outer layer), dermis (middle layer), and hypodermis (inner layer).', contentUrdu: 'جلد جسم کا سب سے بڑا عضو ہے۔ یہ پورے جسم کو ڈھانپتا ہے اور چوٹ، انفیکشن، اور الٹرا وائلٹ روشنی کے خلاف حفاظتی رکاوٹ کے طور پر کام کرتا ہے۔ جلد جسم کے درجہ حرارت کو منظم کرنے میں بھی مدد کرتی ہے (پسینے کے ذریعے) اور ہمیں لمس، گرمی اور سردی جیسے احساسات کو محسوس کرنے دیتی ہے۔ اس کی تین اہم تہیں ہیں: ایپیڈرمس (بیرونی تہہ)، ڈرمیس (درمیانی تہہ)، اور ہائپوڈرمس (اندرونی تہہ)۔', contentPashto: 'پوټکی د بدن ترټولو لوی غړی دی. دا ټول بدن پوښي او د ټپ، انفیکشن، او الټرا وایلیټ رڼا په وړاندې د محافظتي خنډ په توګه کار کوي. پوټکی د بدن د تودوخې تنظیم کولو کې هم مرسته کوي (د خولې له لارې) او موږ ته اجازه راکوي چې د لمس، تودوخې او یخنۍ په څیر احساسات احساس کړو. دا درې اصلي پرتونه لري: ایپیډرمیس (بهرنی طبقه)، ډرمیس (منځنۍ طبقه)، او هایپوډرمیس (داخلي طبقه).' },
                    { id: 'bacteria', title: 'Bacteria', titleUrdu: 'بیکٹیریا', titlePashto: 'باکتریا', type: 'Microbe', typeUrdu: 'جراثیم', typePashto: 'مایکروب', color: 'from-lime-500 to-green-600', fact: 'Some bacteria are good.', factUrdu: 'کچھ بیکٹیریا اچھے ہوتے ہیں۔', factPashto: 'ځینې باکتریا ښه دي.', content: 'Bacteria are microscopic, single-celled organisms that thrive in diverse environments. They can live in soil, the ocean, and inside the human body. While some bacteria can cause diseases (like strep throat), many are helpful. Good bacteria in our digestive system help us break down food, and bacteria in the soil help plants grow by recycling nutrients. Bacteria come in various shapes, including spheres, rods, and spirals.', contentUrdu: 'بیکٹیریا خوردبینی، یک خلوی جاندار ہیں جو متنوع ماحول میں پروان چڑھتے ہیں۔ وہ مٹی، سمندر اور انسانی جسم کے اندر رہ سکتے ہیں۔ اگرچہ کچھ بیکٹیریا بیماریاں (جیسے اسٹریپ تھروٹ) کا سبب بن سکتے ہیں، بہت سے مددگار ہیں۔ ہمارے نظام انہضام میں اچھے بیکٹیریا ہمیں کھانے کو توڑنے میں مدد کرتے ہیں، اور مٹی میں موجود بیکٹیریا غذائی اجزاء کو ری سائیکل کرکے پودوں کو بڑھنے میں مدد کرتے ہیں۔ بیکٹیریا مختلف شکلوں میں آتے ہیں، بشمول دائرے، سلاخیں، اور سرپل۔', contentPashto: 'باکتریا مایکروسکوپي، یو حجروي ژوندي موجودات دي چې په مختلفو چاپیریالونو کې وده کوي. دوی کولی شي په خاوره، سمندر او د انسان په بدن کې ژوند وکړي. پداسې حال کې چې ځینې باکتریاوې د ناروغیو لامل کیدی شي (لکه د ستوني درد)، ډیری یې ګټور دي. زموږ د هاضمې په سیسټم کې ښه باکتریا موږ سره د خواړو په ماتولو کې مرسته کوي، او په خاوره کې باکتریا د مغذي موادو ریسایکل کولو سره د نباتاتو وده کې مرسته کوي. باکتریا په مختلفو شکلونو کې راځي، پشمول د کره، راډونو او سرپلونو.' },
                    { id: 'virus', title: 'Virus', titleUrdu: 'وائرس', titlePashto: 'ویروس', type: 'Microbe', typeUrdu: 'جراثیم', typePashto: 'مایکروب', color: 'from-green-600 to-lime-600', fact: 'Viruses need a host.', factUrdu: 'وائرس کو میزبان کی ضرورت ہوتی ہے۔', factPashto: 'ویروس کوربه ته اړتیا لري.', content: 'A virus is a tiny infectious agent that reproduces only inside the living cells of an organism. Viruses can infect all types of life forms, from animals and plants to microorganisms, including bacteria. They are much smaller than bacteria. Outside a living cell, a virus is inactive, but once inside, it takes over the cell\'s machinery to make copies of itself. Common viral diseases include the common cold, flu, and chickenpox.', contentUrdu: 'وائرس ایک چھوٹا سا متعدی ایجنٹ ہے جو صرف ایک جاندار کے زندہ خلیوں کے اندر دوبارہ پیدا ہوتا ہے۔ وائرس جانوروں اور پودوں سے لے کر مائکروجنزموں تک، بشمول بیکٹیریا، ہر قسم کی زندگی کو متاثر کر سکتے ہیں۔ وہ بیکٹیریا سے بہت چھوٹے ہیں۔ ایک زندہ سیل کے باہر، ایک وائرس غیر فعال ہے، لیکن ایک بار اندر، یہ اپنی کاپیاں بنانے کے لئے سیل کی مشینری پر قبضہ کر لیتا ہے۔ عام وائرل بیماریوں میں نزلہ زکام، فلو اور چکن پاکس شامل ہیں۔', contentPashto: 'ویروس یو کوچنی ساري ایجنټ دی چې یوازې د ژوندي موجوداتو د ژوندیو حجرو دننه بیا تولید کوي. ویروسونه کولی شي د ژوند ټول ډولونه اخته کړي، له حیواناتو او نباتاتو څخه نیولې تر مایکرو ارګانیزمونو، په شمول د باکتریا. دوی د باکتریا په پرتله خورا کوچني دي. د ژوندي حجرې څخه بهر، ویروس غیر فعال دی، مګر یوځل دننه، دا د خپل ځان کاپي کولو لپاره د حجرې ماشین په غاړه اخلي. عام ویروسي ناروغیو کې عام زکام، فلو، او چیچک شامل دي.' },
                    { id: 'plant', title: 'Plants', titleUrdu: 'پودے', titlePashto: 'نبوتات', type: 'Life', typeUrdu: 'زندگی', typePashto: 'ژوند', color: 'from-green-400 to-emerald-600', fact: 'Plants make their own food.', factUrdu: 'پودے اپنی خوراک خود بناتے ہیں۔', factPashto: 'نبوتات خپل خواړه پخپله جوړوي.', content: 'Plants are living organisms that belong to the kingdom Plantae. They include trees, shrubs, grasses, ferns, and mosses. Unlike animals, plants cannot move from place to place on their own. Most plants make their own food through a process called photosynthesis, using sunlight, water, and carbon dioxide. Plants are essential for life on Earth as they provide oxygen, food, and habitat for many other organisms.', contentUrdu: 'پودے جاندار ہیں جن کا تعلق کنگڈم پلانٹی سے ہے۔ ان میں درخت، جھاڑیاں، گھاس، فرنز اور کائی شامل ہیں۔ جانوروں کے برعکس، پودے خود ایک جگہ سے دوسری جگہ نہیں جا سکتے۔ زیادہ تر پودے سورج کی روشنی، پانی اور کاربن ڈائی آکسائیڈ کا استعمال کرتے ہوئے فوٹو سنتھیسس نامی عمل کے ذریعے اپنی خوراک خود بناتے ہیں۔ پودے زمین پر زندگی کے لیے ضروری ہیں کیونکہ وہ بہت سے دوسرے جانداروں کے لیے آکسیجن، خوراک اور رہائش فراہم کرتے ہیں۔', contentPashto: 'نباتات ژوندي موجودات دي چې د نباتاتو په سلطنت پورې اړه لري. په دوی کې ونې، بوټي، واښه، فرنز او ماس شامل دي. د حیواناتو برعکس، نباتات نشي کولی په خپله له یو ځای څخه بل ځای ته لاړ شي. ډیری نباتات د لمر د وړانګو، اوبو او کاربن ډای اکسایډ په کارولو سره د فوتوسنتز په نوم پروسې له لارې خپل خواړه جوړوي. نباتات په ځمکه کې د ژوند لپاره اړین دي ځکه چې دوی د ډیری نورو ژوندیو موجوداتو لپاره اکسیجن، خواړه او استوګنځای چمتو کوي.' },
                    { id: 'photosynthesis', title: 'Photosynthesis', titleUrdu: 'ضیائی تالیف', titlePashto: 'فوتوسنتز', type: 'Process', typeUrdu: 'عمل', typePashto: 'پروسه', color: 'from-green-500 to-yellow-400', fact: 'Plants use sunlight to eat.', factUrdu: 'پودے کھانے کے لیے سورج کی روشنی استعمال کرتے ہیں۔', factPashto: 'نبوتات د خوړلو لپاره د لمر رڼا کاروي.', content: 'Photosynthesis is the chemical process by which green plants and some other organisms use sunlight to synthesize foods from carbon dioxide and water. In plants, this process generally involves the green pigment chlorophyll and generates oxygen as a byproduct. Essentially, plants use the energy from the sun to turn air and water into sugar (glucose), which serves as their food. This process is crucial for life on Earth because it is the primary source of all the organic energy in the food chain, and it produces the oxygen we need to breathe.', contentUrdu: 'ضیائی تالیف وہ کیمیائی عمل ہے جس کے ذریعے سبز پودے اور کچھ دوسرے جاندار سورج کی روشنی کا استعمال کرتے ہوئے کاربن ڈائی آکسائیڈ اور پانی سے خوراک تیار کرتے ہیں۔ پودوں میں، اس عمل میں عام طور پر سبز مادہ کلوروفل شامل ہوتا ہے اور یہ ضمنی پیداوار کے طور پر آکسیجن پیدا کرتا ہے۔ بنیادی طور پر، پودے ہوا اور پانی کو چینی (گلوکوز) میں تبدیل کرنے کے لیے سورج کی توانائی کا استعمال کرتے ہیں، جو ان کی خوراک کے طور پر کام کرتا ہے۔ یہ عمل زمین پر زندگی کے لیے بہت اہم ہے کیونکہ یہ غذائی زنجیر میں تمام نامیاتی توانائی کا بنیادی ذریعہ ہے، اور یہ وہ آکسیجن پیدا کرتا ہے جس کی ہمیں سانس لینے کے لیے ضرورت ہوتی ہے۔', contentPashto: 'فوتوسنتز هغه کیمیاوي پروسه ده چې په واسطه یې شنه نباتات او ځینې نور ژوندي موجودات د لمر وړانګې کاروي ترڅو د کاربن ډای اکسایډ او اوبو څخه خواړه جوړ کړي. په نباتاتو کې، دا پروسه عموما شین رنګ کلوروفیل لري او د ضمني محصول په توګه اکسیجن تولیدوي. په اصل کې، نباتات د لمر انرژي کاروي ترڅو هوا او اوبه په بوره (ګلوکوز) بدل کړي، کوم چې د دوی د خواړو په توګه کار کوي. دا پروسه په ځمکه کې د ژوند لپاره خورا مهمه ده ځکه چې دا د خواړو په لړۍ کې د ټولو عضوي انرژي لومړنۍ سرچینه ده، او دا هغه اکسیجن تولیدوي چې موږ ورته اړتیا لرو.' },
                    { id: 'ecosystem', title: 'Ecosystem', titleUrdu: 'ماحولیاتی نظام', titlePashto: 'ایکو سیسټم', type: 'System', typeUrdu: 'نظام', typePashto: 'سیسټم', color: 'from-teal-500 to-cyan-600', fact: 'Everything is connected.', factUrdu: 'سب کچھ جڑا ہوا ہے۔', factPashto: 'هرڅه یو له بل سره تړلي دي.', content: 'An ecosystem is a community of living organisms (plants, animals, and microbes) interacting with the non-living components of their environment (air, water, and mineral soil), interacting as a system. Ecosystems can be small, like a puddle, or large, like an entire rainforest. In an ecosystem, each organism has a role to play. Everything is connected; if one part of the ecosystem changes, it affects all the other parts.', contentUrdu: 'ماحولیاتی نظام جانداروں (پودوں، جانوروں اور جرثوموں) کی ایک کمیونٹی ہے جو اپنے ماحول کے غیر جاندار اجزاء (ہوا، پانی، اور معدنی مٹی) کے ساتھ تعامل کرتے ہیں، ایک نظام کے طور پر تعامل کرتے ہیں۔ ماحولیاتی نظام چھوٹے ہو سکتے ہیں، جیسے کھڈ، یا بڑے، جیسے پورا برساتی جنگل۔ ماحولیاتی نظام میں، ہر جاندار کا ایک کردار ہوتا ہے۔ سب کچھ جڑا ہوا ہے؛ اگر ماحولیاتی نظام کا ایک حصہ بدلتا ہے، تو یہ دوسرے تمام حصوں کو متاثر کرتا ہے۔', contentPashto: 'ایکو سیسټم د ژوندیو موجوداتو (نباتاتو، حیواناتو او میکروبونو) یوه ټولنه ده چې د دوی د چاپیریال (هوا، اوبو او معدني خاورې) غیر ژوندي اجزاو سره اړیکه لري، د سیسټم په توګه متقابل عمل کوي. اکوسیستمونه کیدای شي کوچني وي، لکه د پوډل، یا لوی، لکه ټول باراني ځنګل. په ایکوسیستم کې، هر ژوندی موجود رول لري چې ولوبوي. هرڅه تړلي دي؛ که د ایکوسیستم یوه برخه بدله شي، دا په نورو ټولو برخو اغیزه کوي.' },
                    { id: 'food-chain', title: 'Food Chain', titleUrdu: 'غذائی زنجیر', titlePashto: 'د خوړو زنځیر', type: 'System', typeUrdu: 'نظام', typePashto: 'سیسټم', color: 'from-yellow-600 to-orange-700', fact: 'Energy moves up the chain.', factUrdu: 'توانائی زنجیر میں اوپر جاتی ہے۔', factPashto: 'انرژي په زنځیر کې پورته ځي.', content: 'A food chain shows how each living thing gets food, and how nutrients and energy are passed from creature to creature. Food chains begin with plant-life and end with animal-life. For example, a simple food chain could be: Sun -> Grass -> Grasshopper -> Frog -> Snake -> Hawk. Plants are called producers because they produce their own food. Animals are called consumers because they consume other organisms.', contentUrdu: 'فوڈ چین یہ ظاہر کرتی ہے کہ ہر جاندار کس طرح خوراک حاصل کرتا ہے، اور کس طرح غذائی اجزاء اور توانائی مخلوق سے مخلوق تک پہنچتی ہے۔ غذائی زنجیریں پودوں کی زندگی سے شروع ہوتی ہیں اور حیوانی زندگی پر ختم ہوتی ہیں۔ مثال کے طور پر، ایک سادہ فوڈ چین ہو سکتی ہے: سورج -> گھاس -> ٹڈا -> مینڈک -> سانپ -> ہاک۔ پودوں کو پیدا کرنے والے کہا جاتا ہے کیونکہ وہ اپنی خوراک خود تیار کرتے ہیں۔ جانوروں کو صارفین کہا جاتا ہے کیونکہ وہ دوسرے جانداروں کو کھاتے ہیں۔', contentPashto: 'د خوړو سلسله ښیي چې څنګه هر ژوندی شی خواړه ترلاسه کوي، او څنګه غذايي مواد او انرژي له مخلوق څخه مخلوق ته لیږدول کیږي. د خوړو زنځیرونه د نباتاتو ژوند سره پیل کیږي او د څارویو په ژوند پای ته رسیږي. د مثال په توګه، د خوړو یوه ساده سلسله کیدای شي دا وي: لمر -> واښه -> ملخ -> میډک -> مار -> باز. نباتاتو ته تولیدونکي ویل کیږي ځکه چې دوی خپل خواړه پخپله تولیدوي. حیواناتو ته مصرف کونکي ویل کیږي ځکه چې دوی نور ژوندي موجودات مصرفوي.' },
                    { id: 'evolution', title: 'Evolution', titleUrdu: 'ارتقاء', titlePashto: 'تکامل', type: 'Process', typeUrdu: 'عمل', typePashto: 'پروسه', color: 'from-indigo-400 to-purple-500', fact: 'Life changes over time.', factUrdu: 'زندگی وقت کے ساتھ بدلتی ہے۔', factPashto: 'ژوند د وخت په تیریدو سره بدلیږي.', content: 'Evolution is the process by which different kinds of living organisms act to change and develop from earlier forms during the history of the earth. It explains how life adapts to changing environments over long periods. The theory of evolution by natural selection, proposed by Charles Darwin, states that individuals with traits better suited to their environment are more likely to survive and reproduce, passing those traits to the next generation.', contentUrdu: 'ارتقاء وہ عمل ہے جس کے ذریعے مختلف قسم کے جاندار زمین کی تاریخ کے دوران ابتدائی شکلوں سے تبدیل اور ترقی کرتے ہیں۔ یہ بتاتا ہے کہ زندگی طویل عرصے تک بدلتے ہوئے ماحول کے مطابق کیسے ڈھلتی ہے۔ چارلس ڈارون کے ذریعہ تجویز کردہ قدرتی انتخاب کے ذریعہ ارتقاء کا نظریہ یہ بتاتا ہے کہ وہ افراد جو اپنے ماحول کے لیے موزوں خصلتوں کے حامل ہوتے ہیں ان کے زندہ رہنے اور دوبارہ پیدا ہونے کا امکان زیادہ ہوتا ہے، اور وہ ان خصلتوں کو اگلی نسل تک پہنچاتے ہیں۔', contentPashto: 'تکامل هغه پروسه ده چې له مخې یې د ځمکې د تاریخ په اوږدو کې مختلف ډوله ژوندي موجودات د پخوانیو ډولونو څخه بدلون او وده کوي. دا تشریح کوي چې څنګه ژوند د اوږدې مودې په اوږدو کې د بدلیدونکي چاپیریال سره تطابق کوي. د طبیعي انتخاب په واسطه د تکامل تیوري، چې د چارلس ډاروین لخوا وړاندیز شوې، وایي چې هغه کسان چې د دوی چاپیریال سره مناسب ځانګړتیاوې لري د ژوندي پاتې کیدو او تکثیر احتمال ډیر وي، دا ځانګړتیاوې راتلونکي نسل ته لیږدوي.' },
                    { id: 'birds', title: 'Birds', titleUrdu: 'پرندے', titlePashto: 'مرغان', type: 'Animal', typeUrdu: 'جانور', typePashto: 'حیوان', color: 'from-sky-400 to-blue-500', fact: 'Some birds cannot fly.', factUrdu: 'کچھ پرندے اڑ نہیں سکتے۔', factPashto: 'ځینې مرغان الوتنه نشي کولی.', content: 'Birds are warm-blooded vertebrates that have feathers, toothless beaked jaws, hard-shelled eggs, and a strong yet lightweight skeleton. Most birds can fly, which sets them apart from almost all other vertebrate classes. Flight is the primary means of locomotion for most bird species and is used for breeding, feeding, and predator avoidance and escape. Some birds, like penguins and ostriches, have lost the ability to fly.', contentUrdu: 'پرندے گرم خون والے فقاری جانور ہیں جن کے پنکھ، بغیر دانتوں کے چونچ والے جبڑے، سخت خول والے انڈے، اور ایک مضبوط لیکن ہلکا پھلکا ڈھانچہ ہوتا ہے۔ زیادہ تر پرندے اڑ سکتے ہیں، جو انہیں دیگر تمام فقاری طبقات سے الگ کرتا ہے۔ پرواز پرندوں کی زیادہ تر پرجاتیوں کے لیے نقل و حرکت کا بنیادی ذریعہ ہے اور اسے افزائش نسل، خوراک، اور شکاریوں سے بچنے اور فرار ہونے کے لیے استعمال کیا جاتا ہے۔ کچھ پرندے، جیسے پینگوئن اور شتر مرغ، اڑنے کی صلاحیت کھو چکے ہیں۔', contentPashto: 'مرغان ګرم وینه لرونکي فقاري دي چې بڼکې، بې غاښونو چونچ لرونکي جبڑے، سخت پوستکي هګۍ، او یو قوي خو سپک کنکال لري. ډیری مرغان الوتلی شي، کوم چې دوی د نږدې ټولو نورو فقراتو ټولګیو څخه جلا کوي. الوتنه د ډیری مرغیو ډولونو لپاره د حرکت لومړنۍ وسیله ده او د نسل ورکولو، تغذیه کولو، او د ښکاریانو څخه مخنیوي او تیښتې لپاره کارول کیږي. ځینې مرغان لکه پینگوین او شتر مرغ د الوتلو توان له لاسه ورکړی دی.' },
                    { id: 'fish', title: 'Fish', titleUrdu: 'مچھلی', titlePashto: 'ماهي', type: 'Animal', typeUrdu: 'جانور', typePashto: 'حیوان', color: 'from-blue-500 to-cyan-600', fact: 'Fish breathe with gills.', factUrdu: 'مچھلیاں گلوں سے سانس لیتی ہیں۔', factPashto: 'ماهیان د ګلونو په واسطه تنفس کوي.', content: 'Fish are aquatic, craniate, gill-bearing animals that lack limbs with digits. Included in this definition are the living hagfish, lampreys, and cartilaginous and bony fish as well as various extinct related groups. Most fish are ectothermic ("cold-blooded"), allowing their body temperatures to vary as ambient temperatures change. Fish are abundant in most bodies of water. They can be found in nearly all aquatic environments, from high mountain streams to the abyssal and even hadal depths of the deepest oceans.', contentUrdu: 'مچھلیاں آبی، کرینیٹ، گل رکھنے والے جانور ہیں جن میں ہندسوں والے اعضاء کی کمی ہوتی ہے۔ اس تعریف میں زندہ ہیگ فش، لیمپریس، اور کارٹلیجینس اور بونی مچھلیوں کے ساتھ ساتھ مختلف معدوم ہونے والے متعلقہ گروپس شامل ہیں۔ زیادہ تر مچھلیاں ایکٹوتھرمک ("سرد خون والی") ہوتی ہیں، جس سے ان کے جسم کے درجہ حرارت میں محیطی درجہ حرارت میں تبدیلی کے ساتھ تبدیلی آتی ہے۔ مچھلی پانی کے زیادہ تر اجسام میں وافر مقدار میں پائی جاتی ہے۔ وہ تقریباً تمام آبی ماحول میں پائے جا سکتے ہیں، اونچے پہاڑی ندیوں سے لے کر اتاہ کنڈ اور یہاں تک کہ گہرے سمندروں کی گہرائیوں تک۔', contentPashto: 'ماهیان آبی، کرینیټ، ګل لرونکي حیوانات دي چې د ګوتو سره د غړو نشتوالی لري. په دې تعریف کې ژوندي هیګ فش، لیمپریس، او کارټیلیجینوس او هډوکي ماهیان او همدارنګه د ورک شوي اړوند مختلف ګروپونه شامل دي. ډیری ماهیان ایکټوترمیک ("سړه وینه") دي، چې د دوی د بدن تودوخې ته اجازه ورکوي چې د محیط تودوخې بدلون سره توپیر ولري. ماهیان د اوبو په ډیرو برخو کې ډیر دي. دوی نږدې په ټولو آبی چاپیریالونو کې موندل کیدی شي ، د لوړ غرونو سیندونو څخه تر ابیسل او حتی د ژورو سمندرونو تر ژورو پورې.' }
                ]

            {
                id: 'philosophy',
                title: 'Philosophy & Mind',
                titleUrdu: 'فلسفہ اور ذہن',

                icon: <Brain className="w-6 h-6 text-pink-400" />,
                description: 'Thinking about thinking.',
                descriptionUrdu: 'سوچ کے بارے میں سوچنا۔',
                descriptionPashto: 'د فکر په اړه فکر کول.',
                gradient: 'from-pink-500/20 to-rose-500/20',
                topics: [
                    { id: 'consciousness', title: 'Consciousness', titleUrdu: 'شعور', titlePashto: 'شعور', type: 'Mind', typeUrdu: 'ذہن', typePashto: 'ذهن', color: 'from-pink-500 to-rose-600', fact: 'Consciousness is awareness of oneself.', factUrdu: 'شعور اپنی ذات کا ادراک ہے۔', factPashto: 'شعور د خپل ځان پوهاوی دی.', content: 'Consciousness is the state of being aware of and responsive to one\'s surroundings. It includes our thoughts, sensations, feelings, and memories. Philosophers and scientists have debated the nature of consciousness for centuries. It allows us to experience the world subjectively—to feel the warmth of the sun, the taste of food, and the emotion of love. While we know the brain creates consciousness, we still don\'t fully understand exactly how physical cells in our brain give rise to our personal, subjective experiences.', contentUrdu: 'شعور اپنے گرد و پیش سے باخبر رہنے اور رد عمل ظاہر کرنے کی حالت ہے۔ اس میں ہمارے خیالات، احساسات، جذبات اور یادیں شامل ہیں۔ فلسفی اور سائنسدان صدیوں سے شعور کی نوعیت پر بحث کر رہے ہیں۔ یہ ہمیں دنیا کا ساپیکش تجربہ کرنے کی اجازت دیتا ہے—سورج کی گرمی، کھانے کا ذائقہ، اور محبت کے جذبات کو محسوس کرنے کے لیے۔ اگرچہ ہم جانتے ہیں کہ دماغ شعور پیدا کرتا ہے، لیکن ہم ابھی تک پوری طرح سے یہ نہیں سمجھ سکے ہیں کہ ہمارے دماغ میں موجود جسمانی خلیات ہمارے ذاتی، ساپیکش تجربات کو کیسے جنم دیتے ہیں۔', contentPashto: 'شعور د یو چا د شاوخوا چاپیریال څخه د خبرتیا او ځواب ویلو حالت دی. پدې کې زموږ فکرونه، احساسات، او یادونه شامل دي. فیلسوفانو او ساینس پوهانو د پیړیو راهیسې د شعور د ماهیت په اړه بحث کړی. دا موږ ته اجازه راکوي چې نړۍ په موضوعي توګه تجربه کړو — د لمر تودوخه، د خواړو خوند، او د مینې احساس. پداسې حال کې چې موږ پوهیږو چې دماغ شعور رامینځته کوي، موږ لاهم په بشپړ ډول نه پوهیږو چې زموږ په مغز کې فزیکي حجرې څنګه زموږ شخصي، موضوعي تجربو ته وده ورکوي.' },
                    { id: 'logic', title: 'Logic', titleUrdu: 'منطق', titlePashto: 'منطق', type: 'Reason', typeUrdu: 'عقل', typePashto: 'عقل', color: 'from-blue-500 to-indigo-600', fact: 'Logic is the art of correct reasoning.', factUrdu: 'منطق درست استدلال کا فن ہے۔', factPashto: 'منطق د سم استدلال هنر دی.', content: 'Logic is the systematic study of valid rules of inference, or correct reasoning. It helps us distinguish between good arguments and bad ones. By using logic, we can build reliable conclusions from a set of premises. It is the foundation of mathematics, computer science, and philosophy. Logic teaches us how to think clearly and avoid fallacies. For example, if all men are mortal, and Socrates is a man, logic dictates that Socrates must be mortal.', contentUrdu: 'منطق درست استدلال کے اصولوں کا منظم مطالعہ ہے۔ یہ ہمیں اچھے اور برے دلائل میں فرق کرنے میں مدد کرتا ہے۔ منطق کا استعمال کرتے ہوئے، ہم بنیادوں کے ایک مجموعے سے قابل اعتماد نتائج اخذ کر سکتے ہیں۔ یہ ریاضی، کمپیوٹر سائنس اور فلسفہ کی بنیاد ہے۔ منطق ہمیں سکھاتی ہے کہ کس طرح واضح سوچنا ہے اور غلط فہمیوں سے بچنا ہے۔ مثال کے طور پر، اگر تمام انسان فانی ہیں، اور سقراط ایک انسان ہے، تو منطق یہ بتاتی ہے کہ سقراط کو فانی ہونا چاہیے۔', contentPashto: 'منطق د استدلال د باوري قواعدو، یا سم استدلال سیستماتیک مطالعه ده. دا موږ سره مرسته کوي چې د ښه او بد دلیلونو ترمنځ توپیر وکړو. د منطق په کارولو سره، موږ کولی شو د فرضیې له مجموعې څخه د باور وړ پایلې رامینځته کړو. دا د ریاضیاتو، کمپیوټر ساینس او فلسفې بنسټ دی. منطق موږ ته درس راکوي چې څنګه روښانه فکر وکړو او د غلطیو مخه ونیسو. د مثال په توګه، که ټول انسانان فاني وي، او سقراط یو سړی وي، منطق حکم کوي چې سقراط باید فاني وي.' },
                    { id: 'ethics', title: 'Ethics', titleUrdu: 'اخلاقیات', titlePashto: 'اخلاق', type: 'Philosophy', typeUrdu: 'فلسفہ', typePashto: 'فلسفه', color: 'from-green-500 to-teal-600', fact: 'Ethics studies right and wrong.', factUrdu: 'اخلاقیات صحیح اور غلط کا مطالعہ ہے۔', factPashto: 'اخلاق د سم او غلط مطالعه ده.', content: 'Ethics, also known as moral philosophy, is a branch of philosophy that involves systematizing, defending, and recommending concepts of right and wrong behavior. Ethics seeks to resolve questions of human morality by defining concepts such as good and evil, right and wrong, virtue and vice, justice and crime. It helps us make decisions about how we should live our lives and treat others. Ethical questions arise in everyday life, such as "Is it ever okay to lie?" or "What is our responsibility to the environment?"', contentUrdu: 'اخلاقیات، جسے اخلاقی فلسفہ بھی کہا جاتا ہے، فلسفہ کی ایک شاخ ہے جس میں صحیح اور غلط رویے کے تصورات کو منظم کرنا، دفاع کرنا اور سفارش کرنا شامل ہے۔ اخلاقیات اچھے اور برے، صحیح اور غلط، نیکی اور برائی، انصاف اور جرم جیسے تصورات کی وضاحت کرکے انسانی اخلاقیات کے سوالات کو حل کرنے کی کوشش کرتی ہے۔ یہ فیصلہ کرنے میں ہماری مدد کرتا ہے کہ ہمیں اپنی زندگی کیسے گزارنی چاہیے اور دوسروں کے ساتھ کیسا سلوک کرنا چاہیے۔ روزمرہ کی زندگی میں اخلاقی سوالات پیدا ہوتے ہیں، جیسے "کیا جھوٹ بولنا کبھی ٹھیک ہے؟" یا "ماحول کے تئیں ہماری کیا ذمہ داری ہے؟"', contentPashto: 'اخلاق، چې د اخلاقي فلسفې په نوم هم یادیږي، د فلسفې یوه څانګه ده چې د سم او غلط چلند مفکورې سیستماتیک کول، دفاع کول او وړاندیز کول شامل دي. اخلاق هڅه کوي چې د ښه او بد، سم او غلط، فضیلت او بد، عدالت او جرم په څیر مفکورې تعریف کولو سره د انساني اخلاقو پوښتنې حل کړي. دا موږ سره مرسته کوي چې پریکړه وکړو چې څنګه باید خپل ژوند وکړو او له نورو سره چلند وکړو. اخلاقي پوښتنې په ورځني ژوند کې راپورته کیږي، لکه "ایا دا کله هم سمه ده چې دروغ ووایو؟" یا "چاپیریال ته زموږ مسؤلیت څه دی؟"' },
                    { id: 'knowledge', title: 'Knowledge', titleUrdu: 'علم', titlePashto: 'پوهه', type: 'Epistemology', typeUrdu: 'علمیات', typePashto: 'علم پیژندنه', color: 'from-yellow-500 to-orange-600', fact: 'Epistemology is the study of knowledge.', factUrdu: 'علمیات علم کا مطالعہ ہے۔', factPashto: 'علم پیژندنه د پوهې مطالعه ده.', content: 'Knowledge is a familiarity, awareness, or understanding of someone or something, such as facts, information, descriptions, or skills, which is acquired through experience or education by perceiving, discovering, or learning. In philosophy, the study of knowledge is called epistemology. Philosophers ask questions like "What is knowledge?", "How is knowledge acquired?", and "What do people know?". Knowledge can be theoretical (knowing that something is the case) or practical (knowing how to do something).', contentUrdu: 'علم کسی یا کسی چیز کی واقفیت، آگاہی یا سمجھ ہے، جیسے حقائق، معلومات، وضاحتیں، یا مہارتیں، جو تجربے یا تعلیم کے ذریعے ادراک، دریافت یا سیکھنے کے ذریعے حاصل کی جاتی ہیں۔ فلسفہ میں علم کے مطالعہ کو علمیات کہتے ہیں۔ فلسفی سوالات پوچھتے ہیں جیسے "علم کیا ہے؟"، "علم کیسے حاصل کیا جاتا ہے؟"، اور "لوگ کیا جانتے ہیں؟"۔ علم نظریاتی ہو سکتا ہے (یہ جاننا کہ کچھ معاملہ ہے) یا عملی (یہ جاننا کہ کچھ کیسے کرنا ہے)۔', contentPashto: 'پوهه د یو چا یا یو څه پیژندنه، پوهاوی، یا پوهه ده، لکه حقایق، معلومات، توضیحات، یا مهارتونه، چې د تجربې یا زده کړې له لارې د درک کولو، کشف کولو، یا زده کړې له لارې ترلاسه کیږي. په فلسفه کې د پوهې مطالعې ته د ایپیسټیمولوژي ویل کیږي. فیلسوفان پوښتنې کوي لکه "پوهه څه ده؟"، "پوهه څنګه ترلاسه کیږي؟"، او "خلک څه پوهیږي؟". پوهه کیدای شي نظري وي (په دې پوهیدل چې یو څه قضیه ده) یا عملي (په دې پوهیدل چې څنګه یو څه وکړي).' },
                    { id: 'truth', title: 'Truth', titleUrdu: 'سچ', titlePashto: 'حقیقت', type: 'Metaphysics', typeUrdu: 'ما بعد الطبیعیات', typePashto: 'میټافزیک', color: 'from-cyan-500 to-blue-600', fact: 'Truth is accord with fact or reality.', factUrdu: 'سچ حقیقت یا حقیقت کے ساتھ معاہدہ ہے۔', factPashto: 'حقیقت د حقیقت یا واقعیت سره سمون لري.', content: 'Truth is the property of being in accord with fact or reality. In everyday language, truth is typically ascribed to things that aim to represent reality or otherwise correspond to it, such as beliefs, propositions, and declarative sentences. Truth is usually held to be the opposite of falsehood. The concept of truth is discussed and debated in various contexts, including philosophy, art, theology, and science. Most human activities depend upon the concept, where its nature as a concept is assumed rather than being a subject of discussion.', contentUrdu: 'سچائی حقیقت یا حقیقت کے مطابق ہونے کی خاصیت ہے۔ روزمرہ کی زبان میں، سچائی عام طور پر ان چیزوں سے منسوب کی جاتی ہے جن کا مقصد حقیقت کی نمائندگی کرنا ہے یا دوسری صورت میں اس سے مطابقت رکھنا ہے، جیسے کہ عقائد، تجاویز اور اعلانیہ جملے۔ سچ کو عام طور پر جھوٹ کا الٹ سمجھا جاتا ہے۔ سچ کے تصور پر فلسفہ، آرٹ، تھیولوجی اور سائنس سمیت مختلف سیاق و سباق میں بحث اور بحث کی جاتی ہے۔ زیادہ تر انسانی سرگرمیاں تصور پر منحصر ہوتی ہیں، جہاں ایک تصور کے طور پر اس کی نوعیت کو بحث کا موضوع ہونے کے بجائے فرض کیا جاتا ہے۔', contentPashto: 'حقیقت د واقعیت یا حقیقت سره سمون ملکیت دی. په ورځنۍ ژبه کې، حقیقت عموما هغو شیانو ته منسوب کیږي چې موخه یې د حقیقت استازیتوب کول دي یا په بل ډول ورسره مطابقت لري، لکه باورونه، وړاندیزونه، او اعلاناتي جملې. حقیقت معمولا د باطل برعکس ګڼل کیږي. د حقیقت په مفهوم په مختلفو شرایطو کې بحث او بحث کیږي، پشمول فلسفه، هنر، الهیات او ساینس. ډیری انساني فعالیتونه په مفهوم پورې اړه لري، چیرې چې د یو مفهوم په توګه د هغې ماهیت د بحث موضوع پرځای د انګیرنې په توګه ګڼل کیږي.' }
                ]

            {
                id: 'chemistry',
                title: 'Chemistry & Matter',
                titleUrdu: 'کیمیا اور مادہ',
                titlePashto: 'کیمیا او ماده',
                icon: <Atom className="w-6 h-6 text-cyan-400" />,
                description: 'Atoms, elements, and reactions.',
                descriptionUrdu: 'ایٹم، عناصر اور رد عمل۔',
                descriptionPashto: 'اتومونه، عناصر او تعاملات.',
                gradient: 'from-cyan-500/20 to-blue-500/20',
                topics: [
                    { id: 'atom', title: 'The Atom', titleUrdu: 'ایٹم', titlePashto: 'اتوم', type: 'Particle', typeUrdu: 'ذرہ', typePashto: 'ذره', color: 'from-cyan-400 to-blue-600', fact: 'Atoms are mostly empty space.', factUrdu: 'ایٹم زیادہ تر خالی جگہ پر مشتمل ہوتا ہے۔', factPashto: 'اتومونه اکثرا خالي ځای دی.', content: 'An atom is the smallest unit of ordinary matter that forms a chemical element. Every solid, liquid, gas, and plasma is composed of neutral or ionized atoms. Atoms are extremely small; typical sizes are around 100 picometers. Every atom is composed of a nucleus and one or more electrons bound to the nucleus. The nucleus is made of one or more protons and a number of neutrons. More than 99.94% of an atom\'s mass is in the nucleus. Despite being so small, atoms contain a vast amount of energy within them.', contentUrdu: 'ایٹم عام مادے کی سب سے چھوٹی اکائی ہے جو کیمیائی عنصر بناتی ہے۔ ہر ٹھوس، مائع، گیس، اور پلازما غیر جانبدار یا آئنائزڈ ایٹموں پر مشتمل ہوتا ہے۔ ایٹم انتہائی چھوٹے ہوتے ہیں؛ عام سائز تقریباً 100 پیکومیٹر ہوتے ہیں۔ ہر ایٹم ایک مرکز (نیوکلئس) اور ایک یا زیادہ الیکٹران پر مشتمل ہوتا ہے جو مرکز سے بندھے ہوتے ہیں۔ مرکز ایک یا زیادہ پروٹون اور کئی نیوٹرون سے بنا ہوتا ہے۔ ایٹم کا 99.94 فیصد سے زیادہ وزن اس کے مرکز میں ہوتا ہے۔ اتنا چھوٹا ہونے کے باوجود، ایٹم اپنے اندر توانائی کی ایک بڑی مقدار رکھتے ہیں۔', contentPashto: 'اتوم د عادي مادې ترټولو کوچنی واحد دی چې یو کیمیاوي عنصر جوړوي. هر جامد، مایع، ګاز او پلازما له بې طرفه یا ایونایز شوي اتومونو څخه جوړ شوي دي. اتومونه خورا کوچني دي؛ عادي اندازې شاوخوا ۱۰۰ پیکومیټر دي. هر اتوم له یو نیوکلیوس او یو یا ډیرو الکترونونو څخه جوړ دی چې له نیوکلیوس سره تړلي دي. نیوکلیوس له یو یا ډیرو پروټونونو او یو شمیر نیوټرونونو څخه جوړ دی. د اتوم د وزن ۹۹.۹۴٪ څخه ډیر په نیوکلیوس کې دی. د دومره کوچني کیدو سره سره، اتومونه په خپل مینځ کې لویه انرژي لري.' },
                    { id: 'molecule', title: 'Molecule', titleUrdu: 'مالیکیول', titlePashto: 'مالیکول', type: 'Particle', typeUrdu: 'ذرہ', typePashto: 'ذره', color: 'from-blue-300 to-indigo-400', fact: 'Water is a molecule.', factUrdu: 'پانی ایک مالیکیول ہے۔', factPashto: 'وبه یو مالیکول دی.', content: 'A molecule is an electrically neutral group of two or more atoms held together by chemical bonds. Molecules are distinguished from ions by their lack of electrical charge. In quantum physics, organic chemistry, and biochemistry, the distinction from ions is dropped and molecule is often used when referring to polyatomic ions. A molecule may be homonuclear, that is, it consists of atoms of one chemical element, as with oxygen (O2); or it may be heteronuclear, a chemical compound composed of more than one element, as with water (H2O).', contentUrdu: 'مالیکیول دو یا دو سے زیادہ ایٹموں کا برقی طور پر غیر جانبدار گروپ ہے جو کیمیائی بانڈز کے ذریعے ایک دوسرے کے ساتھ رکھے جاتے ہیں۔ مالیکیولز کو آئنوں سے ان کے برقی چارج کی کمی کی وجہ سے ممتاز کیا جاتا ہے۔ کوانٹم فزکس، آرگینک کیمسٹری اور بائیو کیمسٹری میں، آئنوں سے فرق ختم کر دیا جاتا ہے اور مالیکیول اکثر پولیٹومک آئنوں کا حوالہ دیتے وقت استعمال ہوتا ہے۔ ایک مالیکیول ہم نویاتی ہو سکتا ہے، یعنی یہ ایک کیمیائی عنصر کے ایٹموں پر مشتمل ہوتا ہے، جیسا کہ آکسیجن (O2) کے ساتھ؛ یا یہ ہیٹرونیوکلیئر ہو سکتا ہے، ایک کیمیائی مرکب جو ایک سے زیادہ عناصر پر مشتمل ہے، جیسا کہ پانی (H2O) کے ساتھ۔', contentPashto: 'مالیکول د دوه یا ډیرو اتومونو بریښنایی پلوه بې طرفه ګروپ دی چې د کیمیاوي بانډونو لخوا یوځای ساتل کیږي. مالیکولونه د ایونونو څخه د بریښنایی چارج نشتوالي له مخې توپیر کیږي. په کوانټم فزیک، عضوي کیمیا، او بایو کیمیا کې، د ایونونو څخه توپیر کمیږي او مالیکول ډیری وختونه کارول کیږي کله چې پولیټومیک ایونونو ته اشاره کیږي. یو مالیکول کیدای شي هومونیکلیئر وي، دا دی چې دا د یو کیمیاوي عنصر اتومونو څخه جوړ دی، لکه د اکسیجن (O2) سره؛ یا دا کیدای شي هیټرونیوکلیر وي، یو کیمیاوي مرکب چې د یو څخه ډیرو عناصرو څخه جوړ شوی وي، لکه د اوبو (H2O) سره.' },
                    { id: 'element', title: 'Element', titleUrdu: 'عنصر', titlePashto: 'عنصر', type: 'Type', typeUrdu: 'قسم', typePashto: 'ډول', color: 'from-violet-500 to-fuchsia-500', fact: 'Gold is an element.', factUrdu: 'سونا ایک عنصر ہے۔', factPashto: 'سره زر یو عنصر دی.', content: 'A chemical element is a pure substance consisting only of atoms that all have the same numbers of protons in their atomic nuclei. Unlike chemical compounds, chemical elements cannot be broken down into simpler substances by any chemical reaction. The number of protons in the nucleus is the defining property of an element, and is referred to as its atomic number. All atoms with the same atomic number are atoms of the same element. Common examples include hydrogen, nitrogen, and gold.', contentUrdu: 'کیمیائی عنصر ایک خالص مادہ ہے جو صرف ایٹموں پر مشتمل ہوتا ہے جن کے ایٹمی نیوکلی میں پروٹان کی تعداد ایک جیسی ہوتی ہے۔ کیمیائی مرکبات کے برعکس، کیمیائی عناصر کو کسی بھی کیمیائی رد عمل کے ذریعے سادہ مادوں میں نہیں توڑا جا سکتا۔ نیوکلئس میں پروٹون کی تعداد کسی عنصر کی وضاحتی خاصیت ہے، اور اسے اس کا ایٹمی نمبر کہا جاتا ہے۔ ایک ہی ایٹمی نمبر والے تمام ایٹم ایک ہی عنصر کے ایٹم ہیں۔ عام مثالوں میں ہائیڈروجن، نائٹروجن اور سونا شامل ہیں۔', contentPashto: 'یو کیمیاوي عنصر یوه خالص ماده ده چې یوازې د اتومونو څخه جوړه ده چې ټول یې د اټومي نیوکلیو کې د پروټونونو ورته شمیر لري. د کیمیاوي مرکباتو برخلاف، کیمیاوي عناصر د هیڅ کیمیاوي تعامل په واسطه په ساده موادو نشي ماتیدلی. په نیوکلیوس کې د پروټونونو شمیر د عنصر تعریف کونکی ملکیت دی، او د هغې اټومي شمیره ورته ویل کیږي. ټول اتومونه د ورته اټومي شمیرې سره د ورته عنصر اتومونه دي. په عامو مثالونو کې هایدروجن، نایتروجن او سره زر شامل دي.' },
                    { id: 'periodic-table', title: 'Periodic Table', titleUrdu: 'دوری جدول', titlePashto: 'دوری جدول', type: 'Chart', typeUrdu: 'چارٹ', typePashto: 'چارټ', color: 'from-fuchsia-500 to-pink-500', fact: 'There are 118 elements.', factUrdu: '118 عناصر ہیں۔', factPashto: '۱۱۸ عناصر شتون لري.', content: 'The periodic table, also known as the periodic table of elements, is a tabular display of the chemical elements. It is widely used in chemistry, physics, and other sciences, and is generally seen as an icon of chemistry. It is a graphic formulation of the periodic law, which states that the properties of the chemical elements exhibit a periodic dependence on their atomic numbers. The table is divided into four roughly rectangular areas called blocks.', contentUrdu: 'دوری جدول، جسے عناصر کا دوری جدول بھی کہا جاتا ہے، کیمیائی عناصر کا ایک ٹیبلر ڈسپلے ہے۔ یہ کیمسٹری، فزکس اور دیگر علوم میں بڑے پیمانے پر استعمال ہوتا ہے، اور عام طور پر اسے کیمسٹری کے آئیکون کے طور پر دیکھا جاتا ہے۔ یہ متواتر قانون کی گرافک تشکیل ہے، جس میں کہا گیا ہے کہ کیمیائی عناصر کی خصوصیات ان کے ایٹمی نمبروں پر متواتر انحصار ظاہر کرتی ہیں۔ ٹیبل کو چار تقریباً مستطیل علاقوں میں تقسیم کیا گیا ہے جسے بلاک کہتے ہیں۔', contentPashto: 'دوره ای جدول چې د عناصرو د دورې جدول په نوم هم یادیږي، د کیمیاوي عناصرو یو جدول نندارتون دی. دا په پراخه کچه په کیمیا، فزیک او نورو علومو کې کارول کیږي، او عموما د کیمیا د نښه په توګه لیدل کیږي. دا د دوره ای قانون ګرافیک جوړښت دی، کوم چې وایي چې د کیمیاوي عناصرو ځانګړتیاوې د دوی په اټومي شمیرو کې دوره ای انحصار څرګندوي. جدول په څلورو نږدې مستطیل برخو ویشل شوی چې د بلاکونو په نوم یادیږي.' },
                    { id: 'water', title: 'Water', titleUrdu: 'پانی', titlePashto: 'وبه', type: 'Liquid', typeUrdu: 'مائع', typePashto: 'مایع', color: 'from-blue-400 to-blue-600', fact: 'Water is H2O.', factUrdu: 'پانی H2O ہے۔', factPashto: 'وبه H2O ده.', content: 'Water is a substance composed of the chemical elements hydrogen and oxygen and existing in gaseous, liquid, and solid states. It is one of the most plentiful and essential of compounds. A tasteless and odorless liquid at room temperature, it has the important ability to dissolve many other substances. Indeed, the versatility of water as a solvent is essential to living organisms. Life is believed to have originated in the aqueous solutions of the world\'s oceans, and living organisms depend on aqueous solutions, such as blood and digestive juices, for biological processes.', contentUrdu: 'پانی ایک مادہ ہے جو کیمیائی عناصر ہائیڈروجن اور آکسیجن پر مشتمل ہے اور گیس، مائع اور ٹھوس حالتوں میں موجود ہے۔ یہ مرکبات میں سب سے زیادہ وافر اور ضروری ہے۔ کمرے کے درجہ حرارت پر ایک بے ذائقہ اور بے بو مائع، اس میں بہت سے دوسرے مادوں کو حل کرنے کی اہم صلاحیت ہوتی ہے۔ درحقیقت، سالوینٹ کے طور پر پانی کی استعداد جانداروں کے لیے ضروری ہے۔ خیال کیا جاتا ہے کہ زندگی کی شروعات دنیا کے سمندروں کے آبی محلول میں ہوئی تھی، اور جاندار حیاتیاتی عمل کے لیے خون اور ہاضمے کے جوس جیسے آبی محلول پر انحصار کرتے ہیں۔', contentPashto: 'وبه یوه ماده ده چې د هایدروجن او اکسیجن کیمیاوي عناصرو څخه جوړه شوې ده او په ګازي، مایع او جامد حالتونو کې شتون لري. دا یو له خورا پراخه او اړین مرکباتو څخه دی. د خونې په حرارت کې یو بې خوند او بې بوی مایع، دا د ډیری نورو موادو د حل کولو مهم وړتیا لري. په حقیقت کې، د محلول په توګه د اوبو استقامت د ژوندیو موجوداتو لپاره اړین دی. داسې انګیرل کیږي چې ژوند د نړۍ د سمندرونو په آبی محلولونو کې رامینځته شوی، او ژوندي موجودات د بیولوژیکي پروسو لپاره په آبی محلولونو لکه وینه او د هاضمي جوس باندې تکیه کوي.' },
                    { id: 'oxygen', title: 'Oxygen', titleUrdu: 'آکسیجن', titlePashto: 'اکسیجن', type: 'Gas', typeUrdu: 'گیس', typePashto: 'ګاز', color: 'from-sky-300 to-sky-500', fact: 'Fire needs oxygen.', factUrdu: 'آگ کو آکسیجن کی ضرورت ہوتی ہے۔', factPashto: 'اور اکسیجن ته اړتیا لري.', content: 'Oxygen is the chemical element with the symbol O and atomic number 8. It is a member of the chalcogen group in the periodic table, a highly reactive nonmetal, and an oxidizing agent that readily forms oxides with most elements as well as with other compounds. By mass, oxygen is the third-most abundant element in the universe, after hydrogen and helium. At standard temperature and pressure, two atoms of the element bind to form dioxygen, a colorless and odorless diatomic gas with the formula O2. This is an important part of the atmosphere and is necessary to sustain terrestrial life.', contentUrdu: 'آکسیجن ایک کیمیائی عنصر ہے جس کی علامت O اور ایٹمی نمبر 8 ہے۔ یہ متواتر جدول میں چالکوجن گروپ کا رکن ہے، ایک انتہائی رد عمل والی نان میٹل، اور ایک آکسیڈائزنگ ایجنٹ ہے جو آسانی سے زیادہ تر عناصر کے ساتھ ساتھ دوسرے مرکبات کے ساتھ آکسائڈ بناتا ہے۔ بڑے پیمانے پر، ہائیڈروجن اور ہیلیم کے بعد، کائنات میں آکسیجن تیسرا سب سے زیادہ وافر عنصر ہے۔ معیاری درجہ حرارت اور دباؤ پر، عنصر کے دو ایٹم ڈائی آکسیجن بنانے کے لیے باندھتے ہیں، فارمولہ O2 کے ساتھ ایک بے رنگ اور بو کے بغیر ڈائیٹومک گیس۔ یہ ماحول کا ایک اہم حصہ ہے اور ارضی زندگی کو برقرار رکھنے کے لیے ضروری ہے۔', contentPashto: 'اکسیجن یو کیمیاوي عنصر دی چې سمبول O او اټومي شمیره ۸ لري. دا په دوره ای جدول کې د چالکوګن ګروپ غړی دی، یو خورا فعال غیر فلز دی، او یو اکسیډیز کولو اجنټ دی چې په اسانۍ سره د ډیری عناصرو او نورو مرکباتو سره اکسایډونه جوړوي. د ډله ایز په واسطه، اکسیجن د هایدروجن او هیلیم وروسته په کائنات کې دریم خورا بډایه عنصر دی. په معیاري تودوخې او فشار کې، د عنصر دوه اتومونه د ډای اکسیجن جوړولو لپاره تړل کیږي، د O2 فارمول سره یو بې رنګ او بې بوی ډیاتومیک ګاز. دا د اتموسفیر یوه مهمه برخه ده او د ځمکې د ژوند ساتلو لپاره اړینه ده.' },
                    { id: 'carbon', title: 'Carbon', titleUrdu: 'کاربن', titlePashto: 'کاربن', type: 'Element', typeUrdu: 'عنصر', typePashto: 'عنصر', color: 'from-gray-600 to-gray-800', fact: 'Life is carbon-based.', factUrdu: 'زندگی کاربن پر مبنی ہے۔', factPashto: 'ژوند په کاربن ولاړ دی.', content: 'Carbon is a chemical element with the symbol C and atomic number 6. It is nonmetallic and tetravalent—making four electrons available to form covalent chemical bonds. It belongs to group 14 of the periodic table. Carbon makes up only about 0.025 percent of Earth\'s crust. Three isotopes occur naturally, 12C and 13C being stable, while 14C is a radionuclide, decaying with a half-life of about 5,730 years. Carbon is one of the few elements known since antiquity.', contentUrdu: 'کاربن ایک کیمیائی عنصر ہے جس کی علامت C اور ایٹمی نمبر 6 ہے۔ یہ نان میٹالک اور ٹیٹراویلنٹ ہے—کوویلنٹ کیمیکل بانڈز بنانے کے لیے چار الیکٹران دستیاب کراتا ہے۔ یہ متواتر جدول کے گروپ 14 سے تعلق رکھتا ہے۔ کاربن زمین کی پرت کا صرف 0.025 فیصد بناتا ہے۔ تین آاسوٹوپس قدرتی طور پر پائے جاتے ہیں، 12C اور 13C مستحکم ہیں، جبکہ 14C ایک ریڈیو نیوکلائڈ ہے، جو تقریباً 5,730 سال کی نصف زندگی کے ساتھ زوال پذیر ہوتا ہے۔ کاربن ان چند عناصر میں سے ایک ہے جو قدیم زمانے سے جانا جاتا ہے۔', contentPashto: 'کاربن یو کیمیاوي عنصر دی چې سمبول C او اټومي شمیره ۶ لري. دا غیر فلزي او ټیټراویلنټ دی - څلور الکترونونه چمتو کوي ترڅو کوویلنټ کیمیاوي بانډونه جوړ کړي. دا د دوره ای جدول د ۱۴ ګروپ پورې اړه لري. کاربن د ځمکې د کرسټ یوازې ۰.۰۲۵ سلنه جوړوي. درې اسوټوپونه په طبیعي ډول پیښیږي، 12C او 13C مستحکم دي، پداسې حال کې چې 14C یو راډیو نیوکلایډ دی، چې شاوخوا ۵،۷۳۰ کلونو نیم ژوند سره تخریب کیږي. کاربن یو له هغو څو عناصرو څخه دی چې له لرغونې زمانې راهیسې پیژندل شوی.' },
                    { id: 'gold', title: 'Gold', titleUrdu: 'سونا', titlePashto: 'سره زر', type: 'Metal', typeUrdu: 'دھات', typePashto: 'فلز', color: 'from-yellow-400 to-yellow-600', fact: 'Gold never rusts.', factUrdu: 'سونے کو زنگ نہیں لگتا۔', factPashto: 'سره زر هیڅکله زنګ نه وهي.', content: 'Gold is a chemical element with the symbol Au and atomic number 79. In its pure form, it is a bright, slightly reddish yellow, dense, soft, malleable, and ductile metal. Chemically, gold is a transition metal and a group 11 element. It is one of the least reactive chemical elements and is solid under standard conditions. Gold often occurs in free elemental (native) form, as nuggets or grains, in rocks, in veins, and in alluvial deposits.', contentUrdu: 'سونا ایک کیمیائی عنصر ہے جس کی علامت Au اور ایٹمی نمبر 79 ہے۔ اپنی خالص شکل میں، یہ ایک روشن، قدرے سرخی مائل پیلا، گھنا، نرم، خراب، اور لچکدار دھات ہے۔ کیمیاوی طور پر، سونا ایک ٹرانزیشن میٹل اور گروپ 11 کا عنصر ہے۔ یہ سب سے کم رد عمل والے کیمیائی عناصر میں سے ایک ہے اور معیاری حالات میں ٹھوس ہے۔ سونا اکثر آزاد عنصری (مقامی) شکل میں، نوگیٹس یا اناج کے طور پر، چٹانوں میں، رگوں میں، اور اللووییل کے ذخائر میں پایا جاتا ہے۔', contentPashto: 'سره زر یو کیمیاوي عنصر دی چې سمبول Au او اټومي شمیره ۷۹ لري. په خپل خالص شکل کې، دا یو روښانه، لږ سور ژیړ، کثافت، نرم، خراب او نرم فلز دی. په کیمیاوي توګه، سره زر یو انتقالي فلز او د ۱۱ ګروپ عنصر دی. دا یو له خورا لږ عکس العمل لرونکي کیمیاوي عناصرو څخه دی او د معیاري شرایطو لاندې جامد دی. سره زر ډیری وختونه په ازاد عنصري (اصلي) شکل کې پیښیږي، د نوګیټ یا دانې په توګه، په ډبرو کې، په رګونو کې، او د اللووییل زیرمو کې.' },
                    { id: 'iron', title: 'Iron', titleUrdu: 'لوہا', titlePashto: 'اوسپنه', type: 'Metal', typeUrdu: 'دھات', typePashto: 'فلز', color: 'from-stone-500 to-stone-700', fact: 'Steel is made from iron.', factUrdu: 'سٹیل لوہے سے بنتا ہے۔', factPashto: 'فولاد له اوسپنې جوړیږي.', content: 'Iron is a chemical element with symbol Fe and atomic number 26. It is a metal that belongs to the first transition series and group 8 of the periodic table. It is by mass the most common element on Earth, right in front of oxygen, forming much of Earth\'s outer and inner core. It is the fourth most common element in the Earth\'s crust. Iron serves many functions in the body, but the most important is to transport oxygen in the blood.', contentUrdu: 'لوہا ایک کیمیائی عنصر ہے جس کی علامت Fe اور ایٹمی نمبر 26 ہے۔ یہ ایک دھات ہے جس کا تعلق پہلے ٹرانزیشن سیریز اور دوری جدول کے گروپ 8 سے ہے۔ یہ زمین پر آکسیجن کے بالکل سامنے سب سے عام عنصر ہے، جو زمین کے بیرونی اور اندرونی مرکز کا زیادہ تر حصہ بناتا ہے۔ یہ زمین کی پرت میں چوتھا سب سے عام عنصر ہے۔ آئرن جسم میں بہت سے افعال انجام دیتا ہے، لیکن سب سے اہم خون میں آکسیجن پہنچانا ہے۔', contentPashto: 'اوسپنه یو کیمیاوي عنصر دی چې سمبول Fe او اټومي شمیره ۲۶ لري. دا یو فلز دی چې د لومړي لیږد لړۍ او د دوراني جدول ۸ ګروپ پورې اړه لري. دا په ځمکه کې ترټولو عام عنصر دی چې د اکسیجن په وړاندې سم دی، د ځمکې ډیری بهرنی او داخلي کور جوړوي. دا د ځمکې په قشر کې څلورم خورا عام عنصر دی. اوسپنه په بدن کې ډیری دندې ترسره کوي، مګر ترټولو مهم یې په وینه کې د اکسیجن لیږدول دي.' },
                    { id: 'acid', title: 'Acid', titleUrdu: 'تیزاب', titlePashto: 'تیزاب', type: 'Chemical', typeUrdu: 'کیمیکل', typePashto: 'کیمیاوي', color: 'from-yellow-400 to-lime-500', fact: 'Lemons have acid.', factUrdu: 'لیموں میں تیزاب ہوتا ہے۔', factPashto: 'لیمو تیزاب لري.', content: 'An acid is a molecule or ion capable of donating a proton (hydrogen ion H+) (a Brønsted–Lowry acid), or, alternatively, capable of forming a covalent bond with an electron pair (a Lewis acid). The first category of acids are the proton donors, or Brønsted–Lowry acids. In the special case of aqueous solutions, proton donors form the hydronium ion H3O+ and are known as Arrhenius acids. Brønsted and Lowry generalized the Arrhenius theory to include non-aqueous solvents.', contentUrdu: 'تیزاب ایک مالیکیول یا آئن ہے جو پروٹون (ہائیڈروجن آئن H+) (ایک برونسٹڈ – لوری ایسڈ) عطیہ کرنے کے قابل ہے، یا متبادل طور پر، الیکٹران کے جوڑے (لیوس ایسڈ) کے ساتھ ہم آہنگ بانڈ بنانے کی صلاحیت رکھتا ہے۔ تیزاب کا پہلا زمرہ پروٹون ڈونر، یا برونسٹڈ – لوری ایسڈ ہیں۔ آبی محلول کے خاص معاملے میں، پروٹون ڈونر ہائیڈرونیم آئن H3O+ بناتے ہیں اور انہیں ا رہینئیس تیزاب کے نام سے جانا جاتا ہے۔ برونسٹڈ اور لوری نے آرہینیئس تھیوری کو غیر آبی سالوینٹس کو شامل کرنے کے لیے عام کیا۔', contentPashto: 'تیزاب یو مالیکول یا ایون دی چې د پروټون (هایډروجن آئن H+) (د برونسټډ – لوری اسید) د بسپنه ورکولو وړتیا لري، یا په بدیل سره، د بریښنایی جوړه (لیوس اسید) سره د کوویلنټ بانډ رامینځته کولو وړتیا لري. د اسیدونو لومړۍ کټګورۍ د پروټون ډونر، یا برونسټډ – لوری اسیدونه دي. د اوبو د محلولونو په ځانګړې قضیه کې، پروټون بسپنه ورکوونکي د هایدرونیم ایون H3O+ جوړوي او د ارهینیس اسیدونو په نوم پیژندل کیږي. برونسټډ او لوری د ارهینیس تیوري عمومي کړه ترڅو غیر آبی محلولونه پکې شامل کړي.' },
                    { id: 'base', title: 'Base', titleUrdu: 'اساس', titlePashto: 'القلی', type: 'Chemical', typeUrdu: 'کیمیکل', typePashto: 'کیمیاوي', color: 'from-blue-400 to-indigo-500', fact: 'Soap is a base.', factUrdu: 'صابن ایک اساس ہے۔', factPashto: 'صابون یو القلی دی.', content: 'In chemistry, there are three definitions in common use of the word base, known as Arrhenius bases, Brønsted bases, and Lewis bases. All definitions agree that bases are substances which react with acids as originally proposed by G.-F. Rouelle in the mid-18th century. In 1884, Svante Arrhenius proposed that a base is a substance which dissociates in aqueous solution to form hydroxide ions OH−. These ions can react with hydrogen ions (H+ according to Arrhenius) from the dissociation of acids to form water in an acid–base reaction.', contentUrdu: 'کیمسٹری میں، بیس لفظ کے عام استعمال میں تین تعریفیں ہیں، جنہیں ا رہینئیس اڈے، برونسٹڈ اڈے، اور لیوس اڈے کہا جاتا ہے۔ تمام تعریفیں اس بات پر متفق ہیں کہ اڈے وہ مادے ہیں جو تیزاب کے ساتھ رد عمل ظاہر کرتے ہیں جیسا کہ اصل میں G.-F نے تجویز کیا تھا۔ 18ویں صدی کے وسط میں روئیل۔ 1884 میں، سوانتے ا رہینئیس نے تجویز پیش کی کہ ایک بنیاد ایک مادہ ہے جو آبی محلول میں الگ ہو کر ہائیڈرو آکسائیڈ آئن OH− بناتا ہے۔ یہ آئن تیزاب کے الگ ہونے سے ہائیڈروجن آئنوں (ا رہینئیس کے مطابق H+) کے ساتھ رد عمل ظاہر کر سکتے ہیں تاکہ تیزاب بیس کے رد عمل میں پانی بن سکے۔', contentPashto: 'په کیمیا کې، د بیس کلمې په عام استعمال کې درې تعریفونه شتون لري، چې د ارهینیس اډې، برونسټډ اډې، او لیوس اډې په نوم پیژندل کیږي. ټول تعریفونه موافق دي چې اډې هغه مواد دي چې د تیزابونو سره غبرګون کوي لکه څنګه چې په اصل کې د G.-F لخوا وړاندیز شوی. رویل د ۱۸ پیړۍ په نیمایي کې. په ۱۸۸۴ کې، سوانت ارینیس وړاندیز وکړ چې یو اساس یوه ماده ده چې په آبی محلول کې جلا کیږي ترڅو هایدروکسایډ ایون OH- جوړ کړي. دا ایونونه کولی شي د تیزابونو له جلا کیدو څخه د هایدروجن ایونونو (H+ د ارینیوس په وینا) سره عکس العمل وکړي ترڅو د اسید - بیس تعامل کې اوبه رامینځته کړي.' },
                    { id: 'reaction', title: 'Reaction', titleUrdu: 'رد عمل', titlePashto: 'تعامل', type: 'Process', typeUrdu: 'عمل', typePashto: 'پروسه', color: 'from-orange-500 to-red-600', fact: 'Explosions are fast reactions.', factUrdu: 'دھماکے تیز رد عمل ہیں۔', factPashto: 'چاودنې ګړندي تعاملات دي.', content: 'A chemical reaction is a process that leads to the chemical transformation of one set of chemical substances to another. Classically, chemical reactions encompass changes that only involve the positions of electrons in the forming and breaking of chemical bonds between atoms, with no change to the nuclei (no change to the elements present), and can often be described by a chemical equation. Nuclear chemistry is a sub-discipline of chemistry that involves the chemical reactions of unstable and radioactive elements where both electronic and nuclear changes can occur.', contentUrdu: 'کیمیائی رد عمل ایک ایسا عمل ہے جو کیمیائی مادوں کے ایک سیٹ کی دوسرے میں کیمیائی تبدیلی کا باعث بنتا ہے۔ کلاسیکی طور پر، کیمیائی رد عمل میں ایسی تبدیلیاں شامل ہوتی ہیں جن میں صرف ایٹموں کے درمیان کیمیائی بانڈز کے بننے اور ٹوٹنے میں الیکٹران کی پوزیشنیں شامل ہوتی ہیں، نیوکلی میں کوئی تبدیلی نہیں ہوتی (موجود عناصر میں کوئی تبدیلی نہیں ہوتی)، اور اکثر کیمیائی مساوات کے ذریعے بیان کیا جا سکتا ہے۔ نیوکلیئر کیمسٹری کیمسٹری کا ایک ذیلی ڈسپلن ہے جس میں غیر مستحکم اور تابکار عناصر کے کیمیائی رد عمل شامل ہوتے ہیں جہاں الیکٹرانک اور جوہری دونوں تبدیلیاں رونما ہو سکتی ہیں۔', contentPashto: 'کیمیاوي تعامل یوه پروسه ده چې د کیمیاوي موادو یوه مجموعه بل ته د کیمیاوي بدلون لامل کیږي. په کلاسیک ډول، کیمیاوي تعاملات هغه بدلونونه لري چې یوازې د اتومونو تر مینځ د کیمیاوي بانډونو په جوړولو او ماتولو کې د الیکٹروونونو موقعیتونه شامل دي، پرته له دې چې نیوکلی کې بدلون راشي (د موجود عناصرو هیڅ بدلون نه)، او ډیری وختونه د کیمیاوي مساوات لخوا تشریح کیدی شي. اټومي کیمیا د کیمیا یو فرعي ډسپلین دی چې د بې ثباته او راډیو اکټیو عناصرو کیمیاوي تعاملات پکې شامل دي چیرې چې بریښنایی او اټومي بدلونونه واقع کیدی شي.' },
                    { id: 'solid', title: 'Solid', titleUrdu: 'ٹھوس', titlePashto: 'جامد', type: 'State', typeUrdu: 'حالت', typePashto: 'حالت', color: 'from-stone-400 to-stone-600', fact: 'Ice is a solid.', factUrdu: 'برف ایک ٹھوس ہے۔', factPashto: 'یخ یو جامد دی.', content: 'Solid is one of the four fundamental states of matter (the others being liquid, gas, and plasma). The molecules in a solid are closely packed together and contain the least amount of kinetic energy. A solid is characterized by structural rigidity and resistance to a force applied to the surface. A solid material does not flow to take on the shape of its container, nor does it expand to fill the entire available volume like a gas. The atoms in a solid are bound to each other, either in a regular geometric lattice (crystalline solids, which include metals and ordinary ice) or irregularly (an amorphous solid such as common window glass).', contentUrdu: 'ٹھوس مادے کی چار بنیادی حالتوں میں سے ایک ہے (دیگر مائع، گیس اور پلازما ہیں)۔ ٹھوس میں مالیکیول ایک دوسرے کے ساتھ مل کر پیک ہوتے ہیں اور ان میں حرکی توانائی کی کم سے کم مقدار ہوتی ہے۔ ایک ٹھوس ساختی سختی اور سطح پر لگائی جانے والی قوت کے خلاف مزاحمت کی خصوصیت ہے۔ ایک ٹھوس مواد اپنے کنٹینر کی شکل اختیار کرنے کے لیے نہیں بہتا ہے، اور نہ ہی یہ گیس کی طرح پورے دستیاب حجم کو بھرنے کے لیے پھیلتا ہے۔ ٹھوس میں ایٹم ایک دوسرے کے ساتھ جڑے ہوتے ہیں، یا تو باقاعدہ ہندسی جالی میں (کرسٹل لائن ٹھوس، جس میں دھاتیں اور عام برف شامل ہیں) یا بے قاعدہ (ایک بے ساختہ ٹھوس جیسے عام کھڑکی کا شیشہ)۔', contentPashto: 'جامد د مادې یو له څلورو بنسټیزو حالتونو څخه دی (نور یې مایع، ګاز او پلازما دي). په جامد کې مالیکولونه یو بل سره نږدې بسته شوي او لږترلږه متحرک انرژي لري. یو جامد د ساختماني سختۍ او په سطح باندې پلي شوي ځواک په وړاندې مقاومت لخوا مشخص کیږي. یو جامد مواد نه تیریږي ترڅو د خپل کانټینر شکل واخلي، او نه هم د ګاز په څیر د ټول موجود حجم ډکولو لپاره پراخیږي. په جامد کې اتومونه یو له بل سره تړلي دي، یا په منظم جیومیټریک جال کې (کریسټالین جامدونه، چې فلزات او عادي یخ پکې شامل دي) یا په غیر منظم ډول (یو بې مورفه جامد لکه د کړکۍ عام شیشې).' },
                    { id: 'liquid', title: 'Liquid', titleUrdu: 'مائع', titlePashto: 'مایع', type: 'State', typeUrdu: 'حالت', typePashto: 'حالت', color: 'from-blue-400 to-cyan-500', fact: 'Water is a liquid.', factUrdu: 'پانی ایک مائع ہے۔', factPashto: 'وبه یوه مایع ده.', content: 'A liquid is a nearly incompressible fluid that conforms to the shape of its container but retains a (nearly) constant volume independent of pressure. As such, it is one of the four fundamental states of matter (the others being solid, gas, and plasma), and is the only state with a definite volume but no fixed shape. A liquid is made up of tiny vibrating particles of matter, such as atoms, held together by intermolecular bonds. Like a gas, a liquid is able to flow and take the shape of a container.', contentUrdu: 'مائع ایک تقریبا ناقابل دباؤ سیال ہے جو اپنے کنٹینر کی شکل کے مطابق ہوتا ہے لیکن دباؤ سے آزاد (تقریبا) مستقل حجم کو برقرار رکھتا ہے۔ اس طرح، یہ مادے کی چار بنیادی حالتوں میں سے ایک ہے (دیگر ٹھوس، گیس اور پلازما ہیں)، اور واحد حالت ہے جس کا حجم یقینی ہے لیکن کوئی مقررہ شکل نہیں ہے۔ ایک مائع مادہ کے چھوٹے تھرتھراتے ہوئے ذرات سے بنا ہوتا ہے، جیسے ایٹم، جو انٹرمولیکولر بانڈز کے ذریعے اکٹھے ہوتے ہیں۔ گیس کی طرح، مائع بہنے اور کنٹینر کی شکل اختیار کرنے کے قابل ہے۔', contentPashto: 'مایع یو نږدې نه کمپریس کیدونکی مایع دی چې د خپل کانټینر شکل سره مطابقت لري مګر د فشار څخه خپلواک (نږدې) ثابت حجم ساتي. په دې توګه، دا د مادې یو له څلورو بنسټیزو حالتونو څخه دی (نور یې جامد، ګاز او پلازما دي)، او یوازینی حالت دی چې دقیق حجم لري مګر ثابت شکل نلري. مایع د مادې له کوچنیو خوځنده ذراتو څخه جوړه ده، لکه اتومونه، چې د انټرمولکولر بانډونو په واسطه یوځای ساتل کیږي. د ګاز په څیر، مایع د جریان کولو توان لري او د کانټینر شکل اخلي.' },
                    { id: 'gas', title: 'Gas', titleUrdu: 'گیس', titlePashto: 'ګاز', type: 'State', typeUrdu: 'حالت', typePashto: 'حالت', color: 'from-slate-300 to-slate-400', fact: 'Air is gas.', factUrdu: 'ہوا گیس ہے۔', factPashto: 'هوا ګاز دی.', content: 'Gas is one of the four fundamental states of matter (the others being solid, liquid, and plasma). A pure gas may be made up of individual atoms (e.g. a noble gas like neon), elemental molecules made from one type of atom (e.g. oxygen), or compound molecules made from a variety of atoms (e.g. carbon dioxide). A gas mixture, such as air, contains a variety of pure gases. What distinguishes a gas from liquids and solids is the vast separation of the individual gas particles.', contentUrdu: 'گیس مادے کی چار بنیادی حالتوں میں سے ایک ہے (دیگر ٹھوس، مائع اور پلازما ہیں)۔ ایک خالص گیس انفرادی ایٹموں (جیسے نیون جیسی نوبل گیس)، ایک قسم کے ایٹم (جیسے آکسیجن) سے بنے عنصری مالیکیول، یا مختلف قسم کے ایٹموں (جیسے کاربن ڈائی آکسائیڈ) سے بنے مرکب مالیکیولز سے بنی ہو سکتی ہے۔ گیس کا مرکب، جیسے ہوا، مختلف قسم کی خالص گیسوں پر مشتمل ہوتا ہے۔ گیس کو مائعات اور ٹھوس چیزوں سے جو چیز ممتاز کرتی ہے وہ انفرادی گیس کے ذرات کی وسیع علیحدگی ہے۔', contentPashto: 'ګاز د مادې یو له څلورو بنسټیزو حالتونو څخه دی (نور یې جامد، مایع او پلازما دي). خالص ګاز ممکن د انفرادي اتومونو څخه جوړ شوی وي (د مثال په توګه یو نوبل ګاز لکه نیون)، عنصري مالیکولونه چې د یو ډول اتوم (د مثال په توګه اکسیجن) څخه جوړ شوي وي، یا مرکب مالیکولونه چې د مختلف اتومونو (لکه کاربن ډای اکسایډ) څخه جوړ شوي وي. د ګاز مخلوط، لکه هوا، مختلف خالص ګازونه لري. هغه څه چې ګاز د مایعاتو او جامدونو څخه توپیر کوي د انفرادي ګاز ذراتو پراخه جلا کول دي.' },
                    { id: 'salt', title: 'Salt', titleUrdu: 'نمک', titlePashto: 'مالګه', type: 'Compound', typeUrdu: 'مرکب', typePashto: 'مرکب', color: 'from-gray-200 to-gray-400', fact: 'Salt makes food tasty.', factUrdu: 'نمک کھانے کو مزیدار بناتا ہے۔', factPashto: 'مالګه خواړه خوندور کوي.', content: 'Salt, chemically known as sodium chloride (NaCl), is a mineral essential for life in general, and saltiness is one of the basic human tastes. Salt is one of the oldest and most ubiquitous food seasonings, and salting is an important method of food preservation. Some of the earliest evidence of salt processing dates to around 6,000 BC, when people living in Romania were boiling spring water to extract salts; a salt-works in China dates to approximately the same period.', contentUrdu: 'نمک، کیمیائی طور پر سوڈیم کلورائد (NaCl) کے نام سے جانا جاتا ہے، عام طور پر زندگی کے لیے ضروری معدنیات ہے، اور نمکین ہونا انسانی بنیادی ذائقوں میں سے ایک ہے۔ نمک قدیم ترین اور سب سے زیادہ ہر جگہ کھانے کے مسالوں میں سے ایک ہے، اور نمکین کرنا خوراک کے تحفظ کا ایک اہم طریقہ ہے۔ نمک کی پروسیسنگ کے ابتدائی شواہد میں سے کچھ تقریباً 6,000 قبل مسیح کے ہیں، جب رومانیہ میں رہنے والے لوگ نمکیات نکالنے کے لیے چشمے کا پانی ابال رہے تھے۔ چین میں نمک کا کام تقریبا اسی دور کا ہے۔', contentPashto: 'مالګه، چې په کیمیاوي ډول د سوډیم کلورایډ (NaCl) په نوم پیژندل کیږي، په عمومي توګه د ژوند لپاره اړین معدني دی، او مالګه د انسان له لومړنیو خوندونو څخه دی. مالګه یو له پخوانیو او خورا هر اړخیز خواړو موسمي کولو څخه دی، او مالګه د خوړو د ساتنې یوه مهمه طریقه ده. د مالګې پروسس کولو ځینې لومړني شواهد شاوخوا ۶،۰۰۰ BC ته تاریخ لري، کله چې په رومانیا کې اوسیدونکي خلک د مالګې استخراج لپاره د پسرلي اوبه جوشولې؛ په چین کې د مالګې کار تقریبا ورته وخت نیسي.' }

            {
                id: 'earth-science',
                title: 'Earth Science',
                titleUrdu: 'زمینی علوم',
                titlePashto: 'د ځمکې ساینس',
