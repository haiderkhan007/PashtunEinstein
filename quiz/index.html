                                <div>
                                    <h1 className="text-xl font-bold text-white">{UI_TEXT.title[language]}</h1>
                                    <p className={`text-xs text-slate-400 uppercase tracking-wider ${currentFont}`}>{UI_TEXT.subtitle[language]}</p>
                                </div>
                            </div>

                            <div className="flex flex-col sm:flex-row items-center gap-4">
                                <LanguageSelector currentLang={language} onSelect={setLanguage} />
                                
                                <div className="flex items-center gap-2">
                                    <a href="https://pashtuneinstein.com/" target="_blank" rel="noopener noreferrer" className="p-2 bg-slate-800 rounded-full text-slate-400 hover:text-white hover:bg-blue-600 transition-all">
                                        <Globe className="w-5 h-5" />
                                    </a>
                                    <a href="https://blog.pashtuneinstein.com/" target="_blank" rel="noopener noreferrer" className="p-2 bg-slate-800 rounded-full text-slate-400 hover:text-white hover:bg-orange-600 transition-all">
                                        <BookOpen className="w-5 h-5" />
                                    </a>
                                    <a href="https://www.youtube.com/@PashtunEinstein" target="_blank" rel="noopener noreferrer" className="p-2 bg-slate-800 rounded-full text-slate-400 hover:text-white hover:bg-red-600 transition-all">
                                        <Youtube className="w-5 h-5" />
                                    </a>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-grow flex items-center justify-center p-4 sm:p-8 relative overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black -z-10 no-print"></div>
                        
                        {/* VIEW: INTRO */}
                        {view === 'intro' && (
                            <div className="max-w-2xl w-full text-center space-y-8 animate-in fade-in zoom-in duration-500">
                                <div className="bg-blue-500/10 w-24 h-24 rounded-full flex items-center justify-center mx-auto border-4 border-blue-500 shadow-2xl shadow-blue-500/20">
                                    <Brain className="w-12 h-12 text-blue-400" />
                                </div>
                                <div>
                                    <h2 className={`text-4xl md:text-5xl font-bold text-white mb-4 ${currentFont}`}>{UI_TEXT.heroTitle[language]}</h2>
                                    <p className={`text-lg text-slate-400 leading-relaxed ${currentFont}`}>
                                        {UI_TEXT.heroDesc[language]}
                                    </p>
                                </div>
                                <button 
                                    onClick={startQuiz}
                                    className={`px-8 py-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white text-lg font-bold rounded-full shadow-lg shadow-blue-600/25 transition-all transform hover:scale-105 flex items-center gap-2 mx-auto ${currentFont}`}
                                >
                                    {UI_TEXT.startBtn[language]} <ArrowRight className={`w-5 h-5 ${dir === 'rtl' ? 'rotate-180' : ''}`} />
                                </button>
                            </div>
                        )}

                        {/* VIEW: QUIZ */}
                        {view === 'quiz' && (
                            <div className="max-w-2xl w-full bg-slate-900/80 backdrop-blur-lg border border-slate-800 rounded-2xl p-8 shadow-2xl animate-in slide-in-from-right duration-300">
                                <div className="flex justify-between items-center mb-6">
                                    <span className={`text-sm font-medium text-blue-400 uppercase tracking-wider ${currentFont}`}>
                                        {UI_TEXT.questionLabel[language]} {currentQuestion + 1} {UI_TEXT.of[language]} {shuffledQuestions.length}
                                    </span>
                                </div>
                                
                                <h3 className={`text-2xl font-bold text-white mb-8 leading-relaxed ${currentFont}`}>
                                    {shuffledQuestions[currentQuestion].question[language]}
                                </h3>

                                <div className="space-y-4">
                                    {shuffledQuestions[currentQuestion].options[language].map((option, index) => (
                                        <button
                                            key={index}
                                            onClick={() => handleAnswer(index)}
                                            className={`w-full text-left p-4 rounded-xl border border-slate-700 bg-slate-800/50 hover:bg-blue-600 hover:border-blue-500 hover:text-white text-slate-300 transition-all duration-200 font-medium flex items-center justify-between group ${currentFont}`}
                                        >
                                            {option}
                                            <ArrowRight className={`w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity ${dir === 'rtl' ? 'rotate-180' : ''}`} />
                                        </button>
                                    ))}
                                </div>

                                <div className="w-full bg-slate-800 h-2 rounded-full mt-8 overflow-hidden" dir="ltr">
                                    <div 
                                        className="bg-blue-500 h-full transition-all duration-300" 
                                        style={{ width: `${((currentQuestion) / shuffledQuestions.length) * 100}%` }}
                                    ></div>
                                </div>
                            </div>
                        )}

                        {/* VIEW: RESULT */}
                        {view === 'result' && (
                            <div className="max-w-xl w-full bg-slate-900/90 border border-slate-800 rounded-2xl p-10 text-center shadow-2xl animate-in zoom-in duration-300">
                                {score >= 7 ? (
                                    <>
                                        <div className="w-24 h-24 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-green-500">
                                            <Award className="w-12 h-12 text-green-400" />
                                        </div>
                                        <h2 className={`text-3xl font-bold text-white mb-2 ${currentFont}`}>{UI_TEXT.congrats[language]}</h2>
                                        <p className={`text-slate-400 mb-6 ${currentFont}`}>{UI_TEXT.passedDesc[language]} <span className="text-green-400 font-bold text-xl">{score * 10}%</span>.</p>
                                        
                                        <form onSubmit={handleGenerateCertificate} className="space-y-4 bg-slate-800/50 p-6 rounded-xl border border-slate-700">
                                            <h3 className={`text-white font-medium mb-4 ${currentFont}`}>{UI_TEXT.enterName[language]}</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <input 
                                                    type="text" 
                                                    required 
                                                    placeholder={UI_TEXT.fName[language]}
                                                    value={firstName}
                                                    onChange={(e) => setFirstName(e.target.value)}
                                                    className={`w-full p-3 bg-slate-900 border border-slate-600 rounded-lg text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none ${currentFont}`}
                                                />
                                                <input 
                                                    type="text" 
                                                    required 
                                                    placeholder={UI_TEXT.lName[language]}
                                                    value={lastName}
                                                    onChange={(e) => setLastName(e.target.value)}
                                                    className={`w-full p-3 bg-slate-900 border border-slate-600 rounded-lg text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none ${currentFont}`}
                                                />
                                            </div>
                                            <button type="submit" className={`w-full py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg transition-colors flex items-center justify-center gap-2 ${currentFont}`}>
                                                <GraduationCap className="w-5 h-5" />
                                                {UI_TEXT.issueBtn[language]}
                                            </button>
                                        </form>
                                    </>
                                ) : (
                                    <>
                                        <div className="w-24 h-24 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-red-500">
                                            <XCircle className="w-12 h-12 text-red-400" />
                                        </div>
                                        <h2 className={`text-3xl font-bold text-white mb-2 ${currentFont}`}>{UI_TEXT.keepLearning[language]}</h2>
                                        <p className={`text-slate-400 mb-8 ${currentFont}`}>{UI_TEXT.failedDesc[language]} <span className="text-red-400 font-bold">{score * 10}%</span>. {UI_TEXT.needDesc[language]}</p>
                                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                            <button onClick={startQuiz} className={`px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium flex items-center justify-center gap-2 transition-colors ${currentFont}`}>
                                                <RotateCcw className="w-4 h-4" /> {UI_TEXT.tryAgain[language]}
                                            </button>
                                            <a href="/webscience/" className={`px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium flex items-center justify-center gap-2 transition-colors ${currentFont}`}>
                                                {UI_TEXT.review[language]}
                                            </a>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {/* VIEW: CERTIFICATE */}
                        {view === 'certificate' && (
                            <Certificate 
                                name={`${firstName} ${lastName}`} 
                                date={new Date().toLocaleDateString()} 
                                onPrint={() => window.print()}
                            />
                        )}

                    </main>

                    <footer className="bg-slate-950 text-slate-600 py-8 text-center text-sm border-t border-slate-900 no-print">
                        <p>&copy; {new Date().getFullYear()} PashtunEinstein. All Rights Reserved.</p>
                        <div className="flex justify-center gap-4 mt-2">
                            <a href="https://pashtuneinstein.com/" className={`hover:text-blue-400 ${currentFont}`}>{UI_TEXT.website[language]}</a>
                            <span className="text-slate-800">•</span>
                            <a href="https://blog.pashtuneinstein.com/" className={`hover:text-blue-400 ${currentFont}`}>{UI_TEXT.blog[language]}</a>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
