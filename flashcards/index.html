        };

        const UI = {
            title: { en: "Science Flashcards", ur: "سائنس فلیش کارڈز", ps: "د ساینس فلیش کارډونه" },
            subtitle: { en: "Spaced-Repetition Learning", ur: "فاصلہ repeat سیکھنا", ps: "فاصله تکرار زده کړه" },
            selectCategory: { en: "Select a Category", ur: "زمرہ منتخب کریں", ps: "یوه ډله وټاکئ" },
            allCategories: { en: "All Categories", ur: "تمام زمرے", ps: "ټولې ډلې" },
            flipCard: { en: "Tap to flip", ur: "پلٹنے کے لیے ٹیپ کریں", ps: "واړولو لپاره کلیک وکړئ" },
            knewIt: { en: "Knew It 😊", ur: "پتا تھا 😊", ps: "ماپوهيده 😊" },
            learning: { en: "Learning 📖", ur: "سیکھ رہا ہوں 📖", ps: "زده کیږم 📖" },
            forgot: { en: "Forgot 😕", ur: "بھول گیا 😕", ps: "هیر شولمه 😕" },
            cardOf: { en: "of", ur: "میں سے", ps: "له" },
            progress: { en: "Progress", ur: "پیش رفت", ps: "پرمختګ" },
            mastered: { en: "Mastered", ur: "مکمل", ps: "ماسټر شو" },
            reviewing: { en: "Reviewing", ur: "دہرایا جا رہا", ps: "بیاکتنه کیږي" },
            again: { en: "New Session", ur: "نئی سیشن", ps: "نوي غونډې" },
            backToAcademy: { en: "Back to Academy", ur: "اکادمی واپس", ps: "اکاډمۍ ته شاته" },
            noCards: { en: "No cards to review! Come back later.", ur: "دہرانے کے لیے کوئی کارڈ نہیں! بعد میں آئیں۔", ps: "بیاکتنه لپاره کوم کارډ نشته! وروسته راشئ." },
            term: { en: "Term", ur: "لفظ", ps: "وییکی" },
            definition: { en: "Definition", ur: "تعریف", ps: "پېژندنه" },
            sessionComplete: { en: "Session Complete!", ur: "سیشن مکمل!", ps: "غونډه بشپړه شوه!" },
            greatJob: { en: "Great job! You reviewed all cards.", ur: "شاباش! آپ نے تمام کارڈز کا دہرا لیا۔", ps: "ښه کار! تاسو ټول کارډونه وکتل." },
            startOver: { en: "Start Over", ur: "شروع کریں", ps: "بیا پیل کړئ" },
            howWell: { en: "How well did you know this?", ur: "یہ آپ کو کتنا یاد تھا؟", ps: "دا تاسو څومره یاد وه؟" },
            resetProgress: { en: "Reset All Progress", ur: "تمام پرمختگا حذف کریں", ps: "ټول پرمختګ پایښت کړئ" },
            resetConfirm: { en: "Are you sure? This will erase all your progress.", ur: "کیا آپ یقینی ہیں؟ اس سے آپ کا تمام پرمختگا حذف ہو جائے گا۔", ps: "ایا تاسو ډاډه یاست؟ دا ستاسو ټول پرمختګ له منځه وړي." }
        };

        function App() {
            const [language, setLanguage] = useState('en');
            const [view, setView] = useState('categories');
            const [selectedCategories, setSelectedCategories] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const [progress, setProgress] = useState(() => {
                try {
                    const saved = localStorage.getItem('flashcard-progress');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) { return {}; }
            });
            const [sessionCards, setSessionCards] = useState([]);
            const [cardState, setCardState] = useState('');
            const [showReset, setShowReset] = useState(false);

            const currentFont = language === 'ur' ? 'font-urdu' : language === 'ps' ? 'font-pashto' : '';
            const dir = language === 'ur' || language === 'ps' ? 'rtl' : 'ltr';

            useEffect(() => {
                try { localStorage.setItem('flashcard-progress', JSON.stringify(progress)); } catch(e) {}
            }, [progress]);

            const t = (key) => UI[key]?.[language] || UI[key]?.en || key;

            const toggleCategory = (cat) => {
                setSelectedCategories(prev =>
                    prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat]
                );
            };

            const startSession = () => {
                let cats = selectedCategories.length > 0 ? selectedCategories : Object.keys(CATEGORIES);
                let cards = FLASHCARD_DATA.filter(c => cats.includes(c.category));
                cards = cards.sort(() => Math.random() - 0.5);
                setSessionCards(cards);
                setCurrentIndex(0);
                setFlipped(false);
                setCardState('');
                setView('study');
            };

            const handleRate = (rating) => {
                const cardId = sessionCards[currentIndex].id;
                const existing = progress[cardId] || { level: 0, lastSeen: 0 };

                let newLevel;
                if (rating === 'knew') { newLevel = Math.min(5, existing.level + 1); setCardState('correct-pulse'); }
                else if (rating === 'learning') { newLevel = existing.level; setCardState(''); }
                else { newLevel = 0; setCardState('wrong-pulse'); }

                setProgress(prev => ({
                    ...prev,
                    [cardId]: { level: newLevel, lastSeen: Date.now() }
                }));

                setTimeout(() => {
                    setCardState('');
                    if (currentIndex + 1 < sessionCards.length) {
                        setCurrentIndex(prev => prev + 1);
                        setFlipped(false);
                    } else {
                        setView('complete');
                    }
                }, 400);
            };

            const resetProgress = () => {
                setProgress({});
                localStorage.removeItem('flashcard-progress');
                setShowReset(false);
            };

            const masteredCount = Object.values(progress).filter(p => p.level >= 3).length;
            const learningCount = Object.values(progress).filter(p => p.level > 0 && p.level < 3).length;
            const totalCards = FLASHCARD_DATA.length;

            useEffect(() => {
                const titleEl = document.getElementById('header-title');
                const desc1El = document.getElementById('header-desc1');
                const desc2El = document.getElementById('header-desc2');
                const fontClass = language === 'ur' ? 'font-urdu' : language === 'ps' ? 'font-pashto' : '';
                if (titleEl) { titleEl.innerText = t('title'); titleEl.className = `text-3xl font-bold text-white ${fontClass}`; }
                if (desc1El) { desc1El.innerText = t('subtitle'); desc1El.className = `mt-3 text-lg text-slate-300 ${fontClass}`; }
                if (desc2El) { desc2El.innerText = `${masteredCount} ${t('mastered')} · ${learningCount} ${t('reviewing')} · ${totalCards} total`; desc2El.className = `mt-3 text-slate-400 ${fontClass}`; }
            }, [language, masteredCount, learningCount]);

            return (
                <div className="flex-grow flex flex-col" dir={dir}>
                    <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-3">
                            <div className="flex items-center gap-3">
                                <img src="/logo.png" alt="PashtunEinstein Logo" className="h-12 w-auto" />
                                <div>
                                    <h1 className={`text-xl font-bold text-white ${currentFont}`}>{t('title')}</h1>
                                    <p className={`text-xs text-slate-400 uppercase tracking-wider ${currentFont}`}>{t('subtitle')}</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3 flex-wrap justify-center">
                                <div className="flex items-center bg-slate-800 rounded-full p-1 border border-slate-700">
                                    {['en', 'ur', 'ps'].map(code => (
                                        <button key={code} onClick={() => setLanguage(code)}
                                            className={`px-3 py-1.5 rounded-full text-xs sm:text-sm font-medium transition-all ${
                                                language === code ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-700'
                                            } ${code === 'ur' ? 'font-urdu' : code === 'ps' ? 'font-pashto' : ''}`}>
                                            {code === 'en' ? 'English' : code === 'ur' ? 'اردو' : 'پښتو'}
                                        </button>
                                    ))}
                                </div>
                                <a href="/academy/" className="text-blue-400 hover:text-blue-300 text-sm font-medium">{t('backToAcademy')}</a>
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow flex items-center justify-center p-4 sm:p-8 relative overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black -z-10"></div>

                        {view === 'categories' && (
                            <div className="max-w-2xl w-full text-center space-y-8 fade-in">
                                <div className="bg-emerald-500/10 w-24 h-24 rounded-full flex items-center justify-center mx-auto border-4 border-emerald-500 shadow-2xl shadow-emerald-500/20">
                                    <span className="text-5xl">📚</span>
                                </div>
                                <h2 className={`text-3xl md:text-4xl font-bold text-white ${currentFont}`}>{t('selectCategory')}</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {Object.entries(CATEGORIES).map(([key, cat]) => (
                                        <button key={key} onClick={() => toggleCategory(key)}
                                            className={`p-4 rounded-xl border-2 transition-all text-center ${currentFont} ${
                                                selectedCategories.includes(key)
                                                    ? 'border-emerald-500 bg-emerald-500/20 text-emerald-300'
                                                    : 'border-slate-700 bg-slate-800/50 text-slate-300 hover:border-slate-500 hover:bg-slate-800'
                                            }`}>
                                            <span className="text-3xl block mb-2">{cat.icon}</span>
                                            <span className="font-semibold">{cat[language]}</span>
                                        </button>
                                    ))}
                                </div>
                                {selectedCategories.length === 0 && (
                                    <p className="text-slate-500 text-sm">{t('allCategories')}</p>
                                )}
                                <div className="flex flex-wrap justify-center gap-3">
                                    <button onClick={startSession}
                                        className="px-8 py-4 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white text-lg font-bold rounded-full shadow-lg transition-all transform hover:scale-105">
                                        {t('startOver')} 🚀
                                    </button>
                                    <button onClick={() => setShowReset(true)}
                                        className="px-6 py-4 border border-slate-700 text-slate-400 hover:border-red-500 hover:text-red-400 rounded-full transition-all text-sm">
                                        {t('resetProgress')}
                                    </button>
                                </div>

                                <div className="grid grid-cols-3 gap-4 mt-6">
                                    <div className="bg-slate-800/80 rounded-xl p-4 border border-slate-700">
                                        <div className="text-2xl font-bold text-green-400">{masteredCount}</div>
                                        <div className={`text-xs text-slate-400 ${currentFont}`}>{t('mastered')}</div>
                                    </div>
                                    <div className="bg-slate-800/80 rounded-xl p-4 border border-slate-700">
                                        <div className="text-2xl font-bold text-amber-400">{learningCount}</div>
                                        <div className={`text-xs text-slate-400 ${currentFont}`}>{t('reviewing')}</div>
                                    </div>
                                    <div className="bg-slate-800/80 rounded-xl p-4 border border-slate-700">
                                        <div className="text-2xl font-bold text-slate-300">{totalCards}</div>
                                        <div className={`text-xs text-slate-400 ${currentFont}`}>{t('progress')}</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'study' && sessionCards.length > 0 && (
                            <div className="max-w-xl w-full space-y-6 fade-in">
                                <div className="flex items-center justify-between text-sm text-slate-400">
                                    <span className={currentFont}>{t('term')} {currentIndex + 1} {t('cardOf')} {sessionCards.length}</span>
                                    <div className="w-48 bg-slate-800 h-2 rounded-full overflow-hidden" dir="ltr">
                                        <div className="bg-emerald-500 h-full transition-all duration-300" style={{ width: `${((currentIndex + 1) / sessionCards.length) * 100}%` }}></div>
                                    </div>
                                </div>

                                <div className={`flashcard ${flipped ? 'flipped' : ''} ${cardState}`} style={{ minHeight: '320px' }}
                                    onClick={() => setFlipped(!flipped)}>
                                    <div className="flashcard-inner" style={{ minHeight: '320px' }}>
                                        <div className="flashcard-front bg-slate-900/90 border-2 border-emerald-500/40 shadow-2xl">
                                            <div className={`text-xs uppercase tracking-wider text-emerald-400 mb-4 ${currentFont}`}>
                                                {CATEGORIES[sessionCards[currentIndex].category]?.[language] || sessionCards[currentIndex].category}
                                            </div>
                                            <div className={`text-3xl md:text-4xl font-bold text-white mb-6 ${currentFont}`}>
                                                {sessionCards[currentIndex].term[language]}
                                            </div>
                                            <div className={`text-sm text-slate-500 ${currentFont}`}>{t('flipCard')}</div>
                                        </div>
                                        <div className="flashcard-back bg-slate-800/95 border-2 border-blue-500/40 shadow-2xl">
                                            <div className={`text-xs uppercase tracking-wider text-blue-400 mb-4 ${currentFont}`}>
                                                {t('definition')}
                                            </div>
                                            <div className={`text-xl md:text-2xl text-white leading-relaxed ${currentFont}`}>
                                                {sessionCards[currentIndex].definition[language]}
                                            </div>
                                            {language !== 'en' && (
                                                <div className={`text-sm text-slate-400 mt-3 ${language === 'en' ? '' : currentFont}`}>
                                                    <span className="text-slate-500">EN:</span> {sessionCards[currentIndex].term.en} — {sessionCards[currentIndex].definition.en}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {flipped && (
                                    <div className="space-y-3 fade-in">
                                        <p className={`text-center text-slate-400 text-sm ${currentFont}`}>{t('howWell')}</p>
                                        <div className="grid grid-cols-3 gap-3">
                                            <button onClick={() => handleRate('knew')}
                                                className={`p-3 rounded-xl bg-green-600/20 border-2 border-green-500/50 text-green-300 font-bold hover:bg-green-600/40 transition-all card-btn ${currentFont}`}>
                                                ✅ {t('knewIt')}
                                            </button>
                                            <button onClick={() => handleRate('learning')}
                                                className={`p-3 rounded-xl bg-amber-600/20 border-2 border-amber-500/50 text-amber-300 font-bold hover:bg-amber-600/40 transition-all card-btn ${currentFont}`}>
                                                📖 {t('learning')}
                                            </button>
                                            <button onClick={() => handleRate('forgot')}
                                                className={`p-3 rounded-xl bg-red-600/20 border-2 border-red-500/50 text-red-300 font-bold hover:bg-red-600/40 transition-all card-btn ${currentFont}`}>
                                                😕 {t('forgot')}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'complete' && (
                            <div className="max-w-lg w-full text-center space-y-8 fade-in">
                                <div className="bg-emerald-500/10 w-28 h-28 rounded-full flex items-center justify-center mx-auto border-4 border-emerald-500 shadow-2xl">
                                    <span className="text-6xl">🎉</span>
                                </div>
                                <h2 className={`text-3xl md:text-4xl font-bold text-white ${currentFont}`}>{t('sessionComplete')}</h2>
                                <p className={`text-slate-400 text-lg ${currentFont}`}>{t('greatJob')}</p>
                                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                    <button onClick={() => { setView('categories'); setSelectedCategories([]); }}
                                        className={`px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium transition-colors ${currentFont}`}>
                                        {t('again')}
                                    </button>
                                    <a href="/academy/"
                                        className={`px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-medium transition-colors ${currentFont}`}>
                                        {t('backToAcademy')}
                                    </a>
                                </div>
                            </div>
                        )}
                    </main>

                    {showReset && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl p-8 max-w-md w-full text-center shadow-2xl">
                                <div className="text-4xl mb-4">⚠️</div>
                                <p className={`text-slate-300 mb-6 ${currentFont}`}>{t('resetConfirm')}</p>
                                <div className="flex gap-3 justify-center">
                                    <button onClick={() => setShowReset(false)}
                                        className="px-6 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium transition-colors">
                                        Cancel
                                    </button>
                                    <button onClick={resetProgress}
                                        className="px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium transition-colors">
                                        Reset
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-slate-950 text-slate-600 py-6 text-center text-sm border-t border-slate-900">
                        <p>&copy; {new Date().getFullYear()} PashtunEinstein. All Rights Reserved.</p>
                        <div className="flex justify-center gap-4 mt-2">
                            <a href="https://pashtuneinstein.com/" className={`hover:text-blue-400 ${currentFont}`}>{t('backToAcademy') === 'Back to Academy' ? 'Website' : t('backToAcademy')}</a>
                            <span className="text-slate-800">•</span>
                            <a href="https://blog.pashtuneinstein.com/" className={`hover:text-blue-400 ${currentFont}`}>Blog</a>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
