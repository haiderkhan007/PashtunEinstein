            const app = document.getElementById('app');
            const t = content[state.lang];
            const isRtl = state.lang === 'ur' || state.lang === 'ps';
            
            // Apply direction
            document.body.dir = isRtl ? 'rtl' : 'ltr';
            if(state.lang === 'ur') document.body.classList.add('font-urdu');
            else document.body.classList.remove('font-urdu');

            let mainHTML = '';

            // Router Logic
            if (state.activeTab === 'home') mainHTML = renderHome(t, isRtl);
            else if (state.activeTab === 'test') mainHTML = renderTestSection(t, isRtl);
            else if (state.activeTab === 'certificate') mainHTML = renderCertificateView(t, isRtl);
            else mainHTML = renderLesson(t, state.activeTab, isRtl);

            app.innerHTML = `
                ${renderHeader(t, isRtl)}
                <div class="flex-grow flex flex-col md:flex-row max-w-7xl mx-auto w-full">
                    ${renderSidebar(t, isRtl)}
                    <main class="flex-grow p-6 custom-scrollbar overflow-y-auto h-[calc(100vh-80px)]">
                        ${mainHTML}
                    </main>
                </div>
            `;
            lucide.createIcons();

                    <button onclick="setTab('home')" class="text-slate-500 hover:text-slate-800">Back Home</button>
                    ${state.isTestAvailable ? 
                        `<button onclick="setTab('test')" class="bg-orange-500 text-white px-6 py-2 rounded-full shadow hover:bg-orange-600 transition-colors">
                            ${t.nav.test} <i data-lucide="arrow-right" class="inline w-4 h-4 ml-2"></i>
                        </button>` : ''}
                </div>
            </div>`;
        }

        function renderTestSection(t, isRtl) {
            if (!state.isTestAvailable) {
                return `
                <div class="flex flex-col items-center justify-center h-full text-center animate-fadeIn">
                    <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-6 text-slate-400">
                        <i data-lucide="lock" class="w-10 h-10"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-700 mb-2">${t.test.title}</h2>
                    <p class="text-slate-500 max-w-md">${t.test.locked}</p>
                    <p class="mt-4 text-sm font-mono bg-slate-100 px-3 py-1 rounded text-slate-600">
                        Progress: ${state.viewedLessons.size} / ${LESSON_KEYS.length}
                    </p>
                </div>`;
            }

            if (state.showResults) {
                const passed = state.finalScore >= PASS_SCORE;
                return `
                <div class="max-w-2xl mx-auto text-center animate-fadeIn bg-white p-10 rounded-3xl shadow-lg">
                    <div class="w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-6 ${passed ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                        <i data-lucide="${passed ? 'trophy' : 'frown'}" class="w-10 h-10"></i>
                    </div>
                    <h2 class="text-3xl font-bold mb-2">${passed ? t.test.passed : t.test.failed}</h2>
                    <p class="text-xl text-slate-600 mb-8">Score: ${Math.round(state.finalScore * 100)}%</p>
                    
                    ${passed ? `
                        <div class="max-w-sm mx-auto space-y-4">
                            <p class="text-sm text-slate-500">${t.test.prompt}</p>
                            <input id="cert-name" type="text" placeholder="Full Name" class="w-full p-3 border rounded-lg text-center focus:ring-2 ring-blue-500 outline-none">
                            <button onclick="generateCertificate()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-lg">
                                ${t.test.getCert}
                            </button>
                        </div>
                    ` : `
                        <button onclick="startTest()" class="bg-slate-800 text-white px-8 py-3 rounded-full hover:bg-black transition-colors">Try Again</button>
                    `}
                </div>`;
            }

            if (state.isTesting) {
                const q = testQuestions[state.testLang][state.currentQuestionIndex];
                return `
                <div class="max-w-2xl mx-auto animate-fadeIn">
                    <div class="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-blue-500">
                        <div class="flex justify-between text-sm text-slate-400 mb-4">
                            <span>Question ${state.currentQuestionIndex + 1} / ${TOTAL_QUESTIONS}</span>
                            <span>${q.topic}</span>
                        </div>
                        <h3 class="text-2xl font-bold text-slate-800 mb-8 leading-relaxed">${q.q}</h3>
                        <div class="space-y-3">
                            ${q.options.map((opt, i) => `
                                <button onclick="submitAnswer(${i})" class="w-full text-left p-4 rounded-xl border border-slate-200 hover:border-blue-500 hover:bg-blue-50 transition-all font-medium text-slate-700">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            }

            // Start Screen
            return `
            <div class="max-w-2xl mx-auto text-center animate-fadeIn pt-10">
                <div class="bg-orange-100 w-20 h-20 mx-auto rounded-full flex items-center justify-center text-orange-600 mb-6">
                    <i data-lucide="award" class="w-10 h-10"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-800 mb-4">${t.test.title}</h2>
                
                <div class="bg-slate-50 p-6 rounded-xl mb-8 max-w-md mx-auto">
                    <label class="block text-sm text-slate-500 mb-2">Select Test Language / د ازموینې ژبه / ٹیسٹ کی زبان</label>
                    <div class="flex gap-2 justify-center">
                        ${['en', 'ur', 'ps'].map(l => `
                            <button onclick="selectTestLang('${l}')" class="px-4 py-2 rounded-lg border ${state.testLang === l ? 'bg-slate-800 text-white' : 'bg-white text-slate-600'}">${l.toUpperCase()}</button>
                        `).join('')}
                    </div>
                </div>

                <button onclick="startTest()" class="bg-orange-500 text-white px-10 py-4 rounded-full font-bold text-lg shadow-xl hover:bg-orange-600 transform hover:scale-105 transition-all">
                    ${t.test.btn}
                </button>
            </div>`;
        }

        function renderCertificateView(t, isRtl) {
            const date = new Date().toLocaleDateString();
            return `
            <div class="flex flex-col items-center justify-center min-h-full p-4 animate-fadeIn">
                <div class="certificate-container text-center w-full">
                    <div class="absolute top-0 left-0 w-32 h-32 bg-yellow-400 opacity-20 rounded-full -translate-x-16 -translate-y-16"></div>
                    <div class="absolute bottom-0 right-0 w-32 h-32 bg-blue-400 opacity-20 rounded-full translate-x-16 translate-y-16"></div>
                    
                    <div class="relative z-10">
                        <div class="text-4xl font-serif text-slate-800 mb-2 uppercase tracking-widest">Certificate</div>
                        <div class="text-xl text-slate-500 mb-8 tracking-widest uppercase">Of Achievement</div>
                        
                        <p class="text-slate-600 italic mb-4">This certificate is proudly presented to</p>
                        <h1 class="text-5xl md:text-6xl font-bold text-blue-700 mb-6 font-serif border-b-2 border-slate-200 inline-block pb-2 px-8">${state.userName}</h1>
                        
                        <p class="text-slate-600 max-w-lg mx-auto mb-8 leading-relaxed">
                            For successfully demonstrating excellence in communication skills and passing the comprehensive assessment at <strong>${t.test.academy}</strong>.
                        </p>
                        
                        <div class="flex justify-between items-end mt-12 border-t pt-8 max-w-2xl mx-auto">
                            <div class="text-left">
                                <div class="text-slate-800 font-bold text-lg">${date}</div>
                                <div class="text-xs text-slate-400 uppercase tracking-wider">Date</div>
                            </div>
                            
                            <div class="mb-2">
                                <div class="w-16 h-16 bg-orange-500 rounded-full flex items-center justify-center text-white shadow-lg mx-auto">
                                    <i data-lucide="award" class="w-8 h-8"></i>
                                </div>
                            </div>

                            <div class="text-right">
                                <div class="font-signature text-2xl text-blue-600">PashtunEinstein</div>
                                <div class="text-xs text-slate-400 uppercase tracking-wider">Signature</div>
                            </div>
                        </div>
                    </div>
                </div>
                <button onclick="setTab('home')" class="mt-8 text-slate-500 hover:text-slate-800 underline">Exit</button>
            </div>`;
        }

        // --- Actions ---

        function setLang(l) {
            state.lang = l;
            render();
        }

        function setTab(t) {
            state.activeTab = t;
            state.mobileMenuOpen = false;
            render();
        }

        function toggleMenu() {
            state.mobileMenuOpen = !state.mobileMenuOpen;
            render();
        }

        function markLessonViewed(k) {
            if (!state.viewedLessons.has(k)) {
                state.viewedLessons.add(k);
                if (state.viewedLessons.size >= LESSON_KEYS.length) state.isTestAvailable = true;
                // Don't re-render here to avoid flicker, update state silently until next render
            }
        }

        function selectTestLang(l) {
            state.testLang = l;
            render();
        }

        function startTest() {
            state.isTesting = true;
            state.currentQuestionIndex = 0;
            state.userAnswers = [];
            render();
        }

        function submitAnswer(idx) {
            state.userAnswers.push(idx);
            if (state.currentQuestionIndex < TOTAL_QUESTIONS - 1) {
                state.currentQuestionIndex++;
                render();
            } else {
                finishTest();
            }
        }

        function finishTest() {
            let score = 0;
            const questions = testQuestions[state.testLang];
            state.userAnswers.forEach((ans, i) => {
                if (ans === questions[i].answer) score++;
            });
            state.finalScore = score / TOTAL_QUESTIONS;
            state.isTesting = false;
            state.showResults = true;
            render();
        }

        function generateCertificate() {
            const nameInput = document.getElementById('cert-name');
            if (nameInput && nameInput.value.trim() !== "") {
                state.userName = nameInput.value;
                state.activeTab = 'certificate';
                render();
            } else {
                alert("Please enter your name.");
            }
        }

        // Boot
        init();

    </script>
</body>
</html>
